body:
  text: 卷之下咳逆痰嗽一脈出魚際逆氣喘息脈浮為風緊為寒數為熱細為濕此生於外邪之所搏脈浮緊則虛寒沉數則實熱弦數則少血洪滑則多痰此皆生於內氣之郁又弦為飲人壯吐之而愈沉者不可發汗風寒為病主乎肺以肺主皮毛而司於外傷之則腠理不疏風寒內鬱於肺清肅之氣不利而生痰動嗽又寒飲食入胃從脾脈上至於肺則肺寒內外相合邪因而嗽之火盛炎爍肺金遂成郁遏脹滿甚則乾咳無痰或吐血痰好色腎虛陰虛生火肺津耗散津液氣血皆化為痰矣痰則氣滯妨礙升降有論咳者衛氣之失嗽者榮血之失外傷六氣隨風寒暑濕燥火感其部位察而表之內傷七情皆胃受之而關於肺傷風咳者增寒壯熱自汗惡風口乾煩躁宜麻黃湯遺屎赤石脂傷寒咳者發熱無汗惡寒無渴傷暑咳者煩熱引飲或吐沫聲嘶咯血傷濕咳者骨節煩疼四肢重著洒洒淅淅喜傷心咳者喉中介介如腫狀甚則咽腫喉痹又自汗咽乾咯血此勞傷心小腸受之咳與氣俱失宜芍藥甘草湯又心咳桂枝湯怒傷肝咳而兩脅下痛不可轉側或則兩胠下滿左脅偏痛引少腹此怒傷肝宜小柴胡湯膽受之嘔苦汁宜黃芩半夏湯加甘草治之思傷脾咳而兩脅下痛引肩背又腹脹心痛不飲食此飢飽之傷宜升麻湯胃受之嘔長蟲烏梅湯又云人參主之憂傷肺咳而喘息有聲甚則吐血或吐白沫口燥聲嘶此叫呼傷肺大腸受之遺屎治同氣下條又云枳殼治之恐傷腎咳而腰背相引痛甚則咳涎或寒熱喘滿引腰背此房勞傷腎宜麻黃細辛附子湯膀胱受之遺溺宜茯苓甘草湯治之久嗽不已三焦受之腹滿不欲食此皆聚於胃關於肺令多涕唾而面浮腫氣逆也宜異功白朮散張論有貧者外感之由經曰秋傷於濕冬必咳嗽又曰歲火太過肺金受邪病嗽是也有富貴者多食厚味熱痰所成也謂之涎嗽是也李論皆脾弱受病肺金受邪飲食不行留積而成痰沖肺道而成嗽劉論皆脾虛而成痰傷肺風而成嗽有論痰嗽潮熱四證因痰嗽者潮熱大體雖同動作有異或因虛傷冷則先痰嗽嗽久而不已血形如線隨痰而出惡寒發熱右寸脈浮而數外證日輕夜重面白痰清因憂愁大怒則吐血而後痰嗽少寒多熱左寸脈沉小而數外證心下噎塞情思不樂飲食不下或蠱注相搏或死魂相逐則先嘔血不知來處微有痰嗽漸生寒熱兩手脈弦細而數外證食不為肌煩亂動變不常身體痠疼倦久久嗽搐痰多或喘或瀉即死或先因傷寒傷濕解利不盡雖病退人起飲食減少不生肌肉身倦無力勞力則熱身體痠疼如勞狀但不吐血不發潮熱經二三年醫無驗此是餘毒伏在經絡其脈弦也再發即愈治法論咳嗽痰嗽分而為二咳者謂無痰而有聲乃肺氣傷而不清關於肺也宜以辛潤其肺青陳皮以散三焦之氣壅嗽者謂有痰而無聲乃脾濕而為痰而以嗽皆積於肺也蓋因傷於肺氣動於脾濕咳而為嗽也蓋脾無留濕雖傷肺氣而不為痰然寒暑燥濕風火皆令人嗽獨濕病痰飲入胃留之而不行上入於肺則為咳嗽也宜以化痰為先下氣為上假令濕在心經謂之熱痰濕在肝經謂之風痰濕痰濕在肺經謂之氣痰濕在腎經謂之寒痰能食者下之不能食者厚朴湯主之痰而熱者柴胡湯加石膏主之痰而寒者小青龍加杏仁主之張之治風痰以通聖散加半夏暑痰以白虎涼膈火痰以黃連解毒濕痰以五苓白朮燥嗽以木香葶藶散寒嗽以寧神寧肺散更分吐汗下也又大熱大飲凝於胸中而成濕故作痰矣宜吐之方南星半夏枳殼陳皮風痰脈弦加通聖散熱痰脈洪加小柴胡青黛黃連濕痰脈緩加蒼朮防己寒痰脈沉加桂杏仁小青龍氣痰脈澀加青皮陳皮氣上逆加苦葶藶氣促加人參桔梗發熱加黃芩桔梗熱上喘湧加寒水石石膏痞加枳實重加茯苓浮腫加郁李仁杏仁澤瀉茯苓大便秘加大黃能食加承氣不能食加川樸利膈丸治胸中不利痰嗽喘促木香檳榔各一錢枳殼麩炒一兩厚朴三兩大黃酒製一兩川歸人參各三錢紫蘇飲子治脾肺受寒痰涎嗽紫蘇子桑白皮青皮陳皮杏仁麻黃半夏五味炙甘草人參千緡湯治痰半夏一兩皂角去皮弦子半兩雄黃上以水三升姜八片煎至半以手揉洗之絹袋取清汁服秘方治風寒行痰開腠理二陳湯加麻黃杏仁桔梗治火嗽黃芩黃連栝蔞海石治勞嗽四物湯加竹瀝薑汁治肺脹及火鬱訶子杏仁半夏栝蔞青黛香附子治痰積方南星半夏栝蔞青黛石咸肝痛疏肝氣加青皮上半日嗽多屬胃火加貝母石膏下半日嗽多屬陰虛加知母黃柏川芎川歸虛甚好色者加人參膏陳皮生薑酒病嗽白礬研一兩杏仁一升上以水一升煎乾攤瓦上露一宿炒乾夜飯後嚼杏仁十五個鵝管石散治風入肺脘南星雄黃款冬花鵝管石上為末入艾中放姜置舌上灸煙入咽內以多為妙青礞石丸化痰沉香丸治痰痰嗽南星半夏茯苓陳皮風化硝貝母活石白芥子熱加黃芩青黛風加皂角濕加蒼朮加枳實潤加栝蔞仁勞嗽四君子百合款花細辛桂五味阿膠天門冬杏仁半夏黃耆芍藥上水煎服逆二謂氣上逆肺壅而不下皂角丸治上氣逆竹茹治氣上逆因熱者麥門冬湯治大逆上氣麻黃厚朴湯治上氣脈浮澤漆湯治上氣脈沉澤漆桑白皮六錢射干茯苓黃芩術四錢不治證喘嗽上氣脈數有熱不得臥者死上氣面浮肩息脈浮大者死久嗽數歲脈弱者生實大數者死暴嗽脈散者死喘息脈滑手足溫生脈澀手足寒者死肌瘦下脫熱不去者死咳嗽形脫發熱脈小堅急者死脈小沉伏者死咳而嘔腹脹且泄脈弦急欲絕者死喘三因虛氣虛火入肺陰虛火起衝上肺虛必咽乾無津少氣不足以息也腎虛先覺呼吸短氣兩脅脹滿左尺大而虛者是治宜補腎因實有痰有水氣乘肺氣實肺盛呼吸不利肺氣壅滯右寸沉實者是其肺必脹上氣喘逆咽中如塞如嘔狀自汗治宜瀉肺因邪由肺感寒邪伏於肺經關竅不通呼吸不利右寸沉而緊亦有六部俱伏者發散則身熱退而喘定方氣虛人參黃柏蜜炙麥門冬地骨皮陰虛四物加黃連有痰加枳殼半夏陰則血也痰二陳湯加南星枳殼皂角神秘方治水氣逆上乘肺肺浮而氣不通其脈沉大不臥者是臥則喘也紫蘇子陳皮桑白皮生薑茯苓人參五錢木香二錢上㕮咀煎服瀉白散治陰氣在下陽氣在上咳嘔喘逆桑白皮地骨皮青皮五味甘草人參茯苓杏仁痰加半夏桔梗劫喘治喘甚不可用苦寒藥者以溫劫之椒目為末薑湯下又蘿蔔子炒皂角燒存性薑汁丸噙化又大黃牽牛炒蜜水下二錢豬䐗丸治喘年深或作或止雄豬䐗一個如食法入杏仁五兩線縫其口醋三碗煮乾先食䐗次以杏仁新瓦上焙乾捻去皮旋食永不作分論咳嗽喘息咳者無痰有聲喉中如癢習習如梗甚者續續不止連連不已衝擊膈間外有心咳一切血證肺咳上逆者是嗽者有痰外有勞瘵喘促嗽血者是肺痿喘者促促而氣急喝喝而息數張口抬肩搖身滾肚外有腳氣氣逆者但氣上而奔急外有肺中風肺中寒肺中暑肺水肺熱肝熱膽寒心熱腸痹痰水短氣者呼吸雖數而不能相續似喘而不搖肩似呻吟而無痛外有脾中風肺熱腎熱虛歷節風憂氣胸痞痰飲短氣脈寸口沉胸中短氣闢大而滑中有短氣浮而絕者氣微弱者少氣宿食留飲痰飲六飲附第四脈寸口浮大按之反澀尺中亦微而澀宿食也脈寸口如轉索而緊宿食也脈滑而數者宿食也當下之又浮而滑者宿食也脈沉病若傷寒者宿食留飲當下之下利不欲食者宿食脈短而滑酒病脈浮而細滑者傷飲宿食狀千金云胃中有闢食冷物則痛不能食有熱物則欲食大腹有宿食則寒凜如瘧發熱狀小腹有宿食即暮發熱明旦復止又有云病宿食則頭痛惡風增寒心腹脹滿下利不欲食吞酸噫氣腐氣或腹脹泄瀉及四肢浮腫若胃實寒食反留滯其脈滑而數宜下之愈若虛其脈浮大按之反澀尺中亦微澀宜溫消之痰飲狀或咳或喘或嘔或泄暈眩慒煩悸忪愪㦜寒熱疼痛腫滿攣癖癃閉痞膈如風如顛懸飲者飲水留在脅下咳唾引痛治法當下溢飲者飲流於四肢當汗不汗身體疼痛法當汗支飲者咳逆倚息短氣不得臥其形如腫隨證汗下之痰飲者其人素盛今瘦腸間漉漉有聲宜治濕從小便去之留飲者背寒如手大或短氣而渴四肢歷節疼脅下痛引缺盆伏飲者膈滿喘咳嘔吐發則寒熱腰背痛目淚惡寒振振然李論飲食腸胃乃傷復加之則胃化遲難故宿食飲留食者物也有形之血也因而飽食筋脈橫解腸為重或嘔或吐或下利甚則心胃大痛犯其血也宜分寒熱輕重而治之如初得上部有脈下部無脈其人當吐不吐者死宜瓜蒂散吐之輕則內消宿食縮砂神麯是也重則除下承氣類也寒則溫之半夏乾薑山稜莪朮等也熱則寒之大黃黃連枳實麥蘖等也飲者水也無形之氣也因而大飲則氣逆形寒飲冷則傷肺病則為咳滿水泄重而為蓄積輕者宜取汗利小便使上下分消其濕解醒湯五苓半夏朮殼之類是也重者三花神祐等也又一云凡傷西瓜冷水羊乳寒濕之物白朮二錢川烏二錢防己一錢丁香甘草各五分凡傷羊肉濕面濕熱之物白朮連一錢大黃二錢甘草以上二證腹痛白芍藥一錢心下痞加枳實腹脹加厚朴胸中不利加枳殼胸中寒加陳皮渴者加茯苓腹中悶加蒼朮及體沉重加酲術大抵傷冷物巴豆為君傷熱物大黃為君張論飲食不消分貧富而治之富者乃膏粱太過以致中脘停留脹閉痞隔酸心宜木香導飲丸主之貧者飲食粗動作勞酒食傷之以致心腹滿悶時吐酸水宜進食丸主之又重者證太陽傷寒止脈沉宜導飲丸治之又論留飲蓄水而已雖有四有五之說止一證也夫鬱憤而不伸則肝氣乘脾脾氣不濡亦為留飲肝主慮久不決則飲氣不行脾主思久則脾結亦為留飲乘困飲水脾胃失衰不能布散亦為留飲飲酒過多胞經不及滲泄亦為留飲渴飲冷水乘快過多逸而不動亦為留飲夫水者陰物也但積水則生濕停酒則發燥久則成痰在左脅同肥氣在右脅同息賁上入肺則喘下入大腸則瀉入腎則湧水在太陽為支飲皆由氣逆得之故濕在上者面浮目黃在下者股膝腫滿在中者支飲痞鬲痰逆在陽不去久而化氣在陰不去久而成形宜治以導水如禹功調以五苓葶藶椒目逐水為全矣劉用檳榔丸治傷之輕飲食不化心腹膨檳榔木香各一錢陳皮八錢牽牛頭上醋糊丸薑湯下二十丸雄黃丸治傷之重腹脅虛脹雄黃一兩另研巴豆五錢生用丸治法同心痛條下瓜蒂散吐心腹卒痛悶亂急劑瓜蒂赤小豆各三錢上為末每一錢溫水下枳朮丸治傷食枳實半兩白朮一兩悶加曲糵滯氣加檳榔木香青皮傷濕熱加大黃黃連黃芩濕加蘿蔔子熱加連伏濕痞悶加茯苓澤瀉病後食傷加梔子粉濕面油膩加豆粉半夏傷冷硬加草豆蔻稜莪朮傷水加乾薑心胃痛加宿砂丁香加人參半夏解酲湯治傷酒白豆蔻宿砂生薑葛花各一半兩木香五分茯苓陳皮去白豬苓去皮人參白朮各錢半青皮三錢炒曲澤瀉各三錢上為末白湯下秘方治胸中有物惡食二陳湯加白朮山楂川芎蒼朮神麯炒治留飲懸飲脈弦又治脈伏其人慾自利難利心下續築滿此為留飲欲去故也茯苓桂術甘草湯治心下有痰飲胸脅肢滿目眩大青龍湯治溢飲體疼當發其汗麻黃七錢半桂枝甘草各二錢杏仁石膏雞子大半夏續加澤瀉湯治心下有支飲其人苦冒眩支飲不得息加葶藶大棗樸黃湯治支飲胸滿厚朴大黃二陳湯小半夏湯治嘔家本渴今反不渴心下有支飲治先渴卻嘔水停心下屬飲也加茯苓五苓散治瘦人臍下有悸吐涎沫而顛眩水也亦治停痰宿水破鋇丸治五飲結為癥瘕支飲胸滿吐逆心痛大能散氣以撥胡椒丁香宿砂青皮烏梅木香蠍梢巴豆去油以青皮同巴豆漿水漬一宿漉出同炒青皮焦去豆不用漬漿水淹烏梅肉炊一熟飯研細為膏薑湯下五七丸控涎丹治胃胸背手腳頭項腰胯隱痛不忍連筋骨牽鉤痛坐臥不寧時時走易甘遂大戟白芥子真者糊為丸噯氣吞酸嘈雜五因胃中有火有痰三因云中脘有飲則嘈有宿食則痛二陳湯加南星黃芩治食鬱有熱吞酸面術丸治吞酸嘈雜宿砂陳皮炒曲蒼朮曲丸方治吞酸濕熱所郁黃連薑汁炒茱萸炒蒼朮茯苓湯浸吐清水蒼朮陳壁土炒茯苓一錢活石炒白朮一錢半陳皮五分煎服燥飲丸治痰飲心痛干螺殼牆土上者蒼朮曲為丸木香丸治腐氣者宿食也木香蓬朮胡椒半夏乾漆炒煙盡各五錢宿砂桂心青皮三兩附子炮去皮臍山稜醋炒白姜一兩上為末蜜為丸如梧桐子大每服五十丸薑湯下感應丸治同前肉豆蔻川薑百草霜各二錢木香一兩蓽澄茄山稜油各一兩巴豆百粒去皮蠟四兩杏仁百粒去皮上除巴豆杏仁外為末次下別研巴杏和勻先將油煎蠟溶化傾在藥內和成劑入舂內杵千餘下旋丸如綠豆大每服三五丸溫湯送下積聚六脈來細而附骨者乃積也寸口見積在胸尺中見積在氣衝關上見積在臍傍左積左右積右脈二出積在中央處其部脈浮而毛按之辟易脅下氣逆背相引痛名肺積脈沉而芤上下無常處胸滿悸腹中熱名心積脈弦而細兩脅下痛邪走心下足腫寒重名肝積脈沉而急若脊與背相引痛飢見飽減名腎積脈浮大而長飢減飽見腹滿泄嘔脛腫名脾積寸口沉而橫脅下及腹中為橫積脈小沉而實者胸胃中有積聚不下食食則吐脈沉而緊若心下有寒時痛有積聚關上脈大而尺寸細者必心腹冷積脈弦腹中急痛為瘕脈細微者為癥遲而滑中寒有癥結駛而緊積聚有擊痛脈沉重中散者寒食成癥瘕脈左轉沉重者病癥在胸脈右轉不至寸口者內有肉癥蓋積者繫於藏始終不移聚者繫於府發痛轉移隨氣往來如有坯塊癥者繫於氣瘕者繫於血因外有寒血脈凝澀汁沫與血相搏則氣聚而成積矣又因七情憂思傷心重寒傷肺憤怒傷肝醉以入房汗出當風傷脾困力過度入房汗出入浴傷腎皆藏氣不平凝血不散汁沫相搏蘊結成積又因食酒肉水涎血氣入積皆因偏愛停留不散日久成積塊在中為痰飲在右為食積在左為血積又有息積者乃氣息癖滯於脅下不在臟腑榮衛之間積久形成氣不幹胃故不妨食病者脅下滿氣逆息難頻歲不已名曰息積有肝積名肥氣在左脅下如杯痎𤶀連歲中有血色有心積名曰伏梁起臍下大如臂上至心下令人煩心有大膿血在腸胃之外有肺積名息賁在右脅下如杯寒熱喘嗽有脾積名痞氣在胃脘如盆四肢不收黃疸飲食不為肌膚其食冷物陽氣為濕蓄有腎積名賁豚發於小腹上至心下如豚狀上下喘逆骨痿寒者熱之結者散之客者除之留者行之堅者削之消摩之咸以耎之苦以瀉之全真氣而補之隨所利而行之五積丸黃連肝腎五錢脾七錢心肺一兩五錢厚朴肝心脾五錢肺腎八錢川烏肝肺一錢心腎脾五錢乾薑肝心五分肺腎錢半茯苓一錢五分人參脾肺肝二錢心五錢巴豆霜五分上為末巴豆霜旋入蜜煉為丸如桐子大初二丸加至微溏又有虛人不宜攻以蠟匱其藥且久留磨積肝積加柴胡二兩皂角二錢川椒四錢昆布莪朮各二錢半心積加黃芩三錢茯苓桂丹參菖蒲各一錢肺積加桔梗天門冬山稜青皮陳皮白豆蔻各一錢川椒紫菀各一錢半腎積加玄胡三錢苦楝三錢全蠍附子一錢澤瀉二錢獨活一錢菖蒲二錢桂三分丁香五分脾積加吳茱萸宿砂茵陳芩各二錢澤瀉一錢椒五分秋冬加樸一倍減芩連服人覺熱加連覺悶亂加桂氣短減樸肉積碙砂水銀阿魏酒積神麯麥蘖水積甘遂芫花牽牛食積巴豆礞石氣積檳榔木香血積虻蟲水蛭桃仁大黃涎積雄黃膩粉癖積山稜莪朮魚腥陳皮紫蘇草果丁香桂心寒冷成積附子硫黃樸消塊丸山稜莪朮削堅青皮陳皮破氣香附開氣桃仁紅花治血靈脂破血牛膝活血二陳湯開皮裡膜外之痰石醎破痰塊甘草黃連吳茱萸炒益智子炒山楂破食塊上為末醋糊為丸用葵根石醎白朮湯下千金消食丸硝石六兩大黃半斤甘草人參三兩上為細末以三年苦酒三升置竹筒中以竹片三刻先納大黃攪使微沸盡一刻乃下余藥又盡一刻微火熬膏丸桐子大每三十丸可消塊不令人困經驗丸破塊吳茱萸黃連木香檳榔桃仁郁李仁大承氣加連川芎乾葛煎湯下栝蔞貝母半夏黃連丸極妙破痰塊苦參瓜蒂半夏薑汁蜜丸破茶癖石膏黃芩升麻砂糖調末服化氣湯治息積癖於腹脅之下腹滿疼痛嘔吐酸水宿砂桂心木香胡椒一錢甘草炙茴香炒丁香青皮陳皮莪朮炮各五錢沉香一錢上為末生薑紫蘇鹽酒調下三錢散聚湯治六聚狀如癥瘕隨氣上下心腹絞痛攻刺腰脅喘咳滿悶腹脹半夏檳榔歸三錢桂杏仁二兩茯苓附炮去皮臍甘草川芎吳茱萸樸枳殼各一兩大便秘加大黃三聖散貼塊石灰未化者半斤瓦器炒令淡黃紅候稍減熱下大黃一兩就爐微炒候涼入桂桂心半兩末略炒入米醋熬成膏厚攤貼患處又方大黃朴硝各一兩大蒜搗膏和勻貼之亦妙小兒奶癖白芥子研攤紙上貼不治證脈虛弱者死弦而伏腹中有症不可轉也死不見脈也死消渴七心脈滑為渴陽氣勝也趺陽浮而數浮為氣數消穀心脈微小為消癉寸脈浮而遲浮為虛遲為勞衛氣虧榮氣渴脈輕散者氣實血虛脈洪大者陽余陰虧脈數大者沉小者生實堅大者死細浮短者死數甚者死因津血不足而然也蓋火甚於上為鬲膜之消病則舌上赤裂大渴引飲以白虎加參主之火甚於中為腸胃之消病善飲者自瘦自汗大便硬小便數以調胃承氣三黃湯等治之火甚於下為腎消病則煩躁小便淋濁如膏油之狀以六味地黃丸治之方黃連末天花粉人乳地黃汁藕汁薑汁蜜為膏留舌上以白湯送下參膏湯治鬲消上焦渴不欲多食人參五錢石膏一兩知母六錢甘草三錢五分上水煎調服寒水石活石末炒順氣散治消中能食小便赤黃川椒一兩大黃四兩枳殼二錢赤芍藥茴香散治腎消小便如油茴香苦楝炒五味子上為末酒下二錢珍珠丸治白淫滑泄思想無窮所願不得黃柏降火真蛤粉咸補腎上各等分水丸空心酒下甘津甘露飲石膏甘草滋水黃連黃柏梔子杏仁知母瀉熱補水麥門冬全蠍連翹白葵白芷歸蘭香和血潤燥升麻木香柴胡行經藿香反佐取之桔梗上為末舐之張法神芎丸黃連入心牽牛逐火活石入腎大黃逐火黃芩入肺薄荷散熱三黃丸大黃春秋二兩夏一兩冬五兩黃芩夏秋六兩春四兩冬三兩黃連春四兩夏一兩秋冬三兩神白散治真陰虛損豬䐗丸治消中豬䐗一個連五兩麥門冬去心四兩知母四兩栝蔞根四兩上四味入䐗中縫之蒸爛乘熱於砂盆內杵丸如堅加蜜丸桐子大服四五十丸葛粉丸治腎消葛根栝蔞各三兩鉛丹二兩附子炮削一兩上蜜丸桐子大服十丸春夏去附胡粉散治大渴不治腎消鉛丹五錢胡粉赤白石脂各五錢澤瀉五錢石膏五錢栝蔞根三兩半甘草炙三兩上或丸或末任意腹痛減服人參白朮湯人參白朮川歸芍藥大黃梔子瀉澤各五錢連翹栝蔞根茯苓各一兩桂一兩藿香木香各一兩寒水石一兩活石消石半斤甘草三兩石膏四兩上姜煎入蜜少許酒煮黃連丸治中暑熱渴痞八因誤下多將脾胃之陰亡矣胸中之氣因虛而下陷於心之分野治宜升胃氣以血藥治之有濕土乘心下為虛滿若大便秘能食厚朴枳實主之若大便利芍藥陳皮主之有食積痰滯痞膈胸中宜消導之黃連瀉心湯治虛痞黃連瀉心下之土邪厚朴降氣大消痞丸治濕土痞虛痞黃連炒六錢薑黃白朮半夏各一兩黃芩三錢甘草炙神麯炒人參二錢宿砂一錢木香豬苓澤瀉一錢生薑五錢陳皮三錢枳實炒有憂氣結中脘心下痞滿肚皮底微痛加之否則不必利膈丸治痰黃芩生一兩炒一兩黃連南星半夏五錢枳殼陳皮三錢白礬五分白朮二錢神麯炒澤瀉五錢栝蔞丸治胸痞脅下逆搶心栝蔞枳實陳皮取栝蔞穰皮末熬丸胸痞切痛加梔子燒存性附子炮二兩腫脹九脈弦而滑者脹盛而緊者曰脹陽中有陰也可下之愈脈浮而數浮則虛數則熱趺陽緊而浮緊為痛則堅滿浮為虛則腸鳴脈虛緊澀者脹乃憂思結連脾肺氣凝大腸與胸不平而脹脈浮為風水皮水脈弦而遲必心下堅乃肝木克脾土鬱結涎閉於臟氣腑氣不舒胃則脹閉脈沉為心下黃汗脈沉而滑亦名風水脈浮而遲浮熱遲潛熱潛相搏名曰沉為水必矣脈弦而緊弦則衛氣不行水走腸間蓋水腫因脾虛不能制腎水腎為胃關胃關不利則水漬妄行滲透經絡其始起也目窠上微腫頸脈動咳陰股間寒足脛脹大水已成矣按其腹隨手而起如裹水之狀氣短不得臥為心水小腸急滿為小腸水大便溏泄為肺水乍寒乍實為大腸水兩脅滿為汗水口苦咽乾為膽水四肢重為脾水小便澀為胃水腰痛足冷為腎水腹急肢瘦為膀胱水風水脈浮惡風歸之肝皮水脈浮不惡風不喘渴按之沒指歸之肺石水脈沉而惡風歸之腎黃汗脈沉遲發熱而多涎歸之脾蓋脹滿因脾土極虛轉輸失職胃雖受谷不能運化精微隧道壅塞清濁相混濕鬱為熱熱又生濕遂成脹滿又有寒濕抑遏於脾土之中積而不散而脹經云藏寒生病滿是也又有五積痰飲聚而不散或宿食不化皆成脹滿煩心短氣臥不安為心脹虛滿咳逆為肺脹脅痛引小腹為肝脹善噦四肢悅體重不勝衣臥不安為脾脹腰髀痛引背為腎脹腹滿胃脘痛妨食聞焦臭大便難為胃脹腸鳴痛冬寒飧泄為大腸脹小腹䐜滿引腰痛為小腸脹小腹滿而氣癃為膀胱脹氣滿於膚硜硜然為三焦脹脅痛口苦善太息為膽脹寒氣客於膚中鼓空空不堅腹身大色不變按之不起為膚脹腹脹身背大色蒼黃腹筋起為鼓脹治法治水腫先使補脾氣實能健運腰以上腫汗之腰以下腫宜利小便主以參朮佐以黃芩麥門冬制肝木腹脹加樸氣不運加沉木香使其通利為兩全矣外則濕腫脈則沉細用附子又有腫痛乃中寒也亦加附子治脹滿宜大補脾氣行濕散氣主以參朮佐以平胃五苓熱加芩連血虛加四物有死血加桃仁如風寒自表入里變為熱脹胃滿宜大承氣下之如積痰宿食脹滿宜消導之下之又論治胕腫七證有肺氣膈於膜外運行不得遍身浮腫脈浮宜調肺通氣有男子臟虛婦人血虛傷於冷毒之物成積凝滯氣道不通腹急氣喘亦有隻腹脹者脈弦治宜化積有脾寒久年不愈傳為浮腫且云內有伏熱因於瀉利及其熱乘虛入脾致胸腹急脹脈數治宜解熱有肉如泥按之不起脾土濕病也脈沉治宜燥脾有脾虛不能制腎水脾濕如泥脈沉遲治宜暖脾元利水道有傷風濕冷濕而腫氣血凝澀脈浮緩治宜發散風濕有久病後浮是氣虛也有婦人產後或經後是血虛也其脈虛弱消腫丸活石木通黑醜茯苓半夏瞿麥陳皮木香丁香上酒糊丸麥門冬湯下小胃丸治腫變水湯治腫白朮茯苓澤瀉二兩郁李仁一錢上煎入薑汁調四君子湯之類木香散治腫木香大戟白牽牛各等分為末三錢以豬腰一雙批片摻末煨熟空服更塗甘遂末於臍飲甘草水五皮散治皮水大腹皮桑白皮茯苓皮生薑皮陳皮木香海金砂丸治腫牽牛生五錢炒五錢甘遂五錢海金砂三錢白朮一兩中滿分消丸治熱脹氣脹鼓脹黃芩黃連炒薑黃人參白朮豬苓甘草厚朴各一兩茯苓宿砂陳皮各三錢枳殼炒五錢半夏五錢知母炒青皮澤瀉生薑各四錢炊餅丸楮實子丸治脹木香塌氣丸治脹蘿白子炒青皮陳皮各五錢草豆蔻麵裹煨木香三錢胡椒蠍梢二錢半去毒廣茂