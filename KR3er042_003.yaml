餘熱有酒嘔者當解酒有腳弱脾疼而嘔者依腳氣治有中毒而嘔者解毒治之有懷孕惡阻者從痰治有漏氣病則身背熱肘臂攣痛其氣不續鬲間厭悶食入則先吐而後下名曰漏氣此由上焦傷風開其腠理經氣失道邪氣內著麥門冬湯主之麥門冬生蘆根葳蕤竹茹陳皮甘草茯苓參朮有走哺病者下焦實熱大小便不通氣逆不續嘔逆不禁名曰走哺人參湯主之前方內去竹茹麥門冬加知母石膏黃芩山枝有人噁心吐蟲數條後乃屢作服殺蟲藥吐蟲愈多六脈皆細此非蟲也乃藏寒而蟲不安矣有人嘔飲食皆不進治嘔愈嘔此胃風也不治證脈弱小便複利身有微熱見厥者死脈緊而澀者難治趺陽脈浮胃虛不食恐怖死寬緩生噎膈十一脈澀小血不足大而弱氣不足又脈同胃反蓋因脈虛火起氣虛火熾血液既耗腸胃津涸傳化失宜或因痰隔妨礙升降氣不交通皆令食而復出也大概因津血俱耗胃脘亦槁在上近咽之下水飲可行食物難入間或可入入亦不多曰噎其槁在下與胃為近食雖可進難盡入胃良久復出曰膈即翻胃也大便秘如羊屎小便熱各雖不同病則一也三陽結謂之膈三陽大腸小腸膀胱也小腸結熱則血脈燥大腸結熱則後不通膀胱結熱則津液涸三陽既結前後閉必反而上治宜潤血降火解結牛羊乳韭汁竹瀝童便蜜潤燥薑汁去穢甘蔗汁解酒毒氣虛以四君子為君血虛四物為君或加桃仁紅花驢溺防其生蟲三因有五噎五膈氣噎者心悸上下不通噫噦不徹胸背痛憂噎者遇天陰冷手足厥冷不能自溫勞噎者氣上鬲脅下支滿胸中填塞攻背痛思噎者心怔忡喜忘目視慌慌食噎者食無多少胃中苦寒痛不得喘息憂膈者胸中氣結津液不通飲食不下羸瘦短氣思膈者中脘逆滿噫則酸心飲食不消大便不便怒膈者胸膈逆滿噫塞不通嘔則筋急惡聞食臭喜膈者五心煩熱口舌生瘡四肢倦重身常發熱胸痹引背食少恐膈者心腹脹滿咳嗽氣逆腹中逆冷雷鳴繞臍痛不能食有人血耗便如羊屎病胃反半年脈澀不勻先服六君子湯加甘蔗汁附子大黃童便便潤服牛乳愈跌墜十二脈堅強者生小弱者死李論凡治惡血歸內歸於肝經脅痛自汗宜破血行經張論墜墮便生心𭼞痰涎發於上也治宜三聖散吐痰壅神應散治瘀血大便不通大黃酒浸一兩桃仁紅花栝蔞根穿山甲炮炙二錢歸三錢柴胡引經麝透熱酒下紫金丹治折傷骨節疼痛川烏炮二兩草烏炮一兩自然銅煅淬禹餘糧淬各四兩威靈仙骨碎補金毛狗脊麝沒藥紅娘子各二錢半木鱉子去殼五靈脂黑醜防己地龍烏藥青皮陳皮茴香各一錢半上醋糊丸桐子大酒下十丸杖打閃肭痛皆同血滯證可下之凡忍痛則傷血余同上治中毒十三脈微細者死續隨子五倍子甘草上茶清下一二碗取吐治中藥毒板藍根四兩貫眾一兩去土甘草青黛上為末蜜丸如桐子大青黛為衣治食毒物局方解毒丸治中藥甚者大戟吐之有人用肉豆蔻宿砂甘草為末入大戟麝香五倍細茶服之能大吐下癲狂十四脈大堅疾者癲病沉數為痰熱虛弦為驚蓋因痰者乃血氣俱虧痰客中焦妨礙升降視聽言語皆有虛妄宜吐之因火者乃火入於肺氣主鼓舞火傳於肝循衣攝空胃中大熱治宜降火因驚者驚則心血不寧心者神之本積痰鬱熱隨動而迷亂心神有似邪鬼治宜先吐之而後以安神丸主之佐以平肝之藥膽主驚故也治法痰則吐之以三聖散火則降之承氣湯驚則平之安神丸總治黃連辰砂降火栝蔞南星半夏行痰川芎平肝青黛柴胡局方妙香丸治洪長伏三脈諸癇狂者令水浸服之李和南五生丸治弦細緩三脈諸癇狂者不治證脈沉小急實者死虛而弦急者死循衣縫者死身熱手足冷者死陰附陽則狂陽附陰則癲脫陽見鬼脫陰目盲驚悸十五肝脈驚暴有所驚駭驚生病者其脈止而復來目睛不轉呼吸不能氣促寸口脈動而弱動為驚弱為悸寸口脈緊趺陽脈浮胃氣則虛是為悸趺陽微而浮浮為胃虛微則不食此恐懼之脈憂迫所作也蓋因血虛肝生血無血則木盛易驚心神忤亂氣與涎結遂使驚悸血虛宜硃砂安神丸氣涎心郁在心膽經宜溫膽湯忪悸在心脾經因失志氣鬱涎聚宜定志湯小兒驚搐涎潮如死乃母胎時受怖為腹中積熱宜墜涎鎮火清心也硃砂安神丸治血虛驚悸凡血虛則木火盛也硃砂一錢另研黃連一錢半甘草地黃川歸五錢炊餅丸溫膽湯治心膽怯易驚半夏竹茹枳實陳皮茯苓一錢甘草五分寒水石散治因驚心氣不行鬱而生涎結為飲寒水石煅活石水飛各一兩甘草龍腦少許上熱則水下寒則薑湯下三因論悸有悸然而心築築動有驚悸忪悸痰飲閉於中脘其證短氣自汗四肢浮腫飲食無味心虛煩悶坐臥不安外有肝痹肺𤶀心中虛寒亦似驚也治驚悸癲癇狂妄大率痰宜吐之火則下之血虛宜補血平木降火疝十六脈寸口弦緊為寒疝弦則衛氣不行不行則惡寒寸口遲緩為寒疝遲為寒緩為氣氣寒相搏故痛脈沉緊豁大者為虛脈滑為疝急為疝搏為疝見於何部而知其藏所病蓋病全在厥陰肝經有因濕熱在經抑遏至久又感外寒濕熱被鬱而作痛或大勞則火起於筋醉飽則火起於胃房勞則火起於腎大怒則火起於本經凡火鬱之甚濕氣便盛濁氣凝聚併入血隧流於肝經為寒所束宜其痛甚有因痰飲食積流入厥陰聚結成核有因痰血結於本經有因本經虛或寒然肝經與衝任督所會聚於陰器傷於寒則陰縮入傷於熱則緩挺不收蓋木性速急也丁香練實丸川歸酒洗附炮去皮臍川楝子茴香各一兩以酒三升煮盡焙乾作入下藥丁香木香五分蟬蠍十三個玄胡五錢上同為末酒糊丸梧子大酒下百丸參朮丸治虛疝脈豁者死人參白朮梔子香附秘方治諸症枳實止痛山梔茱萸山楂橘子以上去核積桃仁去瘀血川烏同梔劫痛桂枝止痛不定用之青皮荔核濕則加之倉卒散治寒疝入腹心腹卒痛小腹膀胱氣絞腹冷重如石自汗山枝四十個燒半過附一個炮一方有烏無附酒煎下二錢神應散治諸疝此方能散氣開結玄胡胡椒或有茴香酒煎二錢牡丹丸治寒疝心腹刺痛及血川烏炮去皮尖牡丹皮各四錢桃仁炒去皮尖桂各五錢青皮俱為末蜜丸酒下桃仁湯治㿗疝桃仁如泥茱萸桂枝青皮枳殼檳榔木香山稜莪朮蒺藜海藻茯苓任意加減服治㿗要藥蒼朮南星半夏白芷散水川芎枳實山楂應痛丸治敗積惡物不出結成疝痛不忍阿魏二兩醋和喬麥麵裹火煨熟檳榔大者兩個刮空入滴乳香滿盛將刮下末和喬麥麵裹慢火煨為末入碙砂一錢赤芍藥一兩同為末麵糊和丸梧子大鹽酒下雄黃散治陰腫大如斗核痛礬一兩雄黃五錢甘草二錢半煎洗張論有七疝寒疝因寒水濕處使內過多囊冷結硬如石陰莖不舉或控睪丸而宜溫劑下之小疝因醉使內汗出遇風寒濕氣聚囊腫痛如水晶搔出黃水小腹按之作水聲宜逐水筋疝因房勞及邪術所使陰莖腫或潰膿或痛而裡急筋縮或挺不收或白物如精或莖痛痛極則癢宜降火下之血疝因使內氣血流溢滲入脬囊結為癰膿名便癰宜和血氣疝因怒氣而脹怒罷則散宜以疝氣下之孤疝狀如仰瓦臥則入小腹行立出囊中宜逐氣流經之劑下之㿗疝因濕得之重如升斗不癢不痛宜去濕之藥下之三因有四㿗氣㿗因七情藏氣下墜陰㿗腫脹急痛易治水㿗同㿗疝腸㿗因房勞過度元藏虛冷腸邊膋系不收墜入囊中上下無定此難治卵㿗因勞役坐馬致卵核腫脹或偏有大小上下無常亦難治也莖挺長濕熱也小柴胡加黃連有塊加青皮外服用絲瓜汁調五倍子末服腳氣十七脈浮弦者風濡弱者濕洪數者熱遲澀者寒微滑者虛牢堅者實結則因氣散則因憂緊則因怒細則因悲蓋因濕為之南方之人當風取涼醉以入房久坐濕地或履風濕毒氣血氣虛弱邪氣並行腠理邪氣盛正氣少故血氣澀澀則脾虛虛則弱病發熱四肢痠疼煩悶者暑月冷濕得之四肢結持筋者寒月冷濕得之病脛腫小腹不仁頭痛煩心痰壅吐逆時寒熱便溺不通甚者攻心而勢迫治之不可後也此壅之疾壅未成當宣通之調以蒼朮川柏濕類藥也壅既成當砭惡血而後治之攻心腳氣乃血虛而有濕熱也治宜四物加柏筋轉疼者乃血受濕熱也治加桃仁芩連有痰積流注者加薑汁竹瀝南星也北方之疾因潼乳絡醇酒之濕熱下注積久而成腫滿疼痛也治宜下藥泄越其邪當歸拈痛湯治濕熱肢節煩疼肩背沉重胸脅不利身疼胻腫羌活黃芩酒甘草炙茵陳酒炒川歸各五錢人參苦參酒洗升麻乾葛蒼朮各二兩知母酒洗防風澤瀉各三錢豬苓白朮各一錢半上煎服羌活導滯湯治前證便溺阻隔先以此藥導之後食前方及治北方羌活獨活各五錢防己川歸各三錢大黃酒煨一兩枳實麩炒三錢秘方治濕熱生地黃柏酒炒白朮防己川芎檳榔蒼朮鹽炒犀角甘草木通熱加芩連痰加竹瀝薑汁熱時加石膏便實加桃仁溺澀加牛膝食積流注蒼朮黃柏防己南星川芎白芷檳榔犀角牛膝血虛加龜板除濕丹治諸濕陳皮二兩大戟炒兩半黑醜炒三錢甘遂檳榔赤芍靈仙澤瀉葶藶各一兩乳香另研沒藥各五錢上糊丸梧子大每五十丸加至百丸溫水下忌濕面華佗論自內憂思喜怒寒熱邪毒之氣注於腳膝狀類諸風謂之腳氣也自外風寒暑濕皆有不正之氣中於腳膝謂之腳氣也治法曰實則利之虛則益之六淫隨六法以發之七情隨六氣以散之三因論乃風寒暑濕毒氣襲之也風則脈浮寒則脈緊濕則脈細暑則脈洪表則脈浮里則脈沉風則痛濕則重暑則煩風則行隨其所中何經絡而治如頭項腰脊痛太陽經也宜麻黃羌活類余以類推不治證入心則謬妄嘔吐食不入眠不安左寸乍大乍小乍無者死入腎則腰腳俱腫小便不通呻吟目額皆黑沖胸而嘔左尺脈絕者死蟲十八䘌蝕陰肛脈虛小者生緊急者死尺脈沉滑寸白蟲蓋因濕熱之生臟腑虛則侵蝕集效丸木香鶴蝨訶子煨蕪荑炒烏梅附炮去皮臍乾薑一兩檳榔一錢大黃二錢或加黃柏川連蜜丸陳皮醋湯任下化蟲丸蟲即化水硫黃一兩木香五錢蜜陀僧三錢附一個炮去皮臍將附為末用醋一升煮膏入藥和勻丸綠豆大荊芥茶清下二十丸秘方治吐蟲黑鉛炒成灰檳榔為末米飲下又雞子炒蠟塵治寸白蟲又川椒治蟲上並酒糊丸痔漏十九皆因風熱燥歸於大腸也秘方涼血為主四物湯涼血黃芩涼腸枳殼寬腸槐角涼血生血升麻秦艽白朮丸秦艽去蘆皂角仁燒存性去皮各一兩歸尾酒洗桃仁大黃各一兩白朮澤瀉五錢滲濕枳實麩炒泄胃五錢地榆三錢止血上面糊丸梧子大空心湯下百丸以飯壓之氣滯加檳榔木香濕熱勝加黃柏又云以蒼朮防風為君甘草芍藥為佐蒼朮澤瀉丸蒼朮四兩澤瀉枳子二兩皂角仁燒地榆一兩飯丸脈痔血自肛門另作竅出烏頭炮去皮尖連各一兩丸服又荊芥槐花石菖蒲各一兩丸服酒痔黃連酒浸酒煮酒丸飲下痔血不止檢㯃根灰空心下又幹絲瓜一枚連皮子燒存性酒下二錢又方耳接川歸一兩黃柏二兩烏龜一個酒煮乾為度日乾為末蜜丸皂子大皂角散治痔漏脫肛黃牛角腮不切蛇蛻一條穿山甲七片皂角一枚上並切瓷瓶泥固候乾先以小火燒煙出方以大火煅紅出冷研細胡桃酒下臨睡分出蟲五更卻以酒下二錢洗五倍子朴硝桑寄生蓮房先熏後洗又天仙子荊芥蔓荊子小椒煎洗敷木鱉子五倍子末敷腫處又麝香腦子硃砂研入生田螺內待成水抹頭不拍遍以干收為度又好蠟茶細末入腦子同研津調紙花貼上除根後方貼之白礬枯二錢生二錢乳香三錢真香俱同研為膏紙花貼如便秘當歸枳殼湯下三黃丸又木槿花陰乾或葉專封痔口能幹腐痔核化為水硼砂火煅輕粉蘆干石煅或加信石煅以朴硝洗淨辰砂敷外四圍點核上腸風塞藥蘆干石煅便淬牡蠣粉脫肛洗方理省藤桑白皮白礬煎湯洗瘡瘍二十脈沉實發熱煩躁外無焮赤痛其邪深在內故先疏通以絕其源脈浮大數焮腫在外當先托裡恐邪入於內脈不沉不浮內外俱無證知其在經當和榮衛浮者宜行經黃芩黃連連翹人參木香檳榔澤瀉黃柏在上半加枳殼沉者里疏通臟腑利後用前藥中加大黃痛當歸黃耆止之緩者身重當除濕大者心脈有熱弦者眩運當去肝風澀者氣滯血虛弦細為膀胱寒水小便溺多宜瀉寒水蓋瘡瘍諸症皆營營運也氣偏盛助火邪而生濕熱相搏肌肉敗壞而為膿故從虛而出經絡也如太陽經從背而出少陽虛從鬢而出陽明虛從髭而出督脈虛從胸而出微濕則癢熱甚則痛又甚則痛血虛則痛甚營氣不從逆於肉理乃生癰腫營氣逆而不行其原在經濕氣外傷害人皮肉皆營氣之下行也其在外盛則內行膏梁之變足生大丁皆營氣逆行凝於經絡其原在裡發於表治法外者宜辛涼發之通聖涼膈解毒是也內者宜苦寒下之三黃玉燭是也中者宜調經涼血等是也腫瘍宜解毒下之潰瘍宜托裡補之如顯經宜加通經之藥夫邪氣內搐腫熱宜砭射之也氣勝血聚者宜石而泄之瘡家嘔吐有二凡腫瘍年壯謂伏熱在心宜降其火如潰瘍年老謂虛宜大補之內疏黃連湯治嘔吐啘發熱脈沉而實腫哽色不變根深臟腑秘澀黃連芍藥川歸黃芩梔子薄荷桔梗木香檳榔甘草連翹便秘加大黃復煎散治腫焮於外根槃不深脈浮邪氣盛則必侵於內宜托之地骨皮四君子湯桂川歸芍藥黃芩防風二兩黃耆防己一兩熱加黃連上以蒼朮一斤水五升煎至半去滓入藥煎服便秘加大黃黃連消毒湯治一切瘡疽背腦黃連一錢黃芩黃柏地黃知母四錢羌活一錢獨活防風藁本歸尾桔梗連翹四錢黃耆人參甘草三分蘇木澤瀉二分防己五分千金內托散治癰疽使氣血先實則膿如推出也即前方加大黃五加子驗方有人五十形實背生紅腫近骨下痛甚脈浮數而洪緊嘔食正冬月又有婦七十好酒形實腦生疽脈急切澀大黃人參各酒炒一錢又麻黃桂枝冬月用之附子脈緊用之黃柏酒炒栝蔞甘草節羌活青皮半夏人參黃耆姜煎又初生一切瘡疽發背服之而效云能下死血大黃甘草辰砂血竭酒下解毒丹治一切發背癰疽金石毒散腫消毒輕者可服紫背車鰲大者鹽泥固制煅紅出火毒甘草膏丸甘草湯下外用寒水石煅紅入甕沉井中臘豬脂調敷一方以輕粉為佐又方以燈草為佐三生散治漫腫光色附骨癰如神露蜂房蟬蛻頭髮上等分燒存性三錢研細酒下清涼膏治發背川歸白芷木鱉肉白芨黃柏白蘞一兩乳香研膩粉少粉白膠少許丹五兩麻油十兩煎如法曾用五灰膏敷一宿待惡肉腐以刀去之卻以綿蘸香油扭干覆之待好肉如岩盦狀方可收口收口用乳香沒藥龍骨白蘞等丁瘡劉方烏頭尖附尖蠍梢雄黃一錢碙砂蜈蚣一雙粉霜輕粉麝香乳香五分信二錢半上俱為末先破瘡出血了以草杖頭用紙帶入於內以深為妙丁瘡李方歸尾沒藥乳香白芨藁本杏仁黃丹蓖麻粉霜巴霜木鱉麻油桃柳條煎如法丁瘡毒氣入腹昏悶不食紫花地丁草蟬蛻貫眾五錢丁香乳香溫酒下二錢疔狀初發先癢後痛先寒後熱熱定則寒四肢沉重頭痛心驚眼花嘔則危乳香散治瘡口大痛寒水石煅活石各一兩乳香沒藥各五分腦少許末摻口上雄黃散治惡肉不去雄黃一錢巴豆一個去皮乳香沒藥少許上另研極細和勻上肉木香散治久不收口木香檳榔川歸一錢黃連二錢末摻之出剩骨血竭草罨之自出又青橘葉地錦草上二味杵成膏先洗瘡口淨用土牛膝內入孔中治漏瘡剩骨遠志金銀花甘草黃耆酒煮瘰癧二十一因食味之厚鬱氣之積曰毒曰風熱實者易治虛者可慮夫初發於少陽不守禁戒延及陽明蓋膽經主決斷有相火而氣多血少治宜瀉火散結虛則補元氣千金散主之實則瀉陰火玉燭散主之化堅湯升麻一錢葛根五分漏蘆足陽明牡丹皮三錢去留血生熟地黃各三分連翹一錢黃耆護皮毛生血脈芍藥三分桂散結寒因熱用柴胡八分黍黏消腫羌活獨活防風散結昆布軟堅廣朮三稜削堅參腹脹加樸氣不順加木香陳皮便秘加大黃大黃湯大黃煨皂角刺甘草煎服以麝香栝蔞仁敷之周用火針刺核即用追毒膏點苧線頭上內針孔又杜牛膝黏敷其上一日一易膿將盡又用生玄參地榆活石寒水石大黃等末縛其瘡又同白厄菜墨斗草同敷其上又用寒水石朴硝大黃木香檳榔龍骨末收口後又用竹茹亦長肉白膏藥收後紅不退用蠮螉窠敷如已潰久不收口用鐵烙香油燈燒烙其腐盡依前治去瘰癧毒皂角子五兩大黑豆一升甘草一兩青葉汁一斤煮汁可常食不過二斗瘰癧太陽經少陽經癭在隱僻處結核按之走痛勞瘵結核耳後連有數介或聚或散耳後項上生塊核五倍子香白芷末蜜調敷有人用雄黃砒乳香三味入米粽內捻餅盦癧瘤自能開腐肺痿肺癰腸癰二十二脈數應當發熱而又惡寒若有痛處當發其癰脈數而虛咳唾涎沫為肺痿脈數而實或滑咳而胸隱隱痛為肺癰脈緊而數膿為未成緊去但數膿為已成脈滑而數小腹堅滿小便或澀或汗或寒為腸癰設脈遲緊聚為瘀血下血則愈設脈洪數膿為已成滑為實數為熱衛數下降榮滑上升榮衛相干血為敗濁甚者腹脹轉側聞水聲肺痿熱在上焦其病多涎唾小便反難而數大便如豚腦欲咳不咳咳出干沫唾中出血上氣喘滿或燥而渴寸口脈數而虛按之澀甘草四兩乾薑二兩人參一兩姜三片棗三枚同煎肺癰乃風傷於衛熱過於榮血為凝滯蓄熱癰肺其病咳唾膿出口燥胸中隱隱痛喘滿不渴唾沫腥臭時時振寒吐出米粥寸口數而實按之滑小青龍湯治肺癰先解表之邪也此治腫瘍之法也葶藶大棗瀉肺湯治肺癰喘不得臥也葶藶炒黃研丸彈子大水三升入棗先煎二升入葶藶煎至一升頓服之先進小青龍三服後進此桔梗湯治咳胸滿唾如米粥當吐膿血甘草桔梗水煎葦葉湯治咳有微熱煩胸心甲錯此治潰瘍之法也葦葉二升切薏苡仁八兩栝蔞仁八兩桃仁五十個去皮尖煎服秘方栝蔞仁連穰一個煎服腸癰乃濕熱所為也薏苡仁七分附煨削敗醬各二分散治腸癰腹皮急身甲錯如脹本無積聚身無熱脈數者是水煎服之大黃牡丹湯治腸癰未成膿可下之大黃四兩牡丹皮三兩芒硝二兩瓜子一升桃仁五十個水煎頓服雲母膏有一女子腹痛百方不治脈滑數腹皮急脈當沉細今反滑數以此下之雲母膏丸梧桐大百丸阿膠烊入酒下之下膿血為度囊癰乃濕熱下注也濁氣流入滲道因陰道虧水道不利而然膿儘自安當歸甘草防風湯李方治便癰桃仁承氣湯張方治便癰便毒方胡蘆巴末服又川楝灰亦好乳癰奶房因厚味濕熱之痰停蓄膈間與滯乳相搏而成又有怒氣激其滯乳而成又兒口吹噓滯乳而成蓋乳房為陽明所屬乳頭為厥陰所經凡病皆陽明經也深者為岩治宜疏厥陰之滯清陽明之熱行汗血散腫結石膏煅清陽明青皮疏厥陰樺皮燒白芷栝蔞皮消腫甘草節行血蜂房氣鬱加臺芎香附葛根引經上姜酒飲又方大黃天花粉川歸甘草節一兩栝蔞子穿山甲陳壁土炒各一兩半酒丸骨疽因厚味及酒後涉水後寒攻熱邪深入髀樞穴左右痰積瘀血相搏而成附骨疽方蒼朮川柏青皮行虛加牛膝薑汁辛散甘草發不動加麻黃冬加桂夏加芩又防風通聖去芒黃入生犀角末浮萍末治骨疽附骨疽與白虎飛屍歷節皆相似歷節走注不定白虎飛屍按之亦能作膿著骨而生附骨疽痛按之無益內疽因飲食之火七情之火相鬱而發在腔子而向里非十腸胃肓膜也以其視之不見故名之曰內治宜四物加涼劑師云有人性急味厚左脅下一點痛每服熱燥之藥脈輕則弦重則芤知其痛處有膿因作內疽治癭狀多著肩項如堅硬不可移名石癭皮色不變名內癭赤脈交絡名血癭筋脈露結名筋癭隨憂怒消長名氣癭瘤狀隨氣凝結有骨脂膿血肉口瘡焰硝硼砂含口不開醋磨南星敷湧泉穴飲酒入口糜導赤散五苓散風寒結絕陽氣聲不出半夏一兩草烏桂各一錢煎服赤口瘡白礬飛沒藥乳香銅綠末摻白口瘡雄黃沒藥乳香各一錢輕粉五分巴豆末摻唇緊燥裂生瘡青皮燒灰豬脂調敷夜臥頭垢亦可口瘡痛五倍子一兩黃柏蜜炙活石各五錢銅綠末摻又白薔薇根汁嗽之有小兒口瘡不食以礬湯浸腳上半頓寬用蜜炙川黃柏炒殭蠶同為末敷之立下乳而安腳足上生毒瘡蜜佗僧黃連俱末敷又杜牛膝鹽䕋又旱蓮草即墨汁草也以鹽䕋以桑白皮打細作餅蓋干則易又無名異又黃柏末龍骨末敷陰瘡臘茶五倍子等分膩粉少許同敷又雄黃敷手癡瘡皂角輕粉枯礬黃連黃柏沙瘡塌地藤燒灰敷惡瘡霜後凋殘芭蕉葉乾末香油調敷油紙掩先洗用忍冬藤金絲草蔥椒煎又松上白蟻黃丹各燒黑香油調敷外有油紙掩上日易後用龍骨為末摻口上收肉又黃丹香油煎入朴硝抹上金絲瘡如繩線鉅細不一上下至心即死可於瘡頭刺之出血後嚼萍草根塗之安瘍家不治證斑疹二十三川歸甘草吳茱萸陳皮地黃治痘不透紫草紅花子芍藥川歸胡妥子煎服剪刀草汁調原蠶砂敷之又豬心血調片腦成膏以紫草茸湯化無腦以辰砂代敷之治斑瘡倒靨又論自吐瀉者為吉謂邪出也治宜消毒解火大便不利當微利之身溫者順身涼者逆切忌熱藥又當分氣血虛而補之云惡血留於命門待氣虛血虛脾虛相火生焉其證呵欠嚏噴足冷寒熱氣虛四君子主之血虛四物湯主之吐瀉少食為裡虛陷白倒靨灰白為表虛不吐瀉能食為實宜解毒芩連是也實而更補必結癰疽解毒方絲瓜仁單方亦可升麻芍藥酒炒甘草唐球黑豆犀角辰砂不治證黑陷耳尻熱者死斑痘疹喘者死凡丹從四肢入腹者死金瘡二十四火燒二十五癲狗二十六小兒科二十七脈小大便赤青飧泄手足溫者生寒者難已小兒一十六歲前純陽為熱多也肝只有余腎尚不足腸胃尚脆飲食難化食則為痰為積其病有四曰驚曰疳曰吐瀉其原有二曰飽暖張皆歸之濕熱常以牽牛大黃木通以治小兒諸病驚熱痰主急驚當瀉降火下痰丸養血藥作湯下脾虛主慢驚用補硃砂安神丸參朮湯下生人血研辰砂蟬蛻治急慢驚風疳因土濕或積或蟲黃連炒二錢胡黃連去果子積五錢阿魏去肉積醋煮神麯各一錢五丸如米大一方加蘆薈胡黃連神麯麥蘖使君子肉果半兩木香檳榔二錢糊丸治蟲積一切疳啼因肝熱黃連薑汁炒甘草竹葉煎服吐瀉因脾虛食積痢炒神麯蒼朮活石芍藥黃芩白朮甘草陳皮茯苓上下保和丸又胡黃連黃連蕪荑神麯炒山楂青皮陳皮蘆薈丸服血痢三黃丸不治證頭髮上逆者死汗出不流者死陷胸唇乾目直視者死口氣冷掌冷者死身強頭低者死便門腫起作坑者死鼻乾黑燥者死肚大青筋爪甲黑舌出咬牙魚口氣急皆死啼不作聲或作鴉聲或忽然大叫作聲皆死證婦人胎產二十八脈平而虛者乳子心脈洪大而滑肺脈微而不浮肝脈微橫不絕皆妊陰搏陽別謂之有子搏者逼近於下別者別出於上氣和血調陽施陰化謂之有子少陰脈動甚者妊子少陰脈心脈也尺中按之不絕者妊子三部浮沉正等按之無絕者妊寸微關滑尺數流利往來如雀啄者妊妊娠初時寸微小呼吸五至三月而尺數滑疾重以手按之散者是三月也重手按之不散但實不滑者五月也男女法左沉實疾大者為男縱者主雙右沉實疾大者為女縱者主雙注云縱則橫也離經脈一呼三至曰離經沉細而滑曰離經尺脈轉急如切繩曰離經脈浮腹痛引腰脊為欲生妊三月而渴脈反遲欲為水分復腹痛者墮妊五月六月脈數必壞脈緊必胞漏脈遲必腹滿而喘脈浮必水壞腫也妊六七月脈弦發熱惡寒其胎逾腹腹痛小腹如扇子藏閉故也當溫之附子妊六七月暴下水斗余必倚而墮妊七月八月脈實大牢強弦者生沉細者死妊月足身熱脈亂者吉新產脈沉小滑者生實大弦急者死焱疾不調者死新產得熱病脈懸小四肢溫者生寒清者死新產因傷寒中風脈實大浮者生小急者死脈微澀為無子弦大為無子皆血虛氣弱故也漏血下赤白日下數升脈急實者死緊大者死遲者生虛小者生寸關調如故尺絕不至者月水不利引腰絞痛氣積聚上搶胸脅也脈得浮緊當身痛不痛腹鳴者必陰吹寸口浮而弱浮為虛浮短氣弱有熱而無血趺陽浮而澀浮氣滿澀有寒少陰弱而微微少血弱生風胃氣下泄吹而正喧此穀氣之實也以發煎導之少陰滑而數陰中必瘡少陰脈弦白腸必挺核少陰脈浮而緊緊則疝瘕腹中痛半產而墮傷浮則亡血絕產惡寒少陰浮而動浮為虛動為痛必脫下凡婦人脈常欲濡弱於丈夫胎墮因虛而熱四物湯四君子湯加阿膠烏梅桑寄生黃芩治胎常轉動無時下血疼痛枳殼麩炒川芎各一兩熟地二兩糯米二合薑棗金銀同煎治傷胎轉胎因血虛有痰其狀胎滿逼胞致小便不利尿出不知時胎滿逼胞者蓋因痰胎避而下又因血氣不足不能升舉四物加活石貝母有痰加二陳湯甚者服藥後探吐惡阻因痰血相搏二陳湯加減主之胎婦腹脹因脾虛有熱而氣不利枳殼炒白朮黃芩治氣急胎驚兩脅膨脹腹滿連臍急痛坐臥不寧睡驚四君子湯加茯苓木香川芎川歸麥門冬胎水即腫滿俗名子腫因冷濕川歸芍藥茯苓白朮陳皮每四錢用鯉魚修理水煮熟去魚以汁盞半姜入藥同煎至七分空心服胎婦寒熱小柴胡去半夏胎痛因血少四物加香附紫蘇能安胎子懸即胎湊上心腹脹滿而痛因胎氣不和也大腹皮紫蘇陳皮白芍川芎川歸酒洗各一兩人參甘草各半兩薑蔥白煎服又治臨產驚恐氣結連日不下心痛因宿寒搏血血凝其氣氣與血並玄胡醋炒川歸陳皮酒糊丸又方加桂赤芍藥蒲黃木香乳香沒藥又方五靈脂蒲黃醋炒醋湯下即失笑散有寒加桂有熱加梔子氣加木香枳殼虛加川芎川歸祖按上二方治心痛則可有胎則忌或可施之產後心痛者子煩病若煩悶因二火為之麥門冬黃芩茯苓竹葉煎服一方加人參防風胎漏膠艾湯治胎動不安下血或胎奔上刺心短氣及治頓僕四物加膠艾無故下血腹痛不甚或下黃汁用野苧根炒一兩金銀各五錢水酒各一盞煎墜跌壓觸胎動腹痛下血用縮砂炒透末之酒下胞漏下血用生地黃末酒下一方加白朮地黃枳殼芩湯下治血虛有熱胎漏胎漏下血用芎歸水酒煎服探之若不損則痛止或動已損則逐下宿有風冷胎痿不長動傷易致損墜白朮川芎一兩川椒去口炒七錢半牡蠣煅五錢酒下腹痛加芍藥心下痛加川芎川歸川芎芍藥乾薑酒下又方治惡露不散臍腹堅脹川歸川芎牡丹皮一兩玄胡桂蜜丸陰脫乃氣血下溜四物黃芩一兩蝟皮燒存性五錢牡蠣煅二兩升麻飲下又硫黃烏賊骨五錢五味子一錢末摻患處又蛇床子炒熱布裹熨之陰腫桃仁枯礬五倍子等分末敷上諸淋白茅根一兩瞿麥穗茯苓五錢蒲黃桃膠活石甘草一錢子目十個燒葵子人參各二錢石首魚腦骨二十個燒上薑燈心木通湯下虛煩人參川歸熟地麥門冬桂芍藥論凡產間臨月未誕者凡有病先以黃芩白朮安胎然後方用治病藥發熱及肌熱者芩連參耆主之腹痛者宜白芍藥甘草感冒者依解利治之凡產後諸病忌用白芍藥宜黃芩柴胡內惡物上衝胸脅者宜大黃桃仁血刺痛者宜當歸內傷發熱者宜黃連渴者宜茯苓忌半夏喘嗽去參腹脹去甘草產後身熱血證一同傷寒若傷寒當有痛處脈弦而遲宜解傷寒血虛者無痛脈弱而澀宜補其血酒煮當歸丸治一切虛證下脫脈洪大無力按之空虛不鼓此中寒之證川歸一兩茴香炒五錢附炮良薑各七錢上四味銼以酒一升半煮至酒盡焙乾黃鹽炒丁香苦楝甘草各五分蟬蛻三錢柴胡二錢升麻木香一錢玄胡四錢上九味同前酒煮四味俱末酒煮麵糊丸空心醋湯下固真丸治帶久不止臍腹冷痛目中溜火此皆寒濕乘其胞內肝經伏火也白石脂一錢燒赤水飛研白龍骨二錢此二味枯澀乾薑炮瀉寒水四錢黃柏五分引用柴胡一錢本經芍藥虛加人參黃耆上末麵糊丸空心下血竭將枯加葵花郁李仁紅葵丸治白膿帶下此腸胃有膿也膿去儘自安葵根一兩白芷五錢赤芍枯礬二錢半上蠟丸米飲下又黃荊子炒焦米酒下亦治白帶白濁婦人室女搐搦二十九凡婦人無病一旦忽感手足搐溺痰涎壅塞精神昏憒不省人事似癇非癇也此肝為病也婦人乃血虛七情感而生風室女乃血實七情感而生熱帶三十因濕熱結於帶脈津液泛溢入小腸為赤入大腸為白又云熱者血也血積多日不流從金之化即為白淫治宜同濕證以十棗禹功導水降火流濕之劑主之脈浮惡寒不治因痰積流下滲入膀胱宜升宜吐調以半夏茯苓陳皮蒼朮白朮輩肥人多濕痰海石半夏南星治痰黃柏治濕熱蒼朮燥濕活石流濕熱川芎升之椿皮濕之香附調氣風痛加牛膝瘦人多熱黃柏黃連活石椿皮川芎滑者加龍骨赤石脂滯者加葵花血虛四物湯小胃丸治濕熱帶下下之後以苦楝丸調之苦楝酒浸茴香炒川歸各一錢酒糊丸桐子大酒下腰腿痛加四物羌活防風虛甚加參耆甘草白芍藥經水三十一血為氣引而行血未來而先有病皆氣之患也血來而後有病者皆血之虛也有血之熱者將來作疼乃氣實也桃仁紅花香附連不及期者乃濕熱也四物加連過期有二一者血少也芎歸參湯紫黑成塊乃有熱也加連二者多痰二陳湯加蒼朮香附川芎肥人多痰也閉而不行乃虛而熱來而成塊乃氣之滯錯經妄行乃氣之亂經脈不行有六血生於心憂愁思慮則傷心心氣停結故血閉不行左寸沉結宜調心氣通心經使血生而自通或因墮胎或產多其血先少而後不通此血枯也脈兩尺弱少宜生血血為氣滯結而成塊日漸增長宜攻之久盜汗致血乾枯而經不通宜補血是汗出於心血生於心久患潮熱則血枯燥蓋血為熱所消治熱退則血自生脾胃不和飲食少則血不生血者飲食所化經云二陽之病發心脾女子不月崩漏三十二因熱因虛由脾胃有虧下陷於腎與相火相合濕熱下迫脈洪數而實先見寒熱往來心煩不得眠臥宜大補脾胃升舉氣血由心氣不足其火大熾旺於血脈之中形容似不病者此心病也四物湯加鎮墜心火之藥補陰瀉陽由腎水真陰虛不能鎮守胞絡相火故血走而崩是氣血俱脫為大寒之證輕手其脈數實舉手弦緊或澀皆陽脫也陰火亦亡或渴皆陰燥宜溫之補之升之方防風羌活升麻柴胡川芎一錢升陰散火黃芩黃連黃柏知母五分涼血瀉相火川歸五錢黃耆補血涼血胃客寒心痛加草豆蔻神麯氣短加參耆朮冬寒加麻黃桂枝久不止加膠艾血氣俱脫大寒證加附子肉桂乾薑治本四物虛加參朮熱加芩連寒加薑桂香附行氣治標白芷湯調棕櫚灰五靈脂亦治鹿角灰蒲黃炒黑亦治凌霄花發灰用荊芥四物湯下大妙臟腑病及各部所屬藥性三十三肝病則胃脘當心而痛上支兩脅鬲咽不通飲食不下甚則耳鳴眩轉目不識人善暴緛戾脅痛嘔泄令人善恐虛則脅下堅脹寒熱腹滿不食目無所見耳無所聞筋攣節痛爪甲枯青色善恐脈沉細而滑實則脅下痛寒熱心下堅滿氣逆頭暈頸直背強川芎臣同上五味子臣溫同上茯神君益智臣安心氣人參君定心炒鹽心實脾病肺病左胠脅痛心脅滿分小腹不可轉反側寒清於中咳逆鶩溏嗌乾面塵脫色丈夫㿗疝婦人小腹痛虛則語嘶用力掉顫少氣不足以息耳聾咽乾咳喘鼻清涕恐怖脈沉緩實則胸膈滿上氣咳逆咽不利鼻口亦張飲無度痰黏肩背痛脈不上不下肺絕口似魚口氣出不快唇反無紋皮毛焦三日死又鼻開而黑枯足滿泄不覺喘而目直喘急短氣大腸絕泄則無度六日死悲傷肺為氣消陰縮筋攣肌痹脈痿男為數溲女為血崩酸苦辛泣則臂麻肺虛主面色恍白咳嗽涎唾瘦瘁氣促口無味怯寒喉痹唇反無色飲食胸痞不快鍾乳粉君補肺虛紫石英溫補肺白茯苓君益肺氣丹砂臣寒溫補白朮臣補肝磁石君同上桑寄生臣補茯神臣補款冬花臣補益氣人參末入山稜末入肺實主面赤唇焦頭皮四肢癢痰涎膠黏咽喉痛或頸腫皮膚熱瘡或發作寒熱當歸臣利肺氣升麻臣寒瀉肺氣木香君通同上桔梗臣同上貝母臣解同上石膏臣寒利胃氣百合臣退肺壅下痰桑白皮臣瀉肺氣款冬花臣利肺氣紫蘇子臣退肺氣紫菀君降肺氣青皮臣止肺氣枳實臣通三焦熱牛蒡子臣轉肺氣荊芥穗臣涼肺氣熱赤芍藥臣訶子末入止大府黃芩末大腸冷虛腸鳴瀉痢嘔逆手足冷肉果君溫暖止大腸泄白果君溫暖脾胃溫大腸訶子君溫止瀉人參君寒暖胃潤腸白朮固元陽和氣扁豆臣生氣止泄茯苓君暖胃止泄桂君熱和脾胃溫大府良薑臣熱暖胃和腸附子君熱壯胃暖腸胃氣吳茱萸臣生氣止吐腎虛盜汗夢齒脫落余病同前虛條肉蓯蓉君壯陽道益精陽起石君強腎牛膝君補腎壯陽石斛君壯腎磁石君平補虛益腎氣熟地君平同上巴戟強陽益腎菟絲子君補腎冷烏藥君益腎天雄君壯腎氣益智君溫暖腎虛冷青鹽臣補腎附子少陰行經暖壯陽道末入桑螵蛸臣強壯陽道豬腎君溫補益腎海狗腎君補暖益腎雀卵臣助陽道蛇床子臣溫強陽白茯苓君補虛損添精黃柏末入知母末入腎實主耳痛頭皮肩項腫及腳心痛腿漆生瘡腰腫或鮮血目熱淚小便澀痛郁李仁臣寒降腎氣蒺藜臣轉腎氣金鈴子臣退腎熱地骨皮臣導腎氣檳榔臣瀉腎氣青木香同上車前子臣利小便除腎絕降腎氣防風臣益腎治皮膚癢枳殼臣降腎氣青皮臣寒同上牽牛疏導腎氣桑白皮臣利腎氣黃柏臣降腎氣地龍臣涼益腎水膀胱寒熱小便淋澀或尿血石葦臣平利水道瞿麥臣退小便熱芍藥臣利水道川歸臣平療便痛溺血青皮臣導水府蔥臣清小便木香臣利小便血車前子臣寒利小便溺燈草臣通小腸京山稜臣利小便黃芩臣寒利小便血油麻臣寒滑小府冬葵子臣治淋蘿蔔子臣通小府白薺臣同上生地臣冷利小腸熱木通末入祖按藥性稟定之君臣千古之經也立方主治之君臣一時之權也學者自宜會心得之按舊本系國初時孝順方處善浦陽戴元禮同集於洪武庚戌年三月初二日戴元禮丹溪先生之高弟也今詮次成於天啟辛酉年八月中秋日丁承祖謹識音釋三十四暍音曷中熱也鼾希連音汗平臥息也鼽音求病寒寒也齄音查壯加切鼻上炮也臗音寬音坤尻也胠挈去區三音腋下也胕音附肺附也䐜音嗔充人切引起也腨音時兗切腓肚也胵音癡充脂切鳥胃也胗音軫章忍切唇瘍也疹同音滅莫結反眵也眄音面目偏合也眴音懸胡絹反目搖也瞤音閏如倫切目動也瞪音滕如弓直耕二切目直視瞀音茂莫構亡角二切目不明眊音毛老眊目不明也睫音截子葉切目旁視也眵音癡充支切目相背也𥉂音謊目不明也瘈音熾瘲音縱之用切小兒病瘲同上
