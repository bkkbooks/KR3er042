body:
  text: 卷之上評脈一凡男女當以左手尺脈常弱右手尺脈常盛為平脈諸按之不鼓為虛寒脈諸搏手為寒涼或寒藥致之脈兩手相似而右為甚或責胃虛脈少有力勝則似止元氣不及脈諸短為虛諸大為虛脈澀而盛大外怕寒證名寒中注云寒留於血脈澀故大也脈澀與弦而大按之有力為實無力為虛脈滑關以上見為大熱關以下見為大寒注云水並於上從火化火併於下從水化脈沉遲寸微滑者為實寸微尺緊其人虛損為陰盛陽微故也脈小而虛不可損氣脈大而實不可益氣兩寸短小謂陽不足病在下兩尺不見或短小乃食塞當吐之兩寸不足求之脾胃當從陰引陽兩尺脈虛為寒宜薑附兩關脈實上不至發汗下不至利小便兩關沉細此虛也宜溫補之右腎屬火補之巴戟杜仲左腎屬水補之地黃山茱萸黃柏傷寒寸脈浮滑者有痰宜吐雜病寸脈沉者屬痰宜吐凡脈有力者為實無力者為虛假令脈浮則為陽盛陰虛脈沉則為陰盛陽虛此有則彼無彼有則此無又如弦木實金虧土虛也凡脈來者為陽為氣去者為陰為血假令來疾去遲為陽有餘而陰不足故曰外實內虛出候外入候內久新病脈長病脈虛而澀虛而滑虛而緩虛而弦虛而結浮而滑實而滑實而大微而伏細而軟如屋漏如雀啄如羹上肥如蜘蛛絲如霹靂如貫珠如水淹皆死脈也卒病與長病條下反者死候形脈相應肥人脈細欲絶者死瘦人脈躁者死身澀脈滑者死身滑脈澀者死身小脈大者死身大脈小者死身短脈長者死身長脈短者死察視二黑氣起於耳目鼻上漸入於口者死白色亦然赤色見於耳目額上五日死面青目黑面青目黃面青目白面青唇黑皆死面白目黑面白目白面赤目黃面赤目白面黑目白面黑唇青面黑目青面黃目白面黃目黑面黃目赤皆死張口如魚出氣不反者死循摸衣縫者死無熱妄語者死遺尿不知覺者死爪甲青者死爪甲肉黑者死舌卷卵縮者死眉傾目直者死唇反人中滿者死陰陽俱閉失音者死神氣不守聲嘶者死汗出不流者死口臭不可近者死目直視者死肩息者死齒匆黑色者死心絶肩息回眄目直視者一日死肺絶氣去不反口如魚口者三日死骨絶腰脊痛不可反側者五日死脾絶口冷足腫脹泄者十二日死腎絶大便赤澀下血耳干腳浮舌腫者六日死筋絶魂驚虛恐手足爪甲青呼罵不休者九日死腸絶髮直汗出不止不得屈伸者六日死肝絶恐懼伏臥目直面青者八日死又曰一日死腎絶齒落目黃者七日死治法濕熱病多相火病多土病多氣常有餘血常不足肥者血多濕多瘦者氣實熱多白者肺氣弱血不足黑者腎氣有餘下用補相間勞病忌寒涼辛苦飢飽勞役疼痛皆傷血肺癰非吐不可藥峻用酸收治病先調氣久病要開鬱諸病尋痰火痰火生異證腑病責臟用臟病責腑用五臟三肝胃脘當心而痛上支兩脅肝經也鬲咽不通飲食不下土衰病也甚則耳鳴眩轉目不識人善暴僵仆裡急緛戾脅痛嘔泄令人善怒也虛則目無所見耳無所聞善恐如人將捕之心胸中熱嗌乾右胠滿皮膚痛寒熱咳喘驚惑狂妄一切血症胸中痛膺背肩甲間痛兩臂痛虛則胸腹大脅下與腰背相引而痛脾胕腫骨節腰脊頭頂痛大便難積飲痞鬲霍亂吐下飧泄腸鳴脾熱生虛肺骨節內變左胠脅肋痛寒積於中咳逆鶩溏心脅滿引小腹不可反側嗌乾面塵脫色丈夫㿗疝婦人小腹痛實則咳逆肩背痛虛則少氣不能報息耳聾咽乾腎腿腰痛大關節不利屈身不便腹滿痞堅寐汗實則股脛腫身重虛則胸中痛大小腹痛清厥怒為嘔血飧泄胸滿脅痛食則氣逆而不下為喘渴煩心為消疸肥氣目盲耳閉筋緩怒傷肝為氣逆悲治怒喜為笑不休毛革焦陽氣不收甚則狂喜傷心為氣緩恐治喜悲為陰縮筋攣肌痹脈痿男為數溲女為血崩酸鼻辛額汗則臂麻悲傷肺為氣消喜治悲驚為潮涎目睘吐癡癇不省人事驚傷心為氣亂習治驚勞為咽噎喘促嗽血唾血腰痛骨痿陰痿男小精女不月勞傷筋為氣耗逸治勞思為不眠好臥昏瞀三焦痞塞咽喉不利嘔苦筋痿目淫不嗜飲食思傷脾為氣結怒治思恐為破䐃脫肉為骨酸痿厥為暴下淥水為面熱膚急為陰痿為懼而脫頤恐傷腎為氣不行思治恐治血用行氣治氣用行血汗吐下溫水火刺灸八法四可汗脈浮大可汗問病者設利為虛不可汗浮而緊可汗太陽病脈浮弱數者可汗陽明脈遲汗出多微惡寒表未解可汗日晡發熱如瘧此屬陽明脈浮虛可汗下利後身痛清便自調可汗不可汗脈沉細為在裡不可汗濡弱為血氣虛不可汗脈浮而緊法當身痛當以汗解假令尺脈遲者不可汗尺遲則血少故也傷寒有風溫濕溫二症忌汗見後傷寒類傷寒頭疼形象中風常微汗出又自嘔者心懊憹發汗則痊傷寒脈弦細頭痛而反熱此屬少陽不可汗太陽與少陽並病頭項強痛或眩冒心下痞堅不可汗少陰病咳而下利譫語者此強汗之故也氣動一切左右上下不可汗咽中閉寒不可汗汗之則吐血亡血家不可汗汗則虛栗厥不可汗汗則聲亂咽嘶衄不可汗汗則耳聾目直口瘡不可汗汗則痓淋不可汗汗則便血冬時發汗則吐利汗家不可重汗汗必恍惚脈短者死下利清穀不可汗汗必腹脹滿咳而小便利不可汗汗之則厥逆諸逆發汗劇者言亂睛眩者死可吐寸口脈微細胸中痞堅氣上衝咽喉不得息此為胸有寒可吐病胸上諸實胸中鬱郁而痛不能食欲使人按之而反有濁唾下利日十餘行脈反遲寸口微滑可吐病者手足厥冷脈乍緊邪結在胸中心下滿煩飢不能食可吐傷寒脈浮滑可吐雜病脈沉可吐不可吐諸四逆厥者不可吐虛家不可吐胸膈上有寒飲乾嘔者不可吐法當溫之可下脈滑而數者有宿食可下脈雙弦遲心下堅脈大而緊者陽中有陰可下下利三部脈皆平按其心下堅者可下傷寒後脈沉為內實可下病無表里證發熱七八日雖脈浮數可下傷寒有熱而小腹滿應小便不利今反利者此為血蓄可下傷寒六七日結胸實熱脈沉緊心下痛按之如石可下太陽中風下利嘔逆表解汗出發作有時頭痛心下痞堅可下太陽病不解熱結膀胱其人如狂其血自下可下陽明證喜忘必有瘀血大便雖堅必黑可下陽明證發熱汗出則解復如瘧日晡發熱脈實可下陽明證譫語潮熱而反不能食必有燥屎可下脈滑實可下陽明證發熱汗多者急下之不吐而心煩者可下二陽並病太陽證罷但發潮熱手足汗出大便難譫語可下少陰病得之二三日口燥咽乾急下之又六七日腹滿不大便可下少陰病下利清水色青者心下必痛口乾燥者可下不可下脈濡而弱氣血虛不可下脈浮而大氣血虛不可下尺脈弱澀者不可下趺陽脈浮而數浮傷胃數動脾此非本病醫下之使然也諸外實不可下下之微發熱亡脈則厥諸虛不可下下之則渴引水者易愈惡水者劇動氣不可下咽中閉塞不可下下之上輕下重水漿不下體痛腹下利結胸證其脈浮大不可下下之則死太陽與陽明合病必喘而胸滿不可下太陽與少陽合病心下痞堅項強而眩不可下太陽病有外證未解或陽多者熱不可下太陰病腹滿而吐食不下下之則甚厥陰病消渴氣上衝心中疼熱飢不食甚下之不肯止少陰病飲食入則吐脈弦遲胸中寒也不可下陽明證潮熱有燥屎可下不堅不可下陽明病身合赤色者不可下必發熱身黃小便不利陽明病當心下堅滿不可攻攻之遂利不止者死止者愈陽明病自渴若發汗小便自利此為內竭雖堅不可攻宜導之傷寒五六日不結胸脈虛復厥者不可下下之亡血死傷寒嘔多雖有陽明症不可攻藏結無陽證寒而不熱其人反靜舌上胎滑不可下諸四逆厥不可下病欲吐者不可下下利脈浮大為虛強下之故也設脈浮革腸鳴屬當歸四逆湯可溫病發熱頭痛脈反沉身更疼宜溫之下利身痛腹滿宜濕之脈遲緊為痛未欲止宜溫之少陰病脈沉者宜溫之少陰下利脈微澀者即嘔汗出必數更衣反小宜溫之自利不渴屬太陰其藏有寒宜溫之下利欲食者宜溫之不可溫可水太陽病發汗後若大汗出胃中乾燥煩不得眠欲飲水者少與之愈厥陰病渴欲飲水少與之宜服五苓散霍亂頭痛發熱體疼熱多欲飲水屬五苓散嘔吐而病在膈上後必思水急與之五苓散不可水發汗後飲水多者必喘以水灌之亦然大吐大下之極虛復極汗與水即噦所以然者胃中虛冷故也可火不可火太陽中風或在表或脈浮皆不可火若以火劫汗而兩熱相搏則津液枯竭可灸少陰得之一二日口中和背惡寒者可灸少陰吐利手足不逆反熱脈不至可灸少陰傷寒六七日脈微手足厥煩躁可灸其厥陰不還者死傷寒脈促手足厥逆可灸少陰厥陰主逆諸下利手足厥無脈可灸灸之不溫反微喘者死可灸足大敦陰凌泉商丘不可灸微數之脈不可灸因火為邪浮脈當汗不可灸因火而盛可刺不可刺五臟虛實五肝虛脅下堅脹寒熱腹滿不食如人將捕目暗黑花筋攣節痛爪枯青色善恐脈沉細而滑實脅下痛寒熱心下堅滿氣逆頭暈頸直背強筋急目赤頰腫耳聾善怒脈浮大而數中風左部浮弦中寒左關緊弦脹水惡血膽主嘔汁肝主脹心虛心腹暴痛心膈脹滿時唾清涎多驚悲恍惚少顏色舌本強脈浮虛實心神煩亂面赤身熱口舌生瘡咽燥頭痛手心熱衄血喜笑脈洪實中風中風本位浮洪中寒本位洪緊小腸脹水主宿食脹憂思脾虛四肢不舉飲食不化吞酸或不下食食則嘔吐腹痛腸鳴溏泄脈沉細軟弱實心胸煩悶口乾身熱頰腫體重腹脹寒飢舌根腫四肢怠墮泄下利脈緊急實中風中風本位浮遲中寒本位沉緊細脹水醉飽胃主癖脹肺虛語嘶用力棹顫少氣不足咽中干無津液咳喘鼻流清涕恐怖耳聾脈沉緩實胸膈滿上氣喘逆咽中不利鼻赤口張飲食無度痰黏肩背痛脈不上不下中風中風本位浮澀短中寒本位緊澀脹水大腸主宿食脹溏泄腎虛腰背切痛不得俯仰足腿痠手足冷呼吸少氣骨節痛腹結痛面黑耳鳴小便數脈浮細而數實舌燥咽乾腫心煩胸膈時痛喘嗽小腹滿腰強痛體重骨節下熱小便黃腹腰腫盜汗脹泄中風中風本位浮滑中寒本位沉緊而滑冷濕房勞脹水膀胱虛面赤色無液尿多寐中不覺小腹氣痛攻衝腹脅實小便不通或澀尿血淋閉莖中痛脈沉濡滑六腑虛水穀不化腸鳴泄利吐逆手足冷實糞結皮膚瘙癢致廁艱難五臟絶死六心絶肩息回眄目直掌腫狂亂心悶絶熱一日死心頭痛而咳不止關節不通身重不已三日死肝絶汗出如水恐懼不安伏臥四肢乏力目直如盲面青舌卷蒼黑泣下八日死頭痛目眩肢滿囊縮小便不通又云身熱惡寒四肢不舉脈當弦長今反短澀十日死脾絶口冷足腫脹泄不覺面浮黃唇反十二日死色黃體重失便目直視唇反張爪甲青四肢節痛吐食脈當大緩反弦死肺絶口如魚口氣出不快唇反無紋皮毛焦三日死足滿泄利不覺鼻孔開而黑枯喘而目直言音喘急短氣腎絶大便赤澀耳干下血舌腫足浮齒痛目肓腰折汗如水發無澤面黑腿筋痛小便閉兩脅脹目肓又云陰縮小便不出出而不快胃絶口噤唇黑四肢重如山不能收持大小便自利無休飲食不入七日死又舌強語澀轉筋卵縮牽陰股痛不食鼓脹變水泄不臥又云齒落目黃七日死小腸絶髮直汗不止不得屈伸大腸絶泄利無度六日死筋絶驚恐爪甲青呼罵不休九日死骨絶腰脊痛不可反側腎中重足膝腹平五日死肌絶口冷足腫脹泄不知人十二日死脈七圖附後浮在皮膚按之不足舉之有餘虛也人迎風邪在表氣口陰陽耗散左寸因風頭痛心昏有熱右寸宿食滯氣肺風逆喘左關因脅下滿右關脾食傷胃風趺陽胃滯左尺如經右尺腰腫腳弱芤與浮相似血虛也人迎風熱血湧氣口積血在胸左寸衄血右寸血關上脾胃虛熱腸癰便血尺中血淋滑浮中如有力漉漉如欲脫與數相似為實下陽氣衰左寸伏痰外熱右寸左關蓄血在肝右關痰積趺陽胃氣不行左尺因邪相干腰痛右尺便精遺瀝滯下實大長微弦強為痛嘔風寒人迎風寒熱盛氣口喘嗽上迫左寸氣壅咽喉胸中痛尿血不利右寸如經身熱大便祕左關肝實血多肋下痛右關胃實脾虛為痛為嘔食不消大便不利左尺小腹痛小便不禁右尺弦浮緊為弦為水氣中虛寒癖拘急飲瘧左寸風寒相侵頭痛心痛右寸痰飲宿食左關筋急瘧疾忿怒血聚右關胃脘寒痛左尺如經右尺腰痛小腹拘急緊數如切繩為寒人迎感寒氣口頭痛拘急左寸心痛或虛右寸咳嗽喘急左關兩肋痛滿右關胃痛蛔左尺如經右尺寒濕在下焦洪與浮大相似為氣熱人迎寒壅諸陽氣口氣實攻搏左寸實熱右寸疝氣燥結傷食左關風熱在肝右關反胃胃熱左尺如經右尺熱在下焦微極細而軟似有似無按之欲盡輕手乃得一日小一日薄一日手下快與澀相似為虛左寸亡汗右寸吐血左關肝虛少血右關如經左尺如經右尺失氣遺泄沉為水實鬼疰左寸血實右寸氣實人迎寒搏陰經氣口血滯而凝左關血癖在肋下右關左尺如經右尺腿膝疼緩浮大而軟與遲相似為虛人迎風虛煩喘氣口怒極傷筋左寸血虛頭痛眩暈右寸肺風乘脹如經左關風痹血耗筋脈弛張右關風熱燥結左尺遺瀝右尺如經腎虛澀細而遲往來難且或一止復來浮而短又短而止為少血寒濕左寸短氣心血少右寸如經左關如經右關胃氣不足如經左尺如經困憊右尺大便難小便數遲三至按之牢舉不足按有餘為寒左寸心寒痛右寸咽酸左關血澀脅下痛右關如經左尺大便難水穀不化右尺如經伏至骨方得為實水氣痰飲人迎寒濕氣口積聚左寸如經右寸肺痿痰左關驚悸水泄右關如經左尺疝瘕冷凝在下右尺水穀不化濡極軟而浮細按之無舉之有餘輕手乃得與遲弱相似為虛左寸如經陽弱惡寒腎邪入於心右寸唾涎沫飧泄虛喘息左關筋弱縱緩右關濕虛冷左尺小便難虛右尺腳痹弱極軟而沉細舉之無按之乃得為虛悸熱左寸如經陽虛右寸氣虛短人迎風濕縱緩氣口筋骨弛左關風熱入肝血虛右關脾弱多泄少食胃或客熱左尺如經虛右尺大便溏滯下細略大於微常有但細耳為血氣俱虛人迎濕中諸經氣口少氣涎凝左寸心虛勞神右寸氣憂傷左關驚悸脅痛肝血少右關如經血耗左尺右尺遺泄小便利數為虛熱人迎風壅燥盛氣口陰虛陽並左關怒血虛筋急右關脾熱食症左尺如經右尺大便難熱在下動見關上無頭尾大如豆動搖不進不走為痛虛驚左寸心驚神恐右寸寒極冷痛左關血虛右關脾泄為痛左尺真氣俱竭虛遲大而軟按之不足豁然空虛也人迎冒暑氣泄氣口血氣走越左寸心虛神不安右寸肺虛邪易侵左關膕虛血少右關脾虛寒泄左尺髎精漏右尺傷暑促去來數而一止復來皆以痰飲氣血留滯不下結去來緩時一止復來皆積革代散同圖動為恐為痛為驚為革革代散死又革為虛寒高下大小體也周身經穴八橫骨至內輔上廉一尺八寸髀外骨環中跳瀆髀骨外膝上五寸伏兔膝上六寸陰市膝上三寸箕門魚腹上筋間股內廉陰包膝上四寸股內上廉至內踝一尺六寸半太陽委中合陽膕下二寸承筋跟上七寸承山腿肚下分肉間跗陽外踝上二寸少陽陽關犢鼻外陽陵上三寸陽陵陽輔外踝上四寸懸鐘外踝上三寸陽明犢鼻膝臏下骭大筋罅中三里三寸上廉寸豐隆外踝上三寸下廉上廉下三寸少陰陰谷膝內輔骨後後大筋下小筋上屈膝取之築賓內踝上腨分間復溜踝上二寸太陰陰陵地機膝下五寸漏谷內踝上六寸三陰交內踝上三寸厥陰曲泉膝內輔骨下曲膝橫紋頭膝關犢鼻下二寸中都內踝上七寸內踝至地三寸太陽崑崙外踝後申脈外踝下京骨大骨下少陽丘墟外踝如前去臨泣三寸臨泣寸半地五會寸俠溪陽明解溪寸半衝陽三寸陷谷二寸內庭厥陰中封內踝前寸太衝本節後二寸行間太陰商丘內踝微前公孫本節寸太白大都少陰呂細內踝後肘至腕一尺二寸半列缺側腕上寸半尺澤孔最腕上七寸經渠寸口太淵曲澤郤門去腕五寸間使三寸內關去腕二寸大陵少海靈道通里腕後寸神門曲池三寸三里寸上廉寸下廉溫溜腕後五寸半偏歷腕後三寸陽溪四瀆肘前五寸三陽絡寸支溝腕後三寸外關腕後二寸陽池小海支正腕後五寸會宗腕後三寸陽谷肩至肘一尺七寸大椎下至尾骸𩨬二十一椎共長三尺志肓胃意陽魂關噫神膏魄附室門倉舍綱門膈嘻堂肓戶分白中胞小關大氣腎三胃脾膽肝膈督心厥肺風大環旅肓腸元腸海俞焦俞俞俞俞俞俞俞陰俞門杼二十一二十十九十八十七十六十五命門十三十二脊中十九八七六五四三二一手陰陽起止太陰肺少商在手大指內側去爪甲韭葉大中府在中部四行雲門下一寸少陰心少衝在手小指內廉去爪甲一韭葉大極泉厥陰心胞中衝在手中指內廉去爪甲韭葉大天池在側腋部乳下一寸陽明大腸商陽在手次指內側迎香在鼻孔傍五分直陷縫中太陽小腸少澤在手小指外廉去爪甲一分聽宮在耳珠少陽三焦關衝在手無名指端去爪甲韭葉大耳門在耳前缺處足陰陽起止太陰脾隱白在足大指內側端去爪甲如韭葉大包在腑下六寸厥陰肝大敦在足大指去爪甲一韭葉大期門在乳下四寸不容傍一寸半少陰腎湧泉在足底心屈足第三縫中腧府在膺部一行璇璣之傍二寸巨骨之下陽明胃厲兌在足次指端去爪甲一分頭維在眉上額角入髮際陷中小陽膽竅陰在足第四指端去爪甲一分童子窖在肩外尖尺處太陽膀胱睛明在目內淚孔中至陰在足小指外側去爪一分歌曰脈起少商中府上大腸商陽迎香二足胃厲兌頭維三脾部隱白大包四膀胱睛明至陰間腎經湧泉腧府位心包中衝天池隨三焦關衝耳門繼膽家竅陰童子窖厥行大敦期門已手心少衝極泉來小腸少澤聽宮云傷寒九脈法大浮數動滑為陽也沉澀弱弦微為陰也凡陰病見陽脈者生凡陽病見陰脈者死脈浮而數陽脈也能食不大便者裡實也名曰陽結期十七日當劇為陽氣固結陰脈不得而雜之陽結為火至十七日傳少陰水當愈水不能制火故劇脈沉而遲陰也不能食身體重大便反硬陰病也名曰陰結期十四日當劇陰病見陰脈當下利今反硬者是陰氣結固陽不得而雜之陰結屬水至十四日傳陽明土當愈土不制水故劇此病要死脈靄靄如車蓋者名陽結也大而厭厭聶也為陽氣鬱結於外不與陰雜也脈纍纍如循長竿者名曰陰結也連連強直也為陰氣鬱結於內不與陽雜也脈瞥瞥如羹上肥者輕浮也陽氣微也衰也脈縈縈如蜘蛛絲縈縈惹之不利者至細也陽氣衰也脈綿綿緩而連綿如瀉漆之狀者前大後小也亡其血也脈來緩時一止復來名曰結結陰也陰氣勝而陽不能相續也脈來數時一止復來名曰促促陽也陽氣勝而陰不能相續也脈三部浮沉大小遲數同等為陰陽和平雖劇當愈脈浮而洪邪氣勝也自汗如油喘而不休正氣脫也水漿不下胃氣盡也形體不仁榮衛絶也乍靜乍亂正邪交爭此為命絶汗出發潤津脫也喘而不休氣脫也此狀為肺先絶也陽反獨留身體大熱是血先絶為氣獨在形體如煙燻身無精華血不榮也直視心經絶也頭搖陰絶陽無根也此為心先絶也心主血唇吻反青脾部見木色四肢漐習手足振動此為肝絶也環口黧黑脾主口無精華則黑冷汗陽脫也發黃此為脾絶也溲便遺屎腎絶不能約制也狂言腎藏志志不守也目反直視此為腎絶也脈陰陽表裡也俱緊緊為寒口中氣出唇口乾燥陽氣漸復也倦臥足冷鼻中涕出舌上胎滑知陰獨在也勿妄治也自解到七日微發熱手足溫者陰氣已絶陽氣得復解矣到八日以上反大熱者陰極變熱邪氣勝正此為難治設使惡寒者必欲嘔也寒邪發於上焦腹內痛者必欲利也寒邪勝於下焦脈陰陽俱緊至於吐利其脈獨不解緊去乃安為欲解矣若脈遲至六七日不欲食為吐利後脾胃大虛此為脫水停故也為未解食自可者脾胃已和寒邪已散為欲解病六七日手足三部脈皆至陽正勝也大煩熱也而口噤不能言其人躁擾者則陰陽爭勝也此欲解也脈和其人大煩目內眥皆黃者欲解脈不和者病進脈浮陽也而緊陰也按之反芤虛也此為本虛當戰汗出而解脈浮而數陽也按之不芤陽實也不戰而汗解矣脈自微邪氣弱正氣微此以曾經汗吐下亡血內無津液此陰陽自和必不汗不戰而自解風傷陽則浮虛傷陰則牢堅沉潛水蓄支散也飲急絃動陰陽相搏則為痛數則熱煩設有不應知變所緣三部不同病各異端人恐怖脈形如循絲纍纍然面白脫色者血氣不足人愧脈浮面色乍白乍赤者神氣怯也人不飲食脈自澀澀陰也主亡津液唇口乾燥也下利三部無脈冷氣在胸中令脈不通然尺中時一小見脈再舉頭者腎氣也脾虛腎氣所以乘若見損脈來至為難治趺陽脈滑而緊滑者胃氣穀氣實緊者胃氣陰氣強特實擊強痛還自傷寸口脈浮而大浮為正虛大為邪實在尺為關邪關下焦在寸為格邪格上焦關則不得小便格則吐逆趺陽脈伏而澀伏者胃氣伏而不宣則吐逆水穀不化澀者脾氣澀而不布則食不入名曰開格趺陽脈大而緊者當即下利為難治下利者脈微小今反緊者邪勝也寸口諸微亡陽諸濡亡血諸弱陰虛也發熱諸緊為寒諸寒乘虛寒乘氣虛抑佚陽氣則為厥郁昏也胃不仁強直不知人也以胃無穀氣脾澀不通上下也使口急不能言戰寒在表也栗寒在裡也病欠者陰陽相引故欠和也無病言遲者風也風中經絡舌難運用搖頭者里痛也行遲者表強也邪中經絡也坐而伏者短氣也坐而一腳下者腰痛也裹實護腹如卵者心痛也傷寒證治冬時觸冒殺厲之氣即時為病名曰傷寒寒毒藏於肌膚伏留至春再感乖戾之氣名曰春溫至夏變為暑病春濕者至夏至以前也脈數而大散似太陽發熱不惡寒同中暑煩渴不憎寒治宜升麻葛根解肌類也熱多小柴胡發渴煩躁便祕大柴胡微利之脈實者可下之陽脈浮滑陰脈濡弱更遇於風變為風溫以前熱未歇又感於風者也又因發汗身猶灼然自汗喘息切忌再汗亦不可下及燒針類也又云寸尺俱浮誤則死矣宜葳蕤湯知母葛根湯也熱病者夏時發也熱極重於溫也治宜寒涼解其內外之煩毒也如頭疼惡寒身熱脈洪盛有汗夏至前陽旦湯夏至後桂枝加石膏升麻湯無汗夏至前後麻黃加知母石膏湯煩躁大青龍湯加黃芩大熱梔子升麻湯陽脈洪數陰脈實大更遇溫熱變為溫毒以前熱未已又感溫熱以其表裡俱熱病之最重者也陽脈濡弱陰脈弦緊更遇溫氣變為溫疫六經十太陽發熱惡寒頭項痛腰背強脈尺寸俱浮若陽浮而陰弱為中風自汗若骨節疼而喘脈浮緊為中寒或者下之太早陽發為結胸陰發為痞氣不渴小便清知邪氣未入本禁利小便下後脈促為陽勝陰故不作結胸為欲解脈緊邪傳少陰令人咽痛脈弦邪傳少陽令人脅拘急脈細數為邪未傳裡而傷氣也脈沉緊邪傳陽明為裡實必欲嘔也脈沉滑傳於腸胃協熱利也脈浮滑為氣勝血虛必下血也陽明身熱目疼鼻乾不得眠尺寸脈長若能食名中風口苦咽乾腹滿微喘熱傳裡也發熱惡寒脈浮而緊仍在表也若下之腹滿小便難也若不能食名中寒小便不利寒則津液不化手足自汗此欲作固瘕寒氣結積攻其熱則噦乃胃中虛冷故也陽明反無汗小便自利二三日嘔而咳手足厥冷必苦頭痛寒邪發於外也陽明但頭眩不惡寒風氣攻內也能食風也而咳必咽痛胃也此風氣攻於內也又嘔多未入府也雖有陽明症不可攻攻之心下滿硬邪氣消滅尚淺不可攻攻之利遂不止者死正氣脫也陽明雖汗出不惡寒其身必重短氣腹滿而喘有潮熱雖脈遲此外欲解可攻裡也大便硬者承氣主之不硬者不可攻之陽明自汗禁發汗小便自利禁利小便為重亡津液也少陽胸脅痛而耳聾口苦舌乾往來寒熱而嘔尺寸脈弦禁下禁汗禁利小便治宜和解耳聾目赤胸滿而煩不可吐下吐下則悸而驚吐則氣虛下則血虛邪在半表半裡故也若脈弦細者邪漸傳裡也不可汗汗之則譫語調胃承氣湯主之太陰腹滿咽乾而吐食不下自利不渴時腹自痛尺寸脈沉細自利不渴寒也當溫之四逆也若下之必作痞若頭痛風也四肢風淫未入陽微表邪少也陰澀里和也而長陽也以陰得陽則解者為欲愈名曰中風脈浮者可汗宜桂枝太陰禁下本太陽病醫反下之因而腹滿時痛表邪乘虛傳太陰也屬太陰桂枝加芍藥主之大實痛者桂枝加大黃主之若脈弱其人續自便利設當行大黃芍藥者亦宜減之脈弱者胃氣尚弱易動利也少陰口燥舌乾而渴或口中和而惡寒尺寸脈沉始得之反發熱少陰病當無熱惡寒反熱者邪在表也脈沉者麻黃附子細辛湯汗之若細沉數病為在裡不可發汗汗之亡陽裡虛故也尺弱澀復不可下虛也若脈緊緊寒也至七八日傳經時也自下利脈暴微寒氣得泄手足反溫脈緊反去陽氣緩寒氣去也者為欲解雖煩下利必自愈若利自止惡寒而蜷臥寒極而陰勝也手足溫陽氣復者可治若惡寒蜷臥自煩欲去衣者亦陽氣得復也可治少陰中風陽脈微表解也陰微里和也者為欲愈若吐利手足不冷陽氣不衰反發熱者不死脈不至者灸少陰七壯凡少陰之為病脈微細但欲寐也若脈陰陽俱緊寒也法當無汗反汗出者亡陽也法當咽痛而復下利少陰病但厥無汗熱行於內而強汗之必動其血上出名下厥上竭為難治少陰惡寒而蜷而利手足冷者陰極無陽不治若吐利四逆寒甚也煩躁陽欲絶也者不治若利止水穀竭也而頭眩時時自冒陽氣脫也者死若六七日息高生氣絶死治法邪在表汗之口中和背惡寒與下利當溫之若下利便膿血者桃花湯主之心中煩不得臥者黃連阿膠湯厥陰厥陰煩滿囊縮尺寸脈微緩若浮緩而囊不縮外症又發熱惡寒似瘧者欲愈桂枝麻黃各半湯若尺寸沉短者囊必縮毒氣入臟承氣湯下之若手足寒脈細欲絶者當歸四逆湯主之久有寒加茱萸生薑傷寒六七日大下後寸脈沉而遲手足厥逆下焦氣虛陽氣內陷下部脈不至咽喉不利唾膿血亡津液成肺痿泄利不止大虛也者為難治與麻黃升麻湯傷寒本自寒下邪自傳裡為本醫反吐下之損傷正氣寒格吐也為逆吐下與乾薑黃芩黃連人參湯又云厥陰為病消渴氣上衝心心中疼熱皆熱矣飢不欲食胃虛客熱食則吐蛔胃中無食則動此熱在厥陰也下之利不止胃虛也若中風脈微浮為欲愈不浮為未愈禁下禁汗時行疫癘十一時行者春應暖而寒夏應熱而涼秋應涼而熱冬應寒而濕是以一歲之中長幼之病俱相似也疫者暴厲之氣是也治法與傷寒不同又不可拘以日數疫氣之行無以脈論春應溫而清折之邪在肝身熱頭疼目眩嘔吐長幼率似升麻葛根解肌類也夏應暑而寒折之邪在心身熱頭疼腹滿自利理中湯射干半夏桂甘湯也秋應涼而熱折之邪在肺濕熱相搏多病黃疸咳嗽喘急金沸草散白虎加蒼朮發黃茵陳五苓冬應寒而溫折之邪在腎多病咽痛或生赤疹喘咳攣痛葳蕤湯升麻葛根湯咽痛甘桔湯敗毒散之類濕暍痓十二濕家一身盡疼發熱身色如熏黃又太陽病關節疼痛而煩濕內流也脈沉而細此名濕痹其候大便反快小便不利頭汗背強寒濕相搏反欲近火寒濕在表若下之早則噦而胸滿傷動胃氣小便不利下後內虛也舌上如胎以丹田有熱胸上有寒渴欲得水而不能飲則口煩燥也濕家下之額上汗出微喘小便利者死下利不止者亦死又有身上疼面黃而喘頭痛鼻塞而煩陽也表也脈大陽也自能飲食腹中無病不在內也病在頭中內藥鼻中則愈濕宜利小便風濕一身盡疼日晡熱劇風也脈浮身重惡風汗出此先客濕而後感風也治宜麻黃薏苡仁杏子甘草湯又宜五苓散濕溫吐利大煩大渴冷汗轉筋但尺脈沉弱手足微厥先傷於濕因而中暑治宜五苓又脛冷胸滿頭目痛妄言多汗陽脈濡弱陰脈小急治宜茯苓白朮湯白虎加蒼朮湯忌汗汗之暍死一暍發熱惡寒身重脈弦細芤遲小便已灑然毛聳手足冷勞則熱口開前板齒燥白虎加參小便不利及赤五苓散不惡寒竹葉石膏湯昏憒不省蔥餅尉法中暍之候自汗面垢煩熱脈虛若脈洪浮伏暑也宜辛溫散之若病如癇者風暑也一痓狀與傷寒相似但項背反張強硬口噤如發癇狀頭搖此太陽中風重感寒濕而然無汗脈弦長徑急名曰剛痓為表實感寒也治宜葛根麻黃便祕宜大承氣有汗脈遲濡弱弦細名曰柔痓為表虛感濕也治宜桂枝栝蔞葛根湯便祕宜大承氣二症通用小續命大發濕家汗亡陽亦作痓寒熱往來十三往來寒熱者日至四五套或十套也皆正邪分爭也表也寒熱熱多寒少無里證宜桂枝麻黃各半湯半表半裡也寒熱宜小柴胡有里證宜大柴胡亡陽也脈微弱熱多寒少不可汗宜桂枝二越婢一湯血少也尺脈遲澀熱多寒少宜建中湯加耆已汗已下寒熱往來者桂枝幹薑湯惡寒十四不待風而寒雖身大熱而不欲去衣厚衣猶言冷也向火不能遏其寒又云身大熱不欲去衣表熱裡寒也身大寒不欲衣者表寒裡熱也有虛實之別汗出惡寒表虛也可解肌無汗惡寒表實也可汗有陰有陽之別惡寒而蜷脈沉細而緊者發於陰也可溫之寒熱相繼者發於陽也可發汗有氣虛因吐下因發汗後反惡寒脈微弱宜芍藥附子甘草湯背惡寒十五有陰盛陽盛陰寒氣盛陽氣不足則口中和也處以附子湯陽氣內陷陰氣不足口中乾燥白虎加參復津液惡風十六見風至則惡矣得以居密室帳中則坦然自舒無畏或扇或當風則淅淅然而惡矣又云天本無風病人自惡謂無風而皮毛粟起也蓋三陽有惡風三陰並無也有傷寒中風之別無汗傷寒有汗中風有亡陽風濕之別發汗多亡陽漏汗不止外不固也以附子桂枝湯溫經固衛也風濕相搏骨節煩疼濕勝自汗腠理不密惡風也以甘草附子湯發熱十七日三四五發者謂之發熱寅卯太陽表也桂枝麻黃巳午少陽柴胡熱在外也若翕翕覆熱而不熾即風寒怫鬱陽氣所致熱在內也若火之蒸灼然而熱即陽氣下陷入陰中熱先自里而表表裡俱熱則半表半裡也但熱有輕於純在表者也不治症陰陽俱虛熱不止者死下利熱不止者死汗後復熱而脈躁疾狂言不能食名曰陰陽交死乃腎虛感邪則陰邪與真陽交合伏入於心包絡之間先用三黃瀉心湯加參附三服和其心包病若靜次用知母麻黃湯三服開泄心包之邪又次用竹葉石膏湯復其津液潮熱十八一日一發止於未申之時屬陽明也可下之熱已入胃故也煩熱十九無時而歇非比發熱時發時止煩熱與發熱二者俱表也曰病人煩熱汗出而解又曰發熱已解半日許復煩再與桂枝湯又曰服桂枝反煩不解先刺風池風府再與桂枝汗後熱二十發汗不入格病不解宜再汗汗後再傷風寒而熱宜再汗汗後溫溫而熱脈弦小而數有餘熱也宜和解之汗後溫溫而熱脈靜身無痛處虛熱也宜平補之汗後溫溫而熱或渴或胸滿或腹急有里證脈沉數宜下之自汗二十一風邪干衛自汗表虛脈浮而無力桂枝和之暑邪干衛中暍自汗惡寒身熱而渴脈虛白虎主之濕邪干衛多汗而厥脈濡沉此其風濕甚者白虎加蒼朮風濕自汗脈弦宜葳蕤湯徹其熱也寒漸入里傳而為熱亦使自汗以上皆表邪未解也漏不止而惡風自汗亡陽脈沉細宜桂附湯溫經此表之虛也陽明發熱其汗如雨則胃汁內干急下之下遲津液內涸黑斑而死自汗脈沉數有力宜下之柔痓自汗脈沉宜小續命散其風邪霍亂自汗脈細緊宜四逆回陽也少陰病反自汗脈沉細宜四逆湯補其腎也不治證汗出發潤及如油或大如貫珠著身出而不流者死發濕溫汗名曰重暍死乃人素有濕因而中暑暑溫相搏自汗屬太陰脾經脾之真氣隨汗而泄復以熱藥汗之兩熱相攻熱旺脾脫口不能言而耳聾身不知痛身青面變而死有白虎加蒼朮救其在表裡者可保十死一生盜汗二十二睡中出曰盜汗盜汗邪氣在半表半裡也睡則衛氣行於里乘表中陽氣不密故自汗覺則氣散於表故汗止頭汗二十三頭汗邪熱內蓄不得越蒸於陽經且頭汗為裡虛表實玄府不開則陽氣上蒸於頭頭汗則五臟枯乾心包絡中空虛至此則津液竭也切勿下之下之則腸胃真氣大泄津液外亡故曰重虛凡頭汗忌下一表也頭汗往來寒熱宜柴胡桂枝幹薑湯一半表半裡頭汗名曰陽微結則陽氣衰而腸胃燥大便祕結矣宜小柴胡次與脾約丸潤之又有胸脅滿微結小便不利嘔而渴但頭汗往來寒熱及微惡寒手足冷大便硬脈細亦是也一里也頭汗名曰純陰結不熱但煩渴便祕不通宜大柴胡下之不熱者熱在內熱入血室頭汗譫語宜小柴胡加生地黃瘀熱在裡渴而小便不利發黃頭汗宜茵陳五苓散陽明病心下懊憹宜梔子豆豉湯吐其胸胃之邪也水結胸頭汗心下緊滿宜小半夏加茯苓寒濕相搏頭汗欲得被覆向火陽明被火虛煩不治證小便不利頭汗者死陽脫也濕家誤下額上汗微喘者死陽脫也手足汗二十四手足汗屬陽明胃熱聚於胃是津液傍達必大便硬或譫語可下寒中於胃陽明中寒不能食小便不利大便初硬後溏不可下無汗二十五邪在表無汗六脈浮而有力太陽無汗脈浮緊宜麻黃陽明無汗小便利嘔而咳手足厥逆剛痓無汗脈弦宜葛根湯邪內傳陽明無汗小便不利心中懊憹發黃傷寒發熱無汗大渴無表證白虎加人參主之冬陽明無汗脈洪實下其熱也大便不通口噤胸滿者下之潮熱譫妄便祕脈沉數而洪大下之太陰無汗脈沉細宜桂枝汗之少陰無汗脈沉宜四逆溫之厥陰病無汗脈微緩宜桂枝麻黃各半湯以和其榮衛也水飲內蓄而不行則津液不足心下滿微痛小便不利亡陽無汗陽虛則津液少脈浮而遲其身必癢又云宜桂枝麻黃各半湯陰陽易無汗脈緊則陽虛無陽作汗宜燒裩散鼠屎湯以和之不治證熱病脈躁盛不得汗者陽之極也死盡藥三劑發汗不出者死頭痛二十六三陽俱頭痛太陽脈浮葛根蔥白湯少陽脈弦柴胡湯陽明脈長承氣湯三陰無頭痛惟厥陰脈會於巔有頭痛乾嘔涎沫吳茱萸湯主之小便清者熱不在裡可發散之不大便者有熱頭痛可下之不治證真頭痛甚入連於頭腦而手足冷者死項強二十七表邪也太陽證痓亦項強因太陽中風加之寒濕宜發散之結胸項亦強如柔痓狀宜大陷胸丸下之頭眩二十八眩者非玄而見其玄眊者非毛而見其毛眴者目搖動也運者運轉世謂之頭旋冒者蒙冒世謂之昏冒皆陽虛也風亦頭眩不治證內容原缺胸滿二十九內容原缺脅滿三十內容原缺心下滿三十一虛氣上逆也旋覆代赭石湯主之痞與瀉心不解渴而小便不利為水飲內蓄五苓散主之瀉心湯並治痞虛氣不治證結胸證悉具而加之煩躁者死邪勝也臟結亦如結胸邪結於陰也寸脈浮而關小細沉緊飲食如故而陰結陽不結也時自利是陰乘陽虛而下也舌上白胎滑者難治白胎寒多也臟結於法當下若無陽證寒熱其人反靜胎滑不可攻也宜刺關元小柴胡湯也又病人脅下舊有痞連在臍旁痛引小腹入陰筋者死積與真藏氣結也腹滿並痛三十二大滿大痛或潮熱大便不通腹滿不減者實也可下之曰陽熱為邪者腹滿而咽乾方可下之又曰痛而不滿為實宜大柴胡承氣輩下之滿而且痛內外表里俱有證宜桂枝加大黃湯以和其內外以上皆熱病也有冷痛者痛而大便利手足冷惡寒脈細面青者溫之四逆也有下寒上熱痛者腹中痛欲嘔吐黃連湯主之腹滿不痛或時減者為虛此虛寒從上下也當溫之蓋虛氣留滯亦為之脹比之實但不堅痛為異宜桂枝半夏湯小建中湯以和之又曰陰寒為邪者腹滿而吐食不下自利益甚時腹自痛屬太陰也可溫之汗吐下後脹滿發汗後不解腹滿痛者急下之發汗後腹脹滿是膀胱虛也者厚朴生薑甘草半夏人參湯主之此因表邪發散去津液少胃主津液胃虛不能宣布諸氣當溫散之吐後腹滿者邪氣不去下傳入胃承氣主之太陽病反下因而腹滿時痛桂枝加芍藥主之大實痛桂枝加大黃主之傷寒下後腹脹心煩臥不安熱乘虛鬱於中氣不得上下梔子厚朴湯主之小腹滿三十三謂臍下滿也是在上而滿者氣也是在下而滿者物也小腹下溺與血也若從心下至小腹皆硬滿而痛者實也大陷胸湯下之但小腹硬滿而痛小便利者蓄血之證曰熱結膀胱其人如狂桃仁承氣主之小便不利者則是溺澀之證此皆邪氣聚於下焦津液血氣不行留滯故也虛煩三十四謂心中鬱郁而煩也煩者熱也欲吐不吐心中無奈胸中煩心煩虛煩三者皆邪熱傳裡心煩喜嘔胸中煩不喜嘔小柴胡主之少陰病二三日心中煩不得臥黃連阿膠湯主之少陰病胸滿而煩豬膚湯主之以上皆徹熱而和解也如作膈實者可瓜蒂散吐之如不因汗吐下實也可以重劑吐之足陽明病不吐不下心煩者實也可下之又傷寒二三日心中悸而煩者虛也與小建中湯補之大抵先煩而悸者熱也先悸而煩者虛也如因吐下汗後而煩者虛也可以輕劑吐之則是內陷之煩也梔子豉湯主之少氣者加甘草嘔者加生薑腹滿加厚朴凡藥大下後熱不去微煩加乾薑煩躁三十五煩而擾擾而煩陽也為熱之輕者煩躁謂先煩而漸至躁也躁為憤躁而躁陰也為熱之重者躁煩謂先躁而後煩者也有不煩而躁者怫怫然便作躁悶此為陰盛格陽也雖大躁欲於泥水中臥但飲水不得入口者是也治宜溫之有邪氣在表而煩躁者太陽中風脈浮緊不汗煩躁大青龍主之曰當汗不汗其人煩躁有邪氣在裡而煩躁者大便六七日繞臍痛煩躁發作有時此燥屎也可下有火劫而煩躁太陽病以火熏之大熱入胃有傷寒乍解胃氣尚弱強食過多因而煩悶胃脈浮洪宜損谷有因虛而煩躁陽微發汗躁不得眠下後復發汗晝日煩躁不得眠夜則安靜不渴不嘔無表證身無大熱脈沉微薑附湯主之發汗若下之煩躁病仍不去者茯苓四逆主之汗吐下臟腑俱虛餘熱相協因虛而煩以身不疼脈不緊不數宜補其虛有陰盛而煩躁少陰吐利手足冷煩躁欲死茱萸湯主之不治證結胸證悉具煩躁者死發熱下利厥逆躁不得臥者死少陰病吐利煩躁四逆者死少陰惡寒而蜷四逆脈不出不煩而躁者死少陰六七日自利復煩躁不得臥寐者死懊憹三十六謂鬱悶不舒暢也無奈也比之煩悶而甚由下後表邪未解陽邪內陷結伏於心胸之間邪熱鬱於胸中宜梔子豉湯吐之或發汗吐下後及陽明病下之其外有熱手足溫不結胸飢不飲食頭汗邪熱結於胸中宜承氣茵陳下之陽明下之胃中有燥屎及陽明病無汗小便不利心懊憹必發黃不得眠臥三十七眠者常睡熟也不得眠者雖睡不熟且安靜不煩也臥者欲睡著而復醒也不得臥者欲安臥而煩悶不能安也二者皆由汗吐下而生胃虛則不得眠心虛則不得臥汗吐下後不得眠枝豉主之日煩夜靜薑附主之不眠少陰病心煩不得眠宜黃連阿膠湯大熱錯語不眠宜黃連解毒湯下利而渴不眠宜豬苓湯利其水吐下後虛煩不得眠酸棗仁湯導其熱下後不眠同前不臥身熱目疼不臥有汗宜桂枝柴胡湯無汗宜麻黃加白虎誤服青龍汗多亡陽先與防風白朮牡蠣散收其汗次用小建中養其心血風溫誤汗不臥者死熱病餘熱入心包絡不臥宜知母麻黃湯小汗之次用小柴胡烏梅梔子湯散心經之熱差後陰未復不臥宜梔子烏梅湯喜眠三十八一忽又一忽終日睡著沉沉不醒惟狐惑二證有之乃因下利後內熱乘虛生蟲殺人甚急宜桃仁湯黃連犀角湯終日終夜常眠不寤惟少陰下後心腎虛寒宜四逆溫之有欲幽靜而但不能眠熟惟百合風溫二症有之百合因汗下後內外俱虛氣無以守心神不寧汗後成者百合知母湯下後成者滑石代赭湯吐後成者雞子湯不曾汗吐下自成者百合地黃湯舌上胎三十九熱也津液結搏為膜在舌上白滑者邪氣初傳入里客於胸中梔子豉湯主之又陽明誤下白胎者同治半表半裡者小柴胡湯主之不滑而澀是結熱在裡表裡俱熱口大幹舌上乾燥白虎湯加參主之黃者熱邪入里可下之黑者熱極也死不治證藏結白胎滑者死其候如結胸飲食如故時時下利衄四十熱在表也是經絡熱盛陽氣擁重迫血妄行衄乃自解忌汗不治證衄頭汗出身無汗死及汗出不至足者死發衄家汗則額上陷脈緊急直視不得眴不得眠少陰病但厥無汗強汗之因致衄者難治名曰下厥上竭噦四十一噎者但胸喉間氣塞不得下通然而無聲也噦者吃吃然有聲也二者皆胃受疾也趺陽浮為噎滑為噦噎者胃虛水寒相搏宜小青龍去麻黃加附子噦者因大吐大下胃虛之極也此妄下之過多不治又有熱氣擁鬱氣不得通而成輕者有和解之證重者有攻下之候非比大下後不治證太陽中風以火劫發汗陰陽俱虛竭身體枯煩頭汗至頸而還腹滿微喘口乾咽爛不便譫語至噦者死又不屎腹滿加噦者死咳四十二咳嗽也肺主也肺主氣形寒飲冷則傷之使氣上而不下逆而不收衝擊膈咽令喉中如癢習習如梗治宜發散小便利者不可發汗發汗則四肢厥冷咳而發汗蜷而苦滿腹復堅為逆肺寒而咳者皮毛之寒內合飲食之寒則為咳嗽停飲而咳者傷寒表不解心下有水氣乾嘔發熱而咳小青龍主之此為水飲與表寒相合也又有少陰病腹痛小便不利四肢沉重痛自利此為有水氣其咳者真武主之此為水飲與裡寒相合也表傳裡而咳者少陰病四逆其人或咳四逆散加乾薑五味子主之此為陰邪動肺而咳也少陽證其人或咳者小柴胡去參加乾薑五味子此為陽邪動肺而咳也不治證脈散者死是心火刑于肺金也喘四十三喘肺主也謂氣逆而上行息數氣急張口抬肩搖身滾肚有邪氣在表而喘者心腹必濡而不堅太陽惡風無汗而喘桂枝加厚杏湯主之喘而汗出者邪氣在裡也且邪氣內攻氣逆不利而喘以葛根黃芩黃連湯以利之汗出而喘者邪氣在表也邪氣外盛擁遏諸氣不利而喘與麻黃杏子甘草石膏以發之有里證而喘者心腹堅滿短氣有潮熱此外欲解可攻裡也有水氣而喘者心下有水氣乾嘔發熱而咳或喘小青龍去麻黃加杏子主之又水停心下則胸膈滿而喘宜利其小便不治證直視譫語喘滿者死身汗如油喘而不休肺絶也死因藥下之瀉止而喘者氣已脫也死喘而噫者死喘而四逆者死喘而魚口者死喘而口閉面里者死吐嘔四十四吐物出也胃中虛冷吐血有熱毒宜犀角地黃湯有虛寒宜理中湯嘔有聲也乾嘔有寒宜薑附有熱宜五苓有水氣宜小青龍也有熱嘔者嘔而發熱少陽證具及嘔不止心下急鬱郁微煩宜大柴胡有寒嘔者膈上有寒飲乾嘔者不可吐宜溫之嘔涎沫頭痛茱萸湯主之有停飲嘔者先嘔後渴此為欲解先渴後嘔為水停心下此屬飲家有胃脘有膿而嘔者不須治膿儘自安表邪傳裡必致嘔也陰不受邪而不嘔也嘔家用半夏以去其水用生薑以散其逆氣嘔多雖有陽明證不可攻之謂邪氣未收斂也不治證嘔而脈弱小便微利身有微熱見厥者死此虛寒之甚也悸四十五悸心忪也惕然動而不安矣有停飲者飲水多必心下悸心火惡水心不安也凡治悸者必先治飲以水停心下散而無所不至浸於肺則喘咳浸於胃則噦噎溢於皮膚則腫漬於腸間則利下可以茯苓甘草湯治之有氣虛者由陽明內弱心下空虛正氣內動心悸脈代氣血內虛也宜炙甘草湯補之又傷寒二三日心悸而煩小建中主之少陰病四逆或悸四逆加桂五分主之有汗下之後正氣內虛邪氣交擊又甚於氣虛者也太陽病發汗過多其人叉手自冒必心下悸又太陽病若下之身重心下悸者不可發汗少陽病不可吐下吐下則悸而驚又少陽不可汗汗則譫語此屬胃胃和則愈胃不和則煩而悸治法宜鎮固之或化散之皆須定其氣浮也渴四十六渴熱也在裡也渴小熱小宜五苓散渴大熱深宜白虎加參舌乾咽焦乃腎汁干也可急下之腎經上屬舌本蓋熱入腎水為所爍無以灌注咽喉失下則舌焦而死矣振四十七振謂森然若寒聳然振動皆虛寒也至於欲汗之時其人必虛必蒸蒸而振卻發熱汗出而解比戰為之輕者下後復發汗必振寒者謂其表裡俱虛也亡血家發汗則寒栗而振謂其血氣俱虛也發汗過多亡陽經虛不能自主持故身為振搖也宜茯苓桂枝甘草白朮湯有振振欲劈地者真武湯主之二者皆溫經益陽滋血助氣戰栗四十八戰者身搖外也栗者心戰內也微則振甚則戰又甚則栗其人本虛邪與正爭邪與外正氣爭則戰邪與內正氣爭則栗四逆厥附四十九四逆四肢厥冷也若手足自熱而至溫自溫而至厥傳經之邪也治宜寒冷四逆散柴胡芍藥枳殼甘草若始得之手足便冷而不溫而陽氣不足陽經受邪宜四逆湯溫之薑附是也厥厥冷甚於四逆也厥有陰陽氣不相順接先熱而後厥者熱伏逆於內也陽氣內陷也陽厥身熱便祕宜下之先厥而後熱者陰近而陽氣得復也陰厥逆冷脈沉細宜溫之若始得之便厥者則是陽氣不足陰氣勝也主寒多矣厥小熱多其病則愈厥多熱小其病為逆至於下利先厥後熱利必自止陽氣得復見厥復利陰氣還勝有邪結胸中陽氣不得敷布而手足冷當吐之為陰盛矣加之惡寒而蜷陰極也不治證少陰病惡寒身蜷而利手足厥冷者不治又少陰病但厥無汗不當發汗強發之則真陽之氣絶陽無所養血上溢矣故兩足逆冷名曰下厥上竭尺脈得微有宜臍下灸千壯服回陽輩脈不回人不省死鄭聲五十鄭聲乃聲轉而不正也以身涼脈小自利不渴而多言者為鄭聲虛也宜涼補之譫語乃妄有所見而言皆真氣昏亂神識不清之所致並熱在胃中上乘於心也有言語差謬睡中呢喃獨語不休亂言皆熱分輕重有被火劫譫語者大熱入胃中水竭水燥又腹滿微喘口乾咽爛不便久必譫語有汗出譫語者風也須過經可下之若下之早言語必亂以表虛里實故也有下利譫語者有潮熱譫語者皆胃中有燥屎可下之承氣湯有下血譫語者熱入血室當刺期門宜小柴胡桃仁承氣輩有三陽合病譫語者腹滿身重難以轉側口中不仁面垢遺屎有發汗多亡陽譫語者不可下以桂枝柴胡湯和其榮衛也不治證脈短者死逆冷脈沉細者死上氣喘滿直視者死自痢下奪者死短氣五十一短氣乃氣急而短促呼吸頻數而不能相續似喘而不能搖肩似呻吟而無痛腹心滿脹而短氣者里也實也又短氣不足以息者實也十棗陷胸也心腹濡滿而短氣者表也虛也有水飲短氣者食少飲多水停心下宜五苓搖頭五十二搖頭有搖頭言者里痛也痛使之然有口噤背反張者痓也風使之然不治證有形體如煙燻頭搖直視此心絶也乃陰極陽無根矣死瘛瘲五十三瘛瘲瘛者筋脈縮急也瘲者筋脈伸緩也伸縮不止俗曰發搐並邪熱盛也熱盛則風搏並經絡風主動四肢動而不寧若以祛風滌熱治之亦有可生若妄加灼火發表之藥則死矣不仁五十四不仁謂不柔和不知痛癢不知寒熱也由氣血虛少邪氣擁盛正氣不能通行而致也直視五十五直視視物而目睛不轉動也能轉動者非也直視為不治之疾由正氣已脫邪氣極盛也有目中不了了睛不和者無表裡證大便難身微熱者此內實也可下之鬱冒五十六鬱冒昏迷也鬱則氣不舒冒則神不清由虛極而乘寒如少陰病下痢止而頭眩而冒者死此虛極也動氣五十七動氣臍傍築築然動跳也由真臟之氣虛發動也雖有攻裡發表之證不可汗下肝內證臍左有動氣肺臍右心臍上腎臍下並按之牢若痛必待問而知自利五十八自利有熱腸垢也有寒鴨溏也有濕毒利膿血也有合病自利太陽與陽明合病必自利在表也以葛根湯發之太陽與少陽合病必自利在半表半裡也以黃芩湯和之嘔加半夏陽明與少陽合病必自利邪入府也以承氣下之有熱利者不應下而下表邪乘虛入里內虛協熱遂自利又下利欲飲水者熱也發熱復重泄色黃赤者熱也大熱內結注泄不止治宜寒療結伏雖除以寒下之又熱則分利之有寒利者自利不渴屬太陰以藏寒故也又小便色白少陰病形悉俱寒也又惡寒脈微自利清穀寒也並宜理中溫之又大寒凝內久痢溏泄綿歷歲年宜熱下之有濕毒利膿血宜地榆散有結積利者少陰病自利清水心下必痛口乾燥必下利三部皆平按之心下硬或脈沉而滑或不欲食而譫語或作復年月宜攻之逐之治下利雖有表證不可發汗為邪內攻走津液而胃虛表之必脹滿不治證下利身涼脈小為順身熱脈大為逆下利脈反實者死發熱下利至甚厥不止者死直視譫語下利者死手足厥冷無脈灸之不溫脈不還者死少陰證自利復煩躁不得臥寐者死以上皆邪擁盛正氣下脫而死者也曰六腑氣厥於外手足寒五臟氣絶於內下利不禁又下利右關脈弦者死是胃虛不勝也治以理中輩得胃脈緩者生又傷寒六七日脈遲下利而熱當與黃芩湯徹其熱腹中應冷當不能食今反能食名曰除中死能食者是熱熱未去也此脾經邪熱未去而胃氣去矣筋惕五十九筋惕跳也肉瞤動也由發汗過多津液枯少陽氣大虛筋肉失養太陽病脈微弱汗出惡風不可服青龍服之則筋跳肉動又太陽病發汗汗出不解仍發熱頭眩身動振振欲劈地真武主之動氣在左右不可汗汗則頭眩身動治宜溫經益陽有吐下後發汗表裡俱虛此又甚也吐下後發汗虛煩脈甚微八九日心下痞脅下痛氣上衝咽喉眩冒筋脈動惕久而成痿此逆甚也又太陽病發汗復下之膚動胸煩面青黃者難治此陽氣太虛也若面黃手足溫者易治此陽氣復也熱入血室六十熱入血室血室乃經脈留止之處血海也衝脈也男子由陽明內熱方得而入感則下血譫語婦人由太陽經便得而入則有月水適來適斷為異中風發熱經水適來熱除脈遲胸脅下滿如結胸狀譫語此乃邪留於胸脅不去當刺期門中風七八日經水適斷寒熱有時如瘧此乃血不行也小柴胡散之傷寒發熱經水適來晝日明瞭暮則譫語如見鬼以血自下無留邪熱隨血散必自愈也發黃六十一發黃由濕熱相交也主在脾經有熱盛而黃者身黃色如橘子甚者染衣如柏陽明病無汗小便不利必發黃又頭汗身無汗小便不利渴飲水漿此為瘀熱在裡也茵陳湯五苓散又有內熱已盛被火者亦發黃也邪風被火熱兩陽相熏灼其身黃也傷寒身黃髮熱者此外熱也宜梔子柏皮湯以散之有濕黃者身如熏黃雖黃而色暗不明也傷寒發汗後身目為黃者寒濕在裡不解故也有蓄血下焦身黃者脈沉結小腹硬而小便自利如狂宜抵當湯下之不治證寸口無脈鼻氣出冷者死體如煙燻直視搖頭為心絶也死環口黧黑柔汗發黃為脾絶也死狂六十二狂謂少臥不飢而自高賢也自辨智也曰重陽者狂重陰者癲由邪熱至極也宜大下之又有熱在下焦膀胱如狂而未至於狂但臥起不安耳又狂見蓄血下焦蓄血亦狂也不治證狂言目反直視腎絶也死汗出復熱狂言不食為失志死霍亂六十三霍亂謂邪在上焦則吐邪在下焦則下利邪在中焦胃氣不治為邪所傷陰陽乖鬲遂上吐而下利若嘔吐而利謂之吐利躁擾煩亂謂之霍亂傷寒吐利者邪氣所傷也霍亂吐利者飲食所傷也其有兼傷寒之邪內外不和者加之頭痛發熱熱多欲飲水者五苓散主之寒多不欲飲水者理中湯主之理中加減臍上動者腎氣動也去朮加桂吐多者去朮加生薑辛散也悸者加茯苓以導其氣也寒加乾薑溫也腹痛加參以補之腹滿者此胃虛氣壅也去朮甘人人滿也加附辛以散壅吐利止而身痛者宜桂枝湯以和之吐利寒熱手足冷與下利清穀脈微四逆湯主之不治證乾霍亂者死乃躁擾不安喘脹不得吐下者也蓄血六十四蓄血謂血結下焦不行也由太陽隨經瘀血在裡血為熱所搏太陽病七八日表證仍在脈微而沉反下結胸其人如狂以熱在下焦小腹當硬滿小便自利者蓄血也抵當主之小便不利非血蓄也是津液內結也又陽明病其人喜忘屎雖硬其色必黑亦蓄血也喜忘者瘀血也此又甚也輕則桃仁承氣重則抵當丸下之又如病人無表裡證發熱七八日雖脈浮數者可下之假令已下脈數不解浮則傷氣下後脈浮是榮間熱去而衛間熱在矣數則傷血下後脈數是衛間熱去而榮間熱在矣合熱則消穀善飢邪熱不殺穀也至六七日不大便者瘀血也抵當湯主之凡看傷寒先觀兩目次看口舌又次以手自心下至小腹按之如覺有滿硬者審之問之而治之勞復六十五勞復謂瘥後血氣未平餘熱未盡勞動其熱熱還經絡復作也脈當浮數而硬若餘熱未除再熱者則非勞復也治法非比傷寒次第可速下之曰大熱瘥後勞復者梔子豉湯主之若有宿食加大黃又曰勞力而耳熱者宜柴胡鱉甲散平解之過食而熱者宜消之又曰傷寒瘥後更發熱者小柴胡主之脈浮汗之沉實下之又麥門冬湯治勞復竹葉石膏湯治食復易六十六即陰陽易也以大病瘥後男女相易而復作也易謂男女相易則為陰陽易不易自病謂之女勞復以其內損真氣外動邪熱真虛邪盛不可治矣其證身體重少氣乃損真氣也小腹裡急引陰中拘攣膝脛拘急陰氣極也熱上衝胸頭重不欲舉眼中生花乃所易之毒氣上蒸也舌卷卵縮附舌卷卵縮謂肝熱也目瞪六十七目瞪傷寒目瞪口噤不省人事此中風痓宜開關吐痰痰退眼開觀證治之傷寒過經疾退無熱人困不語脈和目瞪下虛戴陽故也陽毒不解熱伏太陽故使目瞪六脈弦徑漸作魚口氣粗者死發斑六十八發斑熱熾也舌焦黑面赤陽毒也治宜陽毒升麻湯白虎加參湯冬月大暖至春發斑陽脈浮數陰脈實大溫毒也治宜承氣黃連湯狐惑六十九狐惑舌上白唇青有瘡四肢沉重忽忽喜眠因失汁致之蛔厥七十蛔厥藏寒也治宜烏梅丸理中丸兩感七十一兩感一日雙傳脈沉而大二日沉長三日沉弦在裡證宜四逆湯表證桂枝湯也咽痛七十二咽痛有少陰有熱宜黃連龍骨湯有少陰無熱宜四逆散有口瘡宜蜜漬連汁身痛七十三身痛有陽宜麻黃桂枝有陰宜真武有濕宜朮附五苓也小便不利數七十四小便不利數熱宜五苓承氣濕宜薑附寒熱宜柴胡桂枝幹薑湯也數宜乾薑甘草芍藥湯承氣類也四證類傷寒表裡附七十五傷食右寸脈緊盛痞滿又口無味液不納穀息勻痰證嘔逆頭痛脈浮而滑痞滿虛煩不惡寒不頭痛身疼腳氣但疾起於腳表裡附無表裡至十三日後大柴胡主之脈數不大便瘀血也抵當主之過經不解承氣主之表裡雙見脈浮大表也又煩渴小便赤心下痞治宜大柴胡桂枝湯五苓散脈浮緊咽燥口苦腹滿而喘發熱汗出不惡寒而反惡熱治宜梔子豉湯脈遲弦細里也又有里證治宜小建中小柴胡誤下表未解下之協熱利不止宜桂枝人參湯腹痛喘渴見各門下祖按傷寒第九至此條款俱系傷寒變症後有言及傷寒者乃論雜症中參及之耳凡治病辨得傷寒明透則雜症皎然矣蓋傷寒專言足六經足太陽膀胱經足少陽膽經足陽明胃經足太陰脾經足少陰腎經足厥陰肝經雜症則兼及手六經手太陽小腸經手少陽三焦經手陽明大腸經手太陰肺經手少陰心經手厥陰心包絡此之謂十二經配臟腑也故分言之以便覽者
