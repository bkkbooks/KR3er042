故以引用除客噫無休代赭石苦甘性寒重為鎮固之劑其氣虛逆而上則噫故仲景用重以鎮虛逆旋覆花鹹甘冷利有小毒開結氣行痰水逐留飲消痰結仲景治痞硬則氣堅用鹹以耎之潤經益血生地黃甘苦大寒手太陰益陰之劑撤腎經虛熱導心膈虛煩故炙甘草湯潤經而復脈天門冬苦平利小便泄而不收通腎氣冷而能補保肺氣止嗽撤虛熱祛痰故升麻湯潤肺而除熱麥門冬甘平微寒陽中有陰之藥消肺中伏火傷金治口乾煩渴虛勞客熱炙甘草湯益陰血石膏湯補不足麻子仁甘平足太陰手陽明要藥汗多胃實便難燥濕而亡津液故脾約丸通腸潤燥復脈湯益氣潤經通草辛甘通陰竅澀而不行消水腫閉而不去閉澀用之故名通草故當歸四逆以緩陰血當歸甘辛性溫屬陽可升可降在氣主氣在血主血各有所歸故名當歸除客血補虛勞滋養諸經四逆湯益血升麻湯補虛凡四方同用撤熱除黃黃連苦寒手少陰經撤心肺間熱厚腸胃止下利陷胸湯泄胸中實熱瀉心湯導心下虛熱人參湯通寒格白頭翁湯堅下利烏梅丸安蛔黃連湯降陽凡十一方同用黃柏苦寒入手少陰經泄隱伏火主五臟腸胃熱結柏皮湯散熱白頭翁湯堅利知母苦寒主燥悶煩心瀉心火清肺白虎湯清消肺氣升麻湯除熱涼心茵陳蒿苦寒通關節解肌熱除黃疸利小便故仲景治瘀血發黃小便不利連軺即連翹根味苦寒故赤小豆湯除熱而退黃生梓白皮苦寒主目病去三蟲仲景治黃故赤小豆湯降熱而散虛心煩不得眠阿膠甘平微溫續氣入手太陰經補血行厥陰路主陰氣不足泄利無休炙甘草湯潤經益心血豬苓湯滑竅利小便故阿膠湯陰血不足以補之雞子黃甘溫除煩熱火瘧阿膠湯補陰血苦酒湯緩咽痛咽痛不能言桔梗辛苦微溫有小毒手太陰經分之藥行胸中至高之分止咽痛除寒熱利咽膈定喘促桔梗湯散寒佐甘草除熱甘桔相合以調寒熱咽痛苦酒即醋味酸溫助諸藥行經苦酒湯斂咽瘡豬膽汁湯潤便硬建中焦之邪膠飴甘溫補虛止渴健脾胃補中故建中湯用以溫中散寒而健脾甘草甘平安和藥石解諸藥毒調和臟腑神養脾胃治五勞七傷通九竅百脈發散方解表厥逆方溫里承氣湯調胃白虎湯清肺柴胡湯緩中瀉心湯導熱中滿相反不用內外上下中無所不至凡四十九方同用大棗甘溫安中緩脾潤經益胃補養不足調和百藥桂枝湯發表附子湯除濕十棗湯益土勝水小青龍滋榮和衛柴胡湯調寒熱建中湯緩脾胃復脈湯補不足吳茱萸湯止嘔逆治客噫能補胃弱凡二十九方同用芍藥味苦酸專入太陰經除濕益津液緩中通五臟止腹痛利膀胱赤者瀉白者補越婢湯益津液甘草湯益陰血建中湯收正氣小青龍主氣逆黃芩湯固胃麻仁丸斂津液大柴胡挾陰真武湯除濕下後胸滿當去傳經腹滿宜加凡二十一方同用安蛔蟲之厥烏梅酸緩主勞熱虛煩收肺氣喘急治下利不止除口乾好唾故烏梅丸以安蛔厥蜀椒辛溫大熱溫中利關節止利消宿食開腠理髮汗逐寒濕通經合和於烏梅丸中溫藏寒安蛔祖按傷寒方論一章是據古方升降補瀉以為主治之本乃定局也傷寒藥性一章是詳品味陰陽良毒以為佐治加減之用乃活機也學者熟讀而深省焉治傷寒無餘蘊矣雜病分氣血陰陽三日增夜靜是陽氣病而血不病夜增日靜是陰血病而氣不病夜靜日惡寒是陰上溢於陽夜靜日熱是陽盛於本部日靜夜惡寒是陰旺於本部日夜並惡寒是陰部太盛兼有其陽當瀉其寒峻補其陽日安夜躁煩是陽氣下陷於陰中當瀉其陽峻補其陰日惡寒夜躁煩為陰陽交飲食不入死陰盛格陽目赤煩躁不渴或渴不欲水脈七八至按之不鼓薑附主之又傷寒二三日身冷額上汗面赤心煩者亦是陽盛拒陰表涼身痛四肢冷脈沉數而有力承氣湯主之陽厥極深或時鄭聲指甲面色青黑勢困脈附骨取之有按之無乃陽氣拂鬱不能運於四肢故身冷先涼鬲以待心胸微暖可承氣主之陰證身重語無聲氣難布息目睛不了了口鼻氣冷水漿不入二便不禁面刺陽證身輕動語有聲目睛了了鼻中呼吸利口鼻氣熱內傷見於右手關前氣口躁作寒已寒作躁已不相併但有間晡時必減潮作之時神倦外傷見於左手關前人迎無問晡時必劇潮作之時精神有餘惡寒四有濕痰抑遏其陽氣不得外泄脈沉緩治宜江茶香油薑汁同服吐其痰以通聖去芒硝大黃麻黃加四物湯伏脈有熱甚而血虛脈沉而澀宜四物四君子陪地黃黃柏戰栗有熱熱煩附勞五內熱曰煩外熱曰熱脈浮大而裡虛為虛細小而實為實暴熱病在心肺積熱病在肝腎虛熱不食自汗氣短屬脾虛實熱能食渴便難屬胃實火鬱而熱五心熱乃心火陷於脾血中伏火心神煩亂不安宜鎮陰火陰虛熱酒食肉熱肺熱日西而甚喘咳寒熱輕者瀉白散重者涼鬲白虎地骨皮散心熱日中甚煩心心痛掌中熱而啘以黃連瀉心湯導赤散安神丸肝熱寅卯時甚脈弦四肢困熱滿轉筋筋痿不起以瀉青丸柴胡飲子脾熱夜甚怠惰嗜臥以瀉黃散調胃承氣治實熱補中治虛熱腎熱如火因熱不任起床以滋腎丸六味地黃丸木香金鈴子散治暴熱心肺上喘大黃五錢金鈴子三錢木香三錢輕粉一錢朴硝一錢柳白皮湯下三錢地黃丸治腎熱不能運動熟地八錢茯苓澤瀉牡丹皮各三錢山茱萸山藥各四錢蜜丸酒下柴胡飲子治肝熱兩脅下肌熱脈浮弦寅申候者柴胡人參黃芩甘草一兩大黃川歸芍藥半兩活石三錢又方三兩三黃丸治胃實熱四物四君子加升柴治脾虛熱補中益氣湯人參白朮黃耆陳皮甘草川歸升麻三分柴胡三分水煎火鬱湯治四肢熱五心煩熱因熱伏土中抑遏陽氣羌活升麻葛根芍藥人參五錢柴胡甘草三錢防風三錢上蔥白三寸煎硃砂安神丸治血中伏火心神煩亂蒸蒸不安兀兀欲吐硃