四破傷風風則生熱也風襲於瘡傳播經絡病如瘧狀治同傷寒脈浮無力表之太陽也汗之而愈脈長有力陽明也下之而愈脈浮而弦少陽也和解之愈大便祕小便赤汗不止病在裡可速下之脈沉在裡承氣下之背後搐者羌活獨活防風甘草向前搐者升麻白芷獨活防風甘草兩傍搐者柴胡防風甘草右搐者加白芷厲風十五厲風血熱凝結其氣不清上體先見多者氣受之下體先見多者血受之宜醉仙散再造散樺皮散七聖七宣輩大下之醉仙散治在上栝蔞根苦參蔓荊子胡麻子牛蒡子防風枸杞子白蒺藜右末一錢半輕粉二錢空心臨臥茶下如醉下惡臭物為度再造散治在下大黃錢半皂角一錢生者燒灰冷酒下以蟲盡為度大風方任意加減威靈仙凌霄花防風白芷荊芥何首烏川芎羌活皂角石菖蒲苦參川歸烏蛇白花蛇薑蠶全蠍雄黃大黃蘇木桃仁蒼耳子梧桐淚虻蟲水蛭紅花冷丹十六冷丹血風也血熱也痰血相搏也通聖散消風散治血風血熱蟬蛻薑蠶荊芥南星散治痰血相搏又用吐法肺風十七肺風皮燥開折血出大痛乃肺熱生風也苦參皂角蛇肉荊芥黃芩沙參中風十八中風涎壅口目喎斜語言謇澀熱甚生風血虛有痰中府者面加五色有表證著四肢脈浮惡風寒拘急不仁先以小續命湯加減發其表調以通聖散辛涼之劑中藏者唇吻不收舌不轉而失音耳聾而眼盲鼻不聞香臭便祕宜三化湯通其滯調以十全四物血虛有痰半身不遂涎潮昏塞宜以四物四君子隨氣虛血虛加二陳湯用之調以涼劑導痰行氣也或權宜吐之中經者內無便溺之阻外無留結之患宜大秦艽調之手足拳攣筋脈抽掣中於風冷者也脈應弦急治宜緩風之藥手足彈曳四肢癰緩中於風熱者也脈應浮緩治宜涼熱消風之劑口目喎斜乃風賊陽明胃土者也有寒則急引頰移有熱則筋緩不收偏於左則左寒而右熱偏於右則右寒而左熱也小續命湯治表麻黃桂枝芍藥甘草人參黃芩防己川芎杏仁一兩防風半兩附子半兩無汗惡寒加麻黃杏仁防風無汗身熱加白虎無汗身涼加薑附有汗惡風加桂枝杏仁芍藥有汗身熱加葛根黃芩桂有汗無熱加桂附三化湯朴硝厚朴是大黃枳實大秦艽湯養血榮筋四物湯秦艽三兩獨活羌活白茯苓一兩防風甘草白芷白朮一兩石膏二兩細辛半兩獨聖散吐痰潮瓜蒂一兩炒黃為末茶末三錢齏汁調下則吐如風癇加全蠍有蟲加狗油雄黃芫花立吐後須降火安神瀉青丸治風熱瀉肝安神川芎川歸防風羌活梔子龍膽大黃蜜丸竹葉湯下通聖散瀉青丸去羌活龍膽加麻黃薄荷荊芥芍藥芒硝連翹白朮半兩桔梗黃芩石膏各一兩甘草二兩滑石二兩薑煎服二陳湯加竹瀝薑汁治痰氣虛加四君子血虛加四物湯中風有急中不省口角流涎喉中作聲脈浮緩者先去其痰後治風熱又次養血益陽其證有不同者皆風熱涎潮隨其何藏有虛而襲之如肝虛中風脈應左關面色青診在目左脅偏痛筋急頭目瞤如心虛中風脈應左寸面色赤診在舌不能言不可轉側呼怒叫如脾虛中風脈應右關面色黃診在唇怠惰不能飲食嗜臥如醉如肺虛中風脈應右寸面色白診在鼻喘逆面腫如腎虛中風脈應左尺面色黑診在耳面龐然浮腫腰脊痛胃虛中風脈應人迎兩關並浮而大飲食不下腹脹食寒則泄喎斜不隨邪中心肺涎潮逼塞四肢縱緩以風散涎注於關節氣不能行故四肢不遂舌強不能言風入心脾涎中之口噤不能言以風冷客滯心肺涎塞也四肢拘攣以風冷邪氣中肝藏使筋攣也風柔以風熱中肝藏使筋緩也不治證脈急數而大數者死鼻下赤黑相兼吐沫身直者死汗出不流如珠與汗出不止呼吸有聲者死口如魚口氣粗麵紅者死口開目開手撒聲如鼾者死髮直口吐沫鬲滿咽如鋸喘急搖頭者死晝惡寒夜煩躁者死中風寒一如中風證止牙車緊不動為異中風濕一如中風證止兼腹滿身重便利不禁中寒手足攣急疼痛四肢冷口噤失音吐沫挾風則暈眩兼濕則腫疼也中濕脹滿四肢關節疼痛久則浮腫挾風眩暈嘔吐兼寒則攣拳掣痛脈沉而細微緩中風暑如一中風證止四肢緩弱中寒濕濕寒二證相兼中暑濕一如中風手足軃曳入浴暈倒骨解中氣一如中風於七情中發宜順其氣脈沉伏大法風浮而氣沉也中痰素有蓄痰隨氣上厥中尸口開目直手撒形脫者死脈緊而急者死堅而細者死弦而數者死中惡如醉如狂乃心氣虛有恐治宜鎮心神以降火唇青身冷脈小者死筋急者肝中虛肝中寒筋實熱筋虛轉筋者筋虛關節痛筋寒肝寒腳心痛筋實十指甲痛筋虛曲蜷不伸肝中虛舌卷囊縮肝中寒筋虛喑不言心中虛中風濕脾痓頭目瞤動肝中虛皮肉瞤動脾中虛四肢關節痛有中風中寒中濕肝虛有留飲歷節腳氣十九身體疼有溢飲虛寒搏之有濕傷血也亦有血虛而痛者歷節風二十歷節風疼痛不可屈伸體魁瘰腫如脫痛掣流注骨節自汗短氣頭眩欲吐由風濕寒相搏而成痛者寒多腫者濕多汗出歷節者風多歷節風痛走注不定痛風有定夜甚鶴膝風膝大或痹或痛不痛筋動難或仁不仁飲痹往來如歷節風白虎飛尸痛淺按之便附骨疽痛深按之無益吐衄二十一吐衄脈澀濡弱細弦而澀按之虛皆為亡血沉弦面無血色無寒熱者必衄沉為在裡榮衛內結胸滿必吐血因熱則淖溢妄行有勞則血不歸經大怒則氣逆血莞於上腎病則咳唾而有血衄者出於肺嘔吐者出於胃鬲上伏熱寸脈洪數榮血妄行左手洪大陽毒傷寒脈洪數虛勞吐血出於肺脈洪飽食大飲屈身勞力而吐血出月肺洪怒傷肝氣逆也傳尸注病吐血兩尺弦細治衄涼血行血犀角地黃湯加鬱金黃芩柴胡人參丹參治嘔血咯血因血上錯經火載而嘔因血虛痰盛而咳四物湯梔子鬱金童便薑汁韭汁山茶花痰加竹瀝喉中痛是氣虛加參朮耆柏咯血血虛痰盛加青黛栝蔞仁嗽加訶子海石杏仁咯唾血出於腎天門冬麥門冬黃柏熟地桔梗知母貝母遠志有寒加薑桂嘔吐血出於胃犀角一錢地黃三錢牡丹皮二錢芍藥三錢名犀角地黃湯治胃實及有瘀血人參飲子治脾胃虛弱衄血又治吐血久不愈人參三錢黃耆一錢芍藥一錢川歸三錢五味子五個甘草麥門冬二錢救肺散治咳血六脈大按之虛心脈也此氣盛而亡血以瀉火補氣以墜氣四物湯人參黃耆升麻柴胡牡丹皮陳皮甘草多加地黃又名三黃瀉血湯益陰散治陽浮陰翳咯血衄血黃柏黃芩黃連並以蜜水浸炒芍藥一兩人參白朮乾薑三錢甘草六錢茶一兩谷一兩香油釜炒米飲下五錢三黃丸治衄不止大便急燥者下之梔子黃芩黃連地黃大黃朴硝上蜜丸清心蓮子飲治咯痰血下血二十二下血脈浮弱按之絶者下血因榮衛之氣妄行在春夏為溢上在秋冬為泄下左脈洪大伏毒下血脈虛而數毒者暑也內熱下血關後沉數肺受風熱傳下大腸名腸風先因便結而後下血右尺脈浮食毒物積於腸中血隨糞下遇食則發名藏毒下血脈見積脈四物湯升麻秦艽阿膠白芷熱加黃連酒煮溫散梔子炒虛加乾薑炮五倍子如寒藥用加辛升溫散一行一止胃風湯治風毒客腸胃動則下血四物去地黃加人參白朮桂枝茯苓等分涼血地黃湯治腸澼下血水穀與血另作一派知母炒黃柏一錢炒熟地川歸各五分槐子炒青皮各五錢越桃散治下血與血利梔子仁槐花棗乾薑上各燒存性米飲下三錢伏龍肝散治便血因內外有感停凝在胃隨氣下通妄行伏龍肝一兩白朮阿膠黃芩地黃甘草三錢陰結夫邪入五臟則陰脈不和血留之滲入腸間脈虛澀也生地黃汁小薊汁各一斤砂糖熬膏地榆阿膠側柏葉赤小豆五兩浸芽出日乾川歸一兩為末下治先血後便謂之近血水下前末治下血五靈脂炒末芎歸湯下溺血二十三溺血熱也又因房勞過度憂思氣結心腎不交生地黃小薊根淡竹葉梔子仁炒藕節甘草活石通草蒲黃炒川歸血虛加四物湯牛膝膏發灰能消瘀血通關醋湯二錢棕櫚灰亦治燒灰米飲下赤腳馬蘭汁老鴉飯水楊柳腦並治不治證吐衄唾血下血脈浮大而數者死吐血脈緊弦者死中惡吐血脈沉細數者死藏血脈俱弦者死下膿血脈絶者死血溫身熱脈躁者死霍亂二十四霍亂脈滑者霍亂弦滑者宿食洪者熱細者死微遲者死弦甚者死其氣有三火風濕承胃之虛吐為熱也瀉為濕也風勝則動故轉筋也甚則轉筋入腹者死乾霍亂則心腹脹滿絞痛欲吐不吐欲利不利須臾則死急以鹽湯大吐之熱則五苓散寒則理中湯轉筋霍亂則二陳湯加白朮甘草桂枝乾霍亂者系內有積外有邪氣和解散治之二陳湯和解散加川芎防風白芷蒼朮也下利二十五下利脈滑按之虛絶者必下利寸脈浮數尺中自澀必下清膿血沉弦者下重微弱數者自止遲而滑者實也可下之數而滑者有宿食可下或譫語或腹堅痛脈沉緊者可下脈遲或腸鳴心下急痛大孔痛可溫由風濕熱也輕則飧泄重則下利膿血在表者發之表者身熱也柴胡去參主之有里者下之或後重或積也在上者湧之或痰氣也在下者竭之去者送之盛者和之過者止之後重則宜下之乃熱物藪也脈洪者是又氣不通宜加檳榔木香腹痛則宜和胃氣以川歸厚朴桂芍藥茯苓和之身重則除濕脈弦則去風大柴胡主之血膿稠黏以重藥竭之熱甚也身冷自汗以毒藥溫之身冷自汗下無聲小便清利大便不禁氣難布息脈沉微嘔吐雖裡急後重謂寒邪在內而氣散也可漿水散溫之鶩溏為利宜溫之結糞也風邪內縮宜汗之有厥陰動利不止脈沉細手足厥逆涕唾膿血此難治宜麻黃湯小續命湯汗之黃芩芍藥湯治瀉利腹痛後重身熱脈洪疾黃芩一兩芍藥一兩甘草五錢痛甚加桂少許下利膿血加歸連五錢裡急後重加檳榔木香前證重者大黃一兩酒浸半日煎服以利為度黃連當歸湯治下血腹不痛謂之濕毒痛熱毒也連歸半兩熱毒加大黃一兩芍藥二錢半腹痛加桂白朮芍藥湯治脾受濕水泄微滿困弱暴下無數是大勢來宜宣和也白朮芍藥甘草腹痛甚加黃芩桂脈弦頭痛加蒼朮防風癢與下血加蒼朮地榆心下痞加枳實凡痢疾腹痛傷食微加大黃腹脹加朴渴加茯苓冬月減芍藥一半夏月加芩見膿血在大便前者黃柏為君地榆為佐加歸尾膿血在大便後者制芩歸稍膿血相雜下者製大黃腹不痛白芍藥半之身倦目不欲開口不欲言四君子沉重製蒼朮不思食者木香藿香訶子散治虛滑久不已木香黃連甘草訶子皮術芍湯下桃花湯治冷利腹痛下魚腦白赤石脂煅乾薑炮餅丸飲下漿水散治暴泄如水身冷脈微自汗半夏一兩附子炮乾薑五錢良薑三錢桂三錢甘草為末漿水煎和滓服小續命湯治風邪內縮方見前椿皮丸治酒積利久利濕也黃連茱萸粟殼丸止利小柴胡去參湯治身熱挾外感者保和丸治食積利乳香沒藥桃仁活石丸治瘀血利木香檳榔湯下茯苓湯治傷冷飲水變成白利腹痛減食茯苓豬苓澤瀉一錢川歸桂五分蒼朮五分甘草芍藥二錢升麻柴胡黃芩五分李先生和血湯治腸澼下血另作一派腹中大痛此乃陽明熱毒也生地熟地五分甘草生五分炙五分芍藥一錢半黃耆一錢升麻一錢牡丹皮五分蒼朮秦艽桂當歸陳皮三錢作一服腹中不痛腰沉謂之濕毒下血加羌活獨活防風葛根槐花各三錢益智和中湯治前證腹痛皮惡寒脈俱弦按之無力關甚緊弦內寒明矣升麻芍藥錢半川歸黃耆甘草一錢葛根柴胡牡丹皮肉桂半夏乾薑益智一錢五分噤口利謂下利而嘔不納食是謂噤口痢止口不納食下便又不利人參薑汁煮焙乾半夏半之入香附末丸又縮砂蜜調抹口上嘔不納食謂之噤口又人參黃連濃煎細呷之凡利下外有滯下疳利勞瘵利濕食瘡利血利則有瘀血血枯肺痿風不治證脈浮大者死及數者死身熱脈數者死腸澼下白沫脈浮者死如屋漏色者死塵腐色者死如魚腦者死大孔如竹筒者死血熱者死泄瀉二十六泄瀉脈沉而細疾或微欲食不下目睛不了了又腹滿泄鶩溏此陰寒也脈數疾聲亮暴注下迫渴煩小便赤澀水穀消化此陽熱也虛則無力不禁固也溫之實則圊不便虛坐努積下之積泄脾部脈沉弦宜逐積痰積在太陰分宜蘿蔔子吐之水恣泄乃大引飲熱在其上水多入下胃經無熱不勝宜五苓風泄久風為飧泄水穀不化而完出也肝病傳脾宜瀉肝補脾脾泄腹脹滿腸鳴食不化嘔吐宜理中湯一云腸鳴食不化脾虛氣瀉躁怒不常傷動其氣肺氣乘脾脈弦而逆宜調氣驚泄者心受驚則氣亂心氣不通水入理中丸治冷瀉脾瀉虛泄白朮土炒乾薑炮焦甘草炙人參為末粥丸胃風丸治氣虛四君子升麻芍藥胃補丸治氣虛下溜四君子芍藥炒升麻平胃五苓散治濕泄水恣泄熱泄此方治一切陽證平胃散五苓散白朮芍藥甘草熱加芩木通流積丸治瘀積下流甚則吐之青黛黃芩神麯海石椒術丸治濕川椒蒼朮肉豆蔻脾泄丸白朮二兩炒神麯一兩半炒山楂半夏兩半芍藥酒炒一兩黃芩一兩半炒蒼朮五錢虛加參朮甘草裡急後重加檳榔木香荷葉煨飯丸止泄丸肉豆寇五錢活石春一錢夏二錢秋一錢半寒加炒曲茱萸熱加連茯苓滑加訶子皮溫六丸青龍丸俱可治不治證脈大而滑帶緊或浮皆死脈急而食不下者死四肢冷困不能轉側下泄亡陽喘者死小便淋閉二十七脈細而數盛大而實者生虛小而澀者死關格頭汗者死淋瀝赤澀皆內熱也宜解熱利小便閉則氣不利有氣虛則氣不行血虛則氣不升有痰多則氣不運治法氣虛補氣血虛補血痰多導痰先服本藥後皆用吐之以提其氣氣升則水自下加以五苓散清肺飲子治熱在上焦氣分小便不利熱而渴者是也澤瀉五錢豬苓三錢茯苓二錢通草木通二錢燈心一錢車前子一錢萹蓄瞿麥琥珀三錢滋腎丸治熱在下焦血分小便不利不渴者是也黃柏酒炒知母酒炒一錢桂少許血澀致氣不通或死血作淋加滑石茯苓澤瀉牛膝膏治死血作淋李先生治法熱在上焦梔子黃芩主之中焦加連芍下焦加黃柏淋熱利之山梔子之類氣虛參朮加木通小便不通利氣虛參朮加升麻後吐血虛以四物後吐痰氣二陳加木通香附後吐三因淋用五苓散葵子活石瞿麥冷加附子熱加黃芩血加梔子石膏石葦氣少腹滿閉加木香沉香發灰散治走馬房勞飲食忍小便以致轉胞不通臍下急滿醋下二合甘遂和蒜搗餅安臍孔合實著艾灸三十壯治小便不通或加葵子小便不禁二十八膀胱不約為遺溺小便不禁韭子丸出三因方治腎冷韭子六兩蓯蓉鹿茸牛膝菟絲子巴戟石斛杜仲川歸地黃桂上隨分酌用為丸阿膠散治失禁阿膠炒二兩牡蠣煅鹿茸酥炙四兩任下茯苓丸治心腎虛淋瀝赤白茯苓各二兩地黃汁好酒熬成膏丸鹽酒任下大小便閉者外有骨熱不同關格者外有肝實熱心實熱便利不禁外有中風濕肝脾不同結燥便閉腎臟風附二十九結燥便閉火邪伏於血中耗散真陰津液虧少夫腎主大便為津液津液潤則大便潤熱燥脾脈沉數下連於尺藏中有熱亦有吐瀉後腸胃虛服熱藥多者宜承氣下之又大便祕小便數者謂之脾約脾血耗燥肺金受邪無所攝脾津液枯竭治宜養血潤燥風燥肺受風邪入腸中右尺脈浮宜麻仁丸陰結陰燥欲坐井中兩尺脈按之虛或沉細而遲者是如有陰證脈堅實湯藥中亦少加苦寒以去燥熱宜黃柏知母附子氣燥尺脈伏也宜溫補之老人産婦氣弱津液不足而結者並宜地黃丸治法腎惡燥以辛潤之脾結燥以苦瀉之如食傷腹滿腹響是也陽結者散之陰結者熱之如能食小便赤為實有物祕也宜麻仁丸七宣等主之如不能食者小便清為虛乃氣祕也宜用厚朴湯主之潤腸丸麻仁桃仁一兩羌活歸尾大黃煨各半兩上蜜丸梧子大如大便全祕加酒製大黃如血燥大便乾燥加桃仁大黃如風結大便不行加麻仁大黃如風濕加皂角仁秦艽大黃如脈澀身覺氣短加郁李仁大黃如陰結加薑附厚朴湯治氣厚朴半夏甘草三兩白朮五兩枳實陳皮一兩外有腳氣虛寒氣實亦大便不通腎臟風濕也陰莖癢痛不忍苦參大黃荊芥皂角洗熏海螵蛸末敷陰包癢蟲蝕狗脊黃連黃柏水銀光粉赤石脂為末敷又加黃丹頭痛三十太陽頭痛兼項與攢竹脈浮緊或關前緊數惡風寒宜羌芎活主之陽明頭痛自汗發熱胃熱上攻脈浮緩長或關洪數石膏葛芷主之少陽頭痛額角偏疼往來寒熱脈弦細黃芩柴胡主之太陰頭痛有濕痰體重腹痛脈沉緩半夏南星蒼朮主之少陰頭痛足寒氣逆為寒厥脈沉細細辛麻黃附子主之厥陰頭痛頂痛吐涎沫厥冷脈浮緩吳茱萸湯主之氣虛頭痛耳鳴九竅不和尺脈虛浮參耆主之血虛頭痛魚尾上攻芎歸主之風涎冷痰在鬲上或嘔吐脈弦細出寸口為痰厥宜吐火作痛痛甚清之散之濕熱頭痛證則心煩傷風頭痛半邊偏痛皆因冷氣所吹遇風冷則發寸浮食積頭痛因胃中有陰冷宿食不化上衝右寸緊盛左屬風浮為風右屬痰滑為痰半夏白朮天麻湯治痰厥頭痛半夏二錢白朮一錢天麻一錢半人參一錢黃耆蒼朮陳皮黃柏茯苓一錢半神麯炒澤瀉乾薑二錢清空膏治風濕熱諸般頭痛惟血虛不治黃芩二錢羌活川芎黃連防風甘草錢柴胡七分上為末白湯下玉壺丸治風濕痰頭痛雄黃白朮天麻南星半夏茶調散吐痰頭痛家珍方治偏頭痛連睛石膏黍黏子炒香芎散治一切頭風香附二兩炒甘草川芎一兩石膏五錢細茶荊芥點服二錢細辛防風川烏草烏白芷荊芥羌活煎服目痛三十一皆血太過與不及也太過者血得太熱而溢於上則目壅塞而發痛不及者血虛無所養而拈目痛目之鋭眥少陽經也血少氣多目之上綱太陽經也血多氣少目之下綱陽明經也血氣俱多惟足厥陰連於目系而已治法血實者決之血虛者補之佐以辛散之以涼清之汗之吐之腦痛三十二因風熱乘虛而入於腦宜以辛涼散之行之頭目昏眩疼痛及腦痛宜以辛涼散之行之羌活湯治風熱壅盛上攻頭目昏眩疼痛及腦痛羌活防風黃芩酒黃連一兩酒柴胡七錢栝蔞根酒茯苓一錢甘草羌附湯治冬天寒氣犯腦痛齒亦痛名曰腦風麻黃附子防風羌活白芷升麻薑蠶黃柏甘草三錢蒼朮黃耆一錢藿香散治腦風頭痛藿香川芎天麻蔓荊子白芷上槐花酒湯下又穀精草銅緑另研各三錢硝石另研一錢為末吹鼻中又細辛瓜蒂良薑一錢硝五錢含水滿口以藥搐鼻又荊芥薄荷木賊薑蠶蠍梢上為末茶清下二錢眉眶骨痛三十三因風痰羌活防風甘草黃芩酒白朮半夏南星細辛又方加川烏烏頭童便浸炒去毒二味為君不治證頭目痛脈反短澀者死腦痛脈弦大者死卒視無所見者死目泣淚目黃三十四風氣與陽明入胃循脈而上至目內眥泣泄名風成寒中宜辛溫之不得外泄目黃名風成熱中而鬱也宜辛涼發之眩暈三十五因痰飲隨氣上伏留於陽經遇火則動或七情鬱而生涎亦同嘔吐眉目疼痛目不欲開因血虛眩暈眼花屋轉起則暈倒因外感風在三陽經頭重項強有汗因虛則掣痛暑則熱悶濕則重著皆令吐逆暈倒散風行濕湯治痰火眩暈二陳湯黃芩蒼朮活石瓜蒂散治痰厥眩暈吐之芎歸湯治血虛眩暈參苓湯治氣虛挾火人參白朮黃芩黃連心腹痛三十六脈細小遲者生堅大實者死腹痛反浮大而長者死腹痛而喘滑利數而緊者死滑而緊者痛陽微陰弦者虛短數心痛由中氣虛寒邪乘虛客之治宜溫之散之或久不散鬱而生熱宜開鬱治熱或素有熱虛熱相搏結郁胃脘而痛或有食積痰飲或氣而食相郁停結胃口作痛熱厥心痛身熱足冷痛甚則煩躁而吐額汗脈洪宜刺太溪崑崙寒厥心痛手足逆冷汗不渴便利溺清脈微乃寒客心包絡也宜溫之良薑菖蒲辛熱也大實心痛卒然發痛便祕久而注悶心胸高起按之痛不能飲食可下之胃病者腹脹胸滿胃脘當心而痛上支兩脅膈咽不通飲食不下刺大都大白脾病者腹脹食則吐嘔善噫胃脘痛也心下急痛如錐刺刺太溪又中胃痛太陰也理中建中草豆蔻丸等主之胃心痛痛與背相接善恐如從後觸其心偃僂刺束骨合谷崑崙脾心痛狀若死終日不得休息取行間太衝肺心痛臥若起居動作益痛甚刺魚際太淵草豆蔻丸治脾胃虛損客寒及一切虛證心腹大痛草豆蔻麵煨去皮四兩吳茱萸八錢益智仁二錢陳皮八錢青皮三分澤瀉三分人參八分甘草炙三分生六分麥蘖一錢黃耆八分薑黃四分川歸八分柴胡四分桃仁去皮薑蠶六分半夏一錢神麯一錢半金鈴子散治熱厥心痛或作或止久不愈金鈴子玄胡各一錢熱加黃連散氣加荔枝核酒下三錢朮附湯治寒厥心痛脈微虛弱暴痛白朮四兩附子一兩甘草二兩治心痛久成郁川芎梔子蒼朮香附以上四味俱開鬱石咸乾薑炒灰治火毒加黃連甘草有因酒牛乳心痛十八年時以一物拄之脈三至弦弱而澀吞酸用二陳湯白朮黃芩黃連澤瀉桃仁郁李仁痰水停飲留結不散名胸痹栝蔞枳實香附蒼朮臺芎死血留於胃口作痛承氣湯梔子韭汁桔梗能開提氣血麻黃重者須此發之木香散治心脾卒痛木香蓬朮一兩乾漆炒煙盡二錢上醋湯下一錢煮雄黃治大實心痛痃癖如神雄黃一兩另研巴豆五分研入雄黃末白麵三兩再研勻上水丸梧桐子大每服時先煎井水令沸下藥二十四五丸煮二十沸撈入冷漿水浸冰冷一時一丸一日二十四時加至微利為度用前浸水下治吞酸作痛飲水為病也可燥之干蜆殼丸蒼朮半夏丸胃脘當心痛有垢積者斑蝥烏梅肉丸如豆大泔下一丸皂樹上菌湯泡肥珠起飲之泄效腹痛三十七因寒客之則阻不行有熱內生鬱而不散有死血有食積有濕痰結滯妨礙升降故痛當分部分治小腹痛厥陰也正陽回陽四逆加歸主之雜症而痛苦楝丸丁香楝實丸酒煮當歸丸主之腹中不和而痛者甘草芍藥湯主之或誤下而痛加桂痛甚加大黃夏月肌熱惡寒脈洪實而痛黃芩芍藥湯主之中氣虛而痛飢而痛者是理中湯主之諸蟲痛者如腹痛腫聚往來無有休止涎出吐清水痰積腹痛隱隱然得熱湯辛物則暫止者是理中建中治寒腹痛及虛證調胃承氣加木香檳榔治熱腹痛及實證或血加桂桃仁溫加附溫中加減丸治食積腹痛脈滑者是二陳芎術丸治清痰腹痛脈滑者是二陳湯臺芎蒼朮香附白芷薑汁心痛有心胞客寒心胞熱虛宿食留飲脾積胸痹胸痛有積實腹痛同前條外有腳氣小腹痛者有肝痹胞痹疝筋虛腸癰腰痛腰軟附三十八脈大者腎虛澀者瘀血尺脈粗者熱由腎虛而起於內蓋失志傷腎鬱怒傷肝憂心傷脾皆致腰痛也故使氣結而不行血停不散遂成虛損氣血羸乏又房勞太過失志者虛羸不足而黑遠行久立身不能任鬱怒者腹急脅脹目魂䀮䀮憂思者肌肉濡漬痹而不仁飲食不化腸胃脹滿房勞者精血不足轉搖不得有濕熱為病亦因腎虛而生腎虛水涸相火而熾無所榮制故濕熱相搏而成亦有虛勞外感濕氣內熱不行而成黨痼濕熱者四肢緩足寒腰冷如水汗精滑扇痛有瘀血用力過多墜墮折胸瘀血不行有外感因虛襲之如太陽腰痛引項尻重陽明腰痛不可以顧善悲少陽如刺其皮不可䐆仰太陰煩熱如橫木在中遺溺少陰引脊內厥陰如張弩弦大抵太陽少陰多中寒陽明太陰多燥濕少陽厥陰多風熱腰軟者腎肝伏熱治宜黃柏防己羌活湯治腰痛羌活獨活柴胡防風肉桂當歸如臥寒濕之地是太陽少陰絡中有凝血加歸尾桃仁蒼朮防己如濕熱加黃柏蒼朮杜仲川芎如虛加杜仲黃柏知母五味龜板當歸如墜墮瘀血加桃仁蘇木麝香水蛭腎氣丸治房勞腰痛補陽乏不足即八味丸茴香丸鹿茸丸治同前六味地黃丸治膏梁之人腰痛補陰之不足封髓丹治同前煨腎丸治腎虛杜仲炒去絲斷為末三錢以豬腰一個批五七片以鹽淹去腥水摻末在內包以荷葉外用重重濕紙包定煨酒下立效散玄胡桂川歸酒下挫氣腰痛山楂一兩北茴香炒一錢半酒下肩背痛三十九脈促上緊者肩背痛沉而滑者肩膂痛洪而大者風熱由風熱乘肺手太陰經郁甚不行也病則頰額腫頸肩臑肘臂外後臁痛小便數而少如小便遺失者肺虛也治宜通經血益元氣散風熱通氣散主之羌活獨活防風藁本以上通經氣黃芩黃連降火虛加人參黃耆背胛節痛四十由小腸經氣不行腰胯腫痛四十一由風寒濕流注經絡結滯骨節氣血不和而痛治宜流濕散風寒又痰積趁逐經絡流注搏於血內亦然治宜逐痰積除濕丹檳榔甘遂赤芍藥威靈仙澤瀉葶藶各二錢乳香研沒藥一兩大戟炒三兩陳皮四兩上面糊丸加牽牛末煨腎散甘遂摻豬腰煨末之禹功散脅痛四十二脈弦由肝木氣實火盛或因怒氣大逆肝鬱木盛或因謀慮不決風中於肝皆使木盛生火火盛肝急而作痛治宜以辛散之以苦瀉之當歸龍會丸瀉青丸等有瘀血停留於肝歸於脅下而痛病則自汗痛甚按之益甚治宜破血為主活血為佐復元活血丹導滯當歸丸等有痰積流注厥陰之經脅下痛病則咳嗽急引脅痛治宜行氣去痰二陳湯加南星青黛香附青皮等龍薈丸治食積發木盛脅痛柴胡甘草青皮黃連當歸大黃木香蘆薈川芎草龍膽左金丸治肝火黃連六錢茱萸一錢活血丹治死血導痰湯治痰積流注外有肝中風左脅偏痛肝中寒脅下攣急肝積左脅痛肝實肝虛筋實懸飲食積肉虛左脅因嗽而痛膽實熱脅下滿硬飲水脅下鳴逐又有血枯證脅滿支滿經氣不行妨於食肝傷脾病至先聞腥臊臭出清液肝病肺葉傷之四支清目眩前後血此得之少年脫血房事肝傷氣竭致之脅滿面黑不能反側者死身體痛四十三傷寒太陽經表證六脈俱緊陰毒傷寒身如被打脈沉緊傷寒發汗後痛氣血未和脈弦遲傷濕濕流關節一身盡痛風濕相搏支體重痛不可轉側脈緩虛勞之人痛氣血虛少脈弦小諸痛皆生於氣臺烏一兩香附四兩陳皮蘇葉乾薑五錢檳榔名正氣天香散貼痛芥菜研水敷尉痛醋炒灰布裹熱尉蔥艾炒韭炒亦可茱萸醋研敷亦可治膝痛腳骨熱痛或赤腫行步難蒼朮米泔浸一日夜鹽炒柏酒浸一日夜上煎服癆瘵四十四俗聲傳尸雖多種不同其病與前人相似大略令人寒熱盜汗夢與鬼交遺泄白濁發而聳或腹中有塊或腦後兩邊有小核數個或聚或散沉沉默默咳血嗽痰或腹下痢羸瘦困乏不自勝持雖不同證其根多有蟲齧心肺一也蓋因陰虛或痰與血病方青蒿二錢童便四升文武火熬至七分去蒿再熬至一升半入豬膽汁十個檳榔末辰砂再熬數沸甘草末收之方治虛勞痰四物湯加竹瀝薑汁童便或加參術傳尸癆李法三拗湯治傳尸一切諸證先服此方後服蓮心散萬不失一麻黃甘草杏仁薑棗煎服痰清則止蓮心散川芎一兩川歸黃耆前胡柴胡鱉甲醋炒甘草獨活羌活防風麻黃去節防己赤芍桂杏仁去皮尖蓮肉去心阿膠南星陳皮芫花醋炒黑干枳殼麩炒半夏茯苓黃芩上除芫花每服二錢半水小二盞半薑三片棗一個芫花一抄煎至八分服須吐有異物漸減芫花蓋反甘草殺蟲少之調䳚方治傳尸勞有神效混沌皮一具醋煮一宿焙乾鱉甲炙黃連桔梗芍藥大黃甘草鼓心苦參貝母秋石另知母草龍膽黃柏蜜炙芒硝飛蓬朮一個犀角上煉蜜為丸溫酒下二十丸腸熱食前膈熱食後一月平安白蠟塵治療蟲喉痹四十五蓋因痰熱內結雖有蛾閉木舌子舌纏喉走馬八名火則一也夫少陰君火少陽相火並絡於喉氣熱則結甚則腫脹甚則痹痹甚不通而死惟喉痹急速相火之為也至如嗌乾痛咽頷腫舌木強皆君火之為也治法微以咸耎之甚以辛散之痰結則吐之甚則砭出血之人火以涼平之龍火以火逐之涼劑熱服是也宜刺少商出血方朴硝牙硝各另研青魚膽放硝上干方研為末以竹管吹入喉中痰出即愈祕方桐油腳鵝翎刷取吐痰為妙又皂角取吐又殭蠶同薑研服解毒又生艾汁亦解玉匙散治風熱喉痹及纏喉風朴硝一兩硼砂五錢腦子五錢殭蠶以竹管吹入喉中神效散治熱腫語聲不出荊芥穗另萆麻去皮另各一兩上蜜丸皂子大嚼含化蜜附子治府寒咽門閉不能咽大附子生去皮臍切片蜜塗炙黃含之咽津雄黃解毒丸治纏喉風及喉痹倒僕失音牙關緊急不省人事雄黃一錢飛鬱金巴豆十四個去油上醋糊丸緑豆大熱茶清下丸子九丸取吐即止又方膽礬一錢以烏梅肉裹之外以綿裹含龍火拔毒散治纏喉急證先以針出血後以此丹用新水掃之陽起石煅伏龍肝等分水敷又白瑞香花根研水灌之咽物狀咽者咽物久也咽腫不能吞干則不能咽或因多飲咳熱或嘔吐咯傷皆致咽系乾枯之所為也喉病狀喉者聲音出入處也藏熱則暴腫閉塞懸壅俗云蛾也在上齶咳而聲嘶喉破也俗云聲散蝦蟆瘟四十六風熱也宜服車前葉汁又宜解毒丸下之附方側柏葉汁調蚯蚓糞敷燒灰大妙又丁香尖附子尖南星醋磨服又五葉藤汁敷妙口甘苦四十七口甘脾熱也三黃丸治之口苦膽熱也乃謀慮不決柴胡湯主之柴胡加麥門冬酸棗仁地骨皮遠志舌四十八心脈系舌根脾脈絡系舌傍肝脈絡舌本因風寒所中則舌捲縮而不言七情所鬱則舌腫滿而不得息肝壅則血上湧心熱則裂而瘡脾熱則胎滑脾熱則舌強脾閉則白胎如雪金沸草散治風寒傷心脾令人寒熱齒浮舌腫荊芥四錢旋覆花前胡麻黃各三錢半夏甘草一錢升麻柴胡湯治心脾虛熱上攻舌上瘡舌本強兩頰腫痛石膏煅二錢升麻芍藥梔子木通一錢杏子大青黃芩三分柴胡一錢敷舌腫破鍋底黑醋鹽調敷出血如泉白膠香五倍子牡蠣糝白胎語澀薄荷汁白蜜薑汁揩敷目四十九因風熱血少神勞腎虛病在腑則為表除風散熱在臟則為里宜養血安神如暴失明昏澀翳膜眵淚班入眼皆表也宜發表以去之如昏弱不欲視物內障見黑花瞳散皆虛也血少神勞腎虛也宜養血補水安神撥雲湯羌活防風錢半藁本川芎荊芥一錢葛根細辛柴胡升麻五分川歸知母黃柏黃耆甘草一錢內障是虛火盛加四君子湯五味茯苓濕熱加黃芩黃連生地睛痛加四物湯胸中不利加槐子水翳加羚羊角大府祕加大黃凡目暴赤腫以防風黃芩為君以瀉火黃連當歸為佐以養血使以羌活升麻柴胡白芷甘草白睛紅加白豆蔻少許凡目久病昏暗以熟地川歸為君以羌活防風干菊之類為佐退云丸治一切翳暈內外障昏無睛屢效川歸酒洗川芎兩半犀角楮實蟬蛻黃連薄荷各五錢乾地黃酒浸一兩栝蔞根一兩羌活一兩川木賊一兩半童便浸一宿去節火乾用之上煉蜜丸米飲下婦人川歸湯下有氣木香湯下瀉青丸治風熱熟地黃丸治血少駐景丸補腎水車前子三兩熟地三兩菟絲子五兩槐子散治體肥氣盛風熱上行目昏澀槐子黃芩木賊蒼朮末之茶點服之桔梗丸治太陽衛虛血盛瞳人腫痛眼黑肝風盛桔梗一斤牽牛頭末三兩蜜丸水下羊肝丸治一切目病不問盲障白乳羊肝一具以竹刀去膜黃連一兩川歸干菊防風薄荷荊芥羌活川芎三錢上為末羊肝搗丸漿水下地芝丸治不能遠視能近視此除風熱地黃天門冬四兩枳殼炒干菊二兩上蜜丸茶酒任下定志丸治不能近視能遠視人參遠志菖蒲茯苓蜜為丸下治瞳子散大此辛熱之為也黃芩黃連除風熱歸身地黃養血涼血地骨皮五味收散天門冬瀉熱補氣點方百點膏黃連二錢水大碗以火熬至一半加川歸六分防風三分蕤仁去皮尖三分上熬水中不散加蜜少許點之蔓荊子椒根地黃甘草荊芥麻黃升麻隨所長加之金絲膏七寶膏真珠珊瑚蘆干石二味俱煅七次以連水浸七次辰砂腦麝蕤仁去殼上研末點眼稍赤白礬飛過三錢銅緑五分蜜陀僧一錢輕粉少許末貼之豆後上翳穀精草蛇殼緑豆粉天花粉上等分粟米泔浸煮蜜服爛翳茜藤灰燈草點須臾大痛百節草刮去柿干為度食之春雪膏朴硝置豆腐上蒸待流下用瓦器承之點赤眼又黃丹白礬點赤眼耳五十因風熱氣虛火勝風耳痛全蠍一兩生薑三兩切作方塊同炒熟去薑末之湯點聤耳出膿桑螵蛸一介火炙麝一字另研摻之又加染坯枯礬吹之蟲入耳中麻油灌耳中蟲出耳痛甚茱萸烏附尖大黃同為末盒湧泉即腳底心也鼻五十一肺竅也心肺有病而鼻為之不利也有寒有熱寒則表之羌活獨活防風升麻乾葛白芷黃耆蒼朮甘草川椒熱則清之黃芩黃連酒皶鼻乃血熱入肺四物加酒芩酒紅花煎服敷乳香硫黃酥調敷蘿蔔內煨烏尖又鴨嘴膽礬敷齆鼻乃肺氣盛也枯礬研為面脂綿裹塞自消瓜蒂末綿裹塞亦可又木通細辛附子炮蜜和綿裹塞鼻亦可服用防風通聖散加好山稜茱萸海藻並酒浸炒乾為末每一錢五分任湯下鼻淵乃膽移熱於腦通聖散加薄荷黃芩黃連辛夷又孩兒茶服妙齒五十二夫齒腎之標骨之餘上齦胃絡貫也喜熱惡寒下齦大腸絡也惡熱喜寒蓋因腎衰則豁大腸壅齒為之浮大腸虛齒為之宣露熱甚則齒動齦脫作痛不已寒邪氣邪客腦則腦痛袒露疼痛羌活散麻黃去根節羌活一錢防風三錢細辛升麻柴胡當歸蒼朮一錢五分白芷三錢黃連骨灰二錢桂枝上為末先以湯嗽口淨擦之漱之又蒺藜五錢青鹽三錢漿水二碗煎半熱漱又烏豆熟艾蔥川椒濃煎漱有濃痰出則安治蟲散氣蓽茇木鱉同研搐鼻因氣走注藁本煎草細辛熱漱治骨槽風皂角不蛀者去子入杏仁在子位上上燒存性每兩入青鹽一錢揩用治風蛀牙北棗一個去核入巴豆一粒合成文武火上炙焦成灰樣放地上良久研細以紙捻入蛀孔十次
