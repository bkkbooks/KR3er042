body:
  text: 卷之中傷寒方論一李論太陽證脈浮緊無汗名傷寒宜麻黃湯脈浮緩自汗名傷風宜桂枝湯陽明證不惡風寒自汗脈長宜白虎湯浮沉按之有力宜大承氣湯少陽證脈弦宜柴胡湯太陰證同前脈沉細宜四逆浮宜桂枝湯少陰證脈沉實宜大承氣脈細沉遲宜四逆湯身涼脈沉細而虛宜瀉心湯身熱而煩躁二便自利脈浮洪無力按之全無宜附子瀉心湯吐瀉不渴脈微弱宜理中湯渴而脈沉有力而疾宜五苓散脈沉發熱當汗宜麻黃細辛附子湯下利青色口燥宜下不渴溫之厥陰證脈俱微沉實按之有力宜下無力宜溫劉論表證宜麻黃湯發之內證之外者麻黃細辛附子湯漬形以為汗里證依方加大黃下之腎外證脈浮前方加薑附內證泄利後方加同肝外證面青脈弦前方加羌活防風內證便祕淋溲沉弦後方加同心外證面赤脈浮洪前方加石膏黃芩內證煩心心痛而噦脈沉後方加同肺外證面白嚏悲脈浮而澀前方加桂薑內證喘咳脈沉後方加同脾外證面黃善噫脈浮緩前方加白朮防己內證腹滿脈沉後方加同羌活湯治一切傷寒及兩感出劉羌活防風川芎甘草地黃黃芩各一兩白朮二兩細辛二錢五分如身熱加石膏四錢腹滿加芍藥三錢寒熱加柴胡一兩半夏五錢心下痞加枳實一錢里證加大黃三錢邪盡止之大羌活湯治同上方出李防風羌活川芎甘草黃芩細辛獨活蒼朮防己白朮黃連各一錢知母地黃各三錢白芷陽明加之雙解散混治出劉張春夏不服麻黃秋冬不服桂枝夏不服青龍冬不服白虎桂枝湯解肌和衛也治太陽中風自汗浮桂枝君也風淫於內平以辛芍藥甘草臣也酸收甘緩薑棗使也辛散甘緩各三錢此方西北可常行之惟江淮間冬春可行之自春末夏至前用加黃芩謂之陽旦湯夏至後加芩二錢半知母半兩石膏一兩若病人素虛寒不必加減加芍藥一兩治腹痛下後脈浮加大黃治大實腹痛加附子一枚治風濕身疼又治汗漏不止加乾薑治已汗已下又寒熱往來加栝蔞葛根治有汗柔痓加麻黃二錢杏仁十二枚治寒熱往來名桂麻各半湯加麻黃二分石膏三錢治寒熱往來脈微弱不可汗名桂枝三越婢一湯加厚朴杏仁治喘惡風無汗表也去芍藥治下後脈促胸滿麻黃湯治寒邪麻黃君也三錢散寒桂枝臣也二錢解肌甘草佐也一錢寒傷榮榮主肝肝苦急以甘緩之杏仁使也利氣二十個加知母一錢五分石膏三錢治夏至前後無汗熱病加杏仁五十枚麻黃半兩甘草二錢石膏八錢半治喘加麻黃薏苡二錢甘草一錢杏仁十枚治風濕相搏身疼加麻黃細辛二錢附子十枚治少陽證脈沉加芍藥葛根薑棗治剛痓無汗名葛根麻黃湯解肌湯治春溫又治疫葛根二錢麻黃三錢桂枝甘草一錢芍藥黃芩二錢棗同煎升麻葛根湯治春冬時行升麻葛根甘草芍藥各等分又治太陽陽明合病自利葛根一兩黃芩黃連甘草各二錢湯治喘汗出里也又治誤下協熱利不止陽毒升麻升麻二錢犀角射干黃芩人參甘草各一錢大青龍湯治風寒兩傷寒脈浮緊中風證風脈浮緩傷寒證是也麻黃君也六錢散寒桂枝臣也二錢祛風甘草二錢杏仁四十枚甘苦助之佐麻黃也薑棗辛甘合之佐桂枝也石膏使也使榮衛之氣俱和而又專達肌表者也上一服止若再服汗多則亡陽也若脈微弱汗出惡風不可服服之則厥逆筋惕肉瞤也大青龍不可誤服誤服則厥逆小青龍湯治風寒兩傷加之心下有水氣乃除表裡之邪耳麻黃君也發散表之風寒芍藥五味佐也寒飲傷肺咳逆而喘以酸收肺逆也乾薑細辛半夏辛熱心下有水津液不行則腎氣燥以辛潤之以熱散之若渴者去半夏加栝蔞根渴者氣燥也栝蔞根苦寒潤燥也若微利去麻黃加芫花水入腸間則利下不可攻表芫花下水若噎者去麻黃加附子噎者水寒與虛麻黃非宜附熱溫氣辛散寒若小便不利小腹滿去麻黃加茯苓若喘者去麻黃加杏仁泄逆氣大承氣湯治邪結入胃又治陽明少陽合病自利治久痢熱利腹脹枳實君也十枚苦寒潰堅破結為之主大黃使厚朴臣也苦濕泄滿除燥芒硝佐以治熱桃仁承氣湯治蓄血桃仁五十枚桂枝芒硝甘草六錢大黃一兩三錢大柴胡湯治春溫柴胡君也黃芩臣也芍藥佐也苦酸湧瀉為陰枳實佐也苦寒泄實折熱也大黃使也半夏薑棗辛散甘緩小柴胡湯治春溫熱多嘔曰胎柴胡君也黃芩臣也人參甘草佐也甘平也邪氣傳裡裡氣則不治甘以緩之以扶正氣而復之半夏佐也以辛散之若胃中熱而不嘔去半夏參加栝蔞根不嘔無逆氣故去半夏人參恐助熱亦去之栝蔞根苦寒以通胸中鬱熱若渴者燥也去半夏加人參生津栝蔞根潤也若痛中痛寒也去黃芩加芍藥若脅下痞硬去棗加牡蠣以咸軟堅也若以心下悸小便不利者去黃芩加茯苓以行水也若不渴外有微熱表也去人參加桂治表也若咳者去人參薑棗加五味子乾薑甘補逆氣故去參棗五味酸收乾薑散寒也若熱入血室譫語加生地黃四逆散治少陰四肢厥逆柴胡芍藥枳實甘草上為細末每服二錢米飲調下嗽加五味子乾薑悸者加桂梔子豉湯治心下懊憹及吐汗下後胸滿虛煩不眠又治白胎又治勞復梔子豆豉若下之後熱不去加乾薑下後腹脹加厚朴枳實若勞復加枳殼若發黃外熱加柏皮甘草若時行大熱虛煩加生地黃石膏柴胡升麻名梔子升麻湯瓜蒂散吐胸滿鬲實瓜蒂苦寒赤小豆酸苦湧鬲實香豉苦寒去熱亡血家忌大陷胸湯治胸中邪氣與陽氣相結不得分解壅於心下硬痛甘遂君也一字苦寒泄熱破結芒硝臣也八錢鹹寒泄熱軟堅大黃使也大陷胸丸大黃半兩葶藶芒硝杏仁七錢甘遂丸如彈不下再服蜜水下一丸小陷胸湯治前證按之痛黃連三錢半夏八錢栝蔞仁二個枳實理中丸治無熱證結胸本方加枳實茯苓枳梗湯治胸滿不利桔梗枳殼水二鍾煎八分服瀉心湯治虛痞邪留心下謂之痞留於胸中謂之結胸大黃一兩黃芩黃連二錢半若胸滿而軟加半夏若胸滿惡寒自汗加附子若胸滿下之尤痞加甘草乾薑人參以上並去大黃旋覆代赭湯治吐汗下後痞而噫氣不除旋覆花甘草一兩人參六錢代赭石三錢半夏八錢薑棗厚朴湯治腹脹滿厚朴四錢半夏二錢甘草人參各五分十棗湯治痞硬引脅芫花大戟甘遂四錢棗十個同煎茵陳湯治熱極發黃茵陳君也苦酸寒泄熱主也梔子臣也苦寒入心大黃使也白虎湯治熱甚於外又中外俱熱內不得泄外不得散知母君也苦寒石膏臣也助甘草粳米使也以甘緩之白虎為大寒之劑立秋後不可服服之則噦逆成虛損矣治秋時行加蒼朮治風濕自汗亦加蒼朮治暍中暑治暍治白胎澀者加人參五苓散克伐腎邪治發黃霍亂通行津液茯苓君也豬苓臣也白朮佐也脾惡寒水飲內蓄脾氣不治以甘助之澤瀉使下也導溺桂辛熱水蓄不行則腎氣燥以辛潤之以熱散之小半夏加茯苓湯治水結胸茯苓甘草湯治水飲為悸理中丸治脾胃人參君也白朮臣也脾惡濕甘勝濕甘草佐也甘補乾薑使也辛熱胃惡寒若臍下築動者腎氣動也去白朮加桂術甘滯氣桂辛散腎氣若吐多加生薑去白朮術甘壅薑散逆氣若下多加朮術勝濕若悸者飲也加茯苓渴欲水者加朮生津腹痛加參補之寒多加乾薑腹滿去朮加附術令人中滿附辛散滿四逆湯治陰寒脈沉甘草君也六錢乾薑臣也半兩逐寒附使也一錢溫經水二升取四合去滓分二服吳茱萸湯治厥陰頭痛乾嘔涎沫又治少陰煩躁吐利四逆茱萸生薑半兩人參一錢真武湯治停飲而咳水飲內寒相合者又治振又治水在心下外帶表茯苓君也白朮臣也脾有水則不治芍藥生薑濕淫所勝佐以酸辛附子使也散濕溫經若咳者加五味乾薑細辛水寒射肺酸收辛散若小便利者去茯苓若下利去芍藥加乾薑酸泄辛散寒也嘔者去附子加生薑附補氣薑散氣也建中湯治熱多寒少又治血少尺脈遲澀治腹痛又治虛煩又治悸膠飴君也甘溫甘草臣也桂佐也辛散也芍藥佐也酸收也泄也薑棗使也建脾胃脾約丸脾約則小便數大便硬約胃強脾弱津液不布也又曰脾日虛弱津液約縮而不舒布也杏仁潤燥也枳實散結也芍藥酸苦泄也厚朴散脾也麻仁大黃使也抵當湯治蓄血水蛭君也鹹寒咸勝血虻蟲臣也苦寒苦走血桃仁佐也血聚則肝氣散大黃使也水煎一服小續命湯麻黃人參黃芩各一兩芍藥桂防己甘草川芎防風附金沸草湯治咳嗽喘急前胡旋覆花各一兩半夏五錢細辛甘草各二錢荊芥穗一兩半赤茯苓六錢半葳蕤湯治冬熱病咽痛赤疹又治風濕自汗葳蕤一錢麻黃白薇羌活杏仁青木香甘草各一錢半石膏二錢半葛根五錢川芎一錢半作三服甘桔湯治咽痛桔梗甘草水煎服射干半夏桂甘湯治腹滿自利赤石脂禹餘糧湯治利不止各一兩作三服黃芩湯治太陽少陽合病自利黃芩芍藥甘草棗黃連湯治下寒上熱腹痛嘔吐者黃連二錢陳皮枳實麻黃杏仁厚朴甘草葛各一錢半黃連阿膠湯治心煩不得臥黃連一兩三錢黃芩三錢芍藥六錢阿膠一兩雞子黃八分三個先煎後入黃柏上和勻作三服豬膚湯治少陰胸滿而煩豬黑皮五兩煎至半加蜜三米粉二分三酸棗仁丸治吐下後虛煩不眠酸棗仁一升甘草二錢知母五錢麥門冬三錢茯苓桃仁湯治狐惑黃連犀角湯黃連五錢烏梅七個木香一錢犀角一兩無亦升麻代百合知母湯治汗吐下後寒不寒熱不熱行不能坐不安也百合三個知母半兩百合地黃湯壞證謂傷寒又感風寒暑濕火燥或經汗吐下溫針仍不解宜知母麻黃湯鱉甲散知母麻黃湯知母三錢麻黃甘草芍藥黃芩桂枝半兩鱉甲散鱉甲升麻前胡黃芩烏梅犀角枳實半兩地黃一兩甘草一錢發明五味陰陽寒熱傷寒湯丸藥性二辛甘發散為陽桂枝辛熱發散風寒肥實腠理越婢湯發越脾氣葛根湯用為解肌大青龍散寒小青龍發表甘草湯行陽附子湯升陰救逆湯解未盡表邪牡蠣湯散經中火逆桃核承氣散血炙甘草湯復脈半夏散散客寒咽痛四逆湯救陽氣外虛凡三十七方同用麻黃苦溫泄衛氣發表通腠理疏傷寒頭疼消赤黑斑毒治溫瘧瘴疫開毛孔皮膚大青龍主營衛俱病小青龍救寒邪在表附子湯解少陰之寒石膏湯治汗出而喘升麻湯發甚熱甘草湯救表寒凡十三方同者葛根甘平主傷寒中風頭痛開腠理髮汗解肌治太陽項強療合病自利半夏湯但嘔而不下利黃連湯表未解而喘急凡四方同用升麻味甘苦平主瘟疫時行熱疾止頭痛寒熱瘴瘧蔥白為引散太陽風寒石膏為使止陽明齒痛升陽氣於至陰之下發浮熱表實可已生薑辛溫主傷寒頭痛鼻塞治咳逆痰水溫中安和胃氣遊行諸經仲景諸湯以發散風寒而通神明凡二十三方同用蔥白辛溫通上下陽氣散風寒表邪入太陰陽明引衆藥發散少陰證面色赤者宜加白通湯腎苦燥者可潤酸苦湧泄為陰瓜蒂苦寒有毒吐心胸填塞咽喉不得息濕家頭中風寒濕內藥鼻中即愈赤小豆甘酸通氣利小便下水止消渴瓜蒂散湧吐逆氣虛煩赤小豆湯治黃從小便中出梔子苦寒有毒主少陰虛滿時疾發黃輕瓢象肺入太陰經色赤象火徹心中熱梔子豉湯吐心中懊憹厚朴湯吐心煩腹滿凡用梔子湯舊微溏者不可服凡六方同用香豉苦甘通關節出汗吐胸中塞窒治下後心熱與薤白同煎治傷寒下利勞復發熱同苦以發之寒淫所勝平以辛熱附子辛甘大熱有大毒為陽中之陽故走而不守入手太陽浮中沉無所不至非身表涼四肢厥不可用四逆湯散陰寒薑附湯復陽虛附子湯補胃加桂枝和表白通湯溫里真武湯除濕凡十六方同用乾薑辛溫大熱其性止而不移屬陽可升可降補下焦虛寒