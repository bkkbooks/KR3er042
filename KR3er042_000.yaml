front:
  text: 序居常每遇岐黃家抵掌醫術輒曰丹溪朱先生心法曰是會通素難之精而折衷仲景東垣戴人諸家以集其成者也每拈一方曰是從先生舊方增減其間蓋人人飲食寒溫災祥生死於是而不識先生為何他人也丙辰令義烏而乃知先生義烏人也求其書自心法諸刻以外無聞焉己未兼攝吳寧得其刻在吳寧暑中曰丹溪纂要即吳寧盧子從其所刻石鉢薈叢鉤玄諸書刪正向裁取之者也急模數本以歸以為先生之真傳真印盡是矣辛酉之秋孟一日課諸生於司學博陳先生曰聞丹溪有祕傳在其後裔而祕不傳也余曰果有傳矣安得祕之當為君急索之俄而審編於庭而先生之裔適至詰之則曰先人手授有手鏡樵隱二帙藏之久矣未敢示人也越日而即以其二書至夫先生之書傳三百年矣前之令茲土者亦嘗訪而閲之矣即余之竊祿亦已五年所矣而任滿將解之時乃始聞於陳先生以是日聞於陳先生即以是日得於其裔三百年而未行其書一日而行之五年而未得其書一日而得之豈先生之靈有以啓余與陳先生之靈而衍其傳乎天下萬世之靈有以啓余與陳先生與先生之靈而延其幾墜廣其未盡乎先生生於元之末以先生之才之識豈不能擘畫世務而一試於化而僅以其醫術試而後乃顯於我太宗文皇帝之朝則後日以醫顯當日實以醫隱也托之醫而浮沉身名之間者也先生初遊許文懿公門潛心理學得考亭之緒故自敘其刻曰格致餘論夫醫出之格致之餘則此物此知即修正誠之真脈所衍而流也康節先生以理衍數雖數亦理先生以理精醫雖醫亦理醫而出於理而安得不信今而傳後哉邑歷代故多豪傑君子秦則顏烏唐則駱中丞宋則忠簡公文清公元則文獻公昭代王龔樓三公或以孝著或以忠顯或以節標或以文學傳皆表表為一代人物至今列俎豆而光史冊以先生之寄跡於醫闡醫於道方之諸君子寧多讓焉董是刻者醫官丁承祖承祖醫得先生之精而人物亦倣佛先生云天啓元年冬孟之吉序丹溪先生之書為世所誦習如格致餘論局方發揮傷寒辨疑本草衍義補遺等集以列於張劉諸大家毋或敢復置喙矣獨手鏡一帙為先生所祕惜左右行遊常挾與俱不輕以示人迄於今垂三百年海內之急欲一見之不啻如長桑陽慶所稱禁方而不可得以為殆非人間有也不佞嘗為言明府吳公乃佹得之於其後裔神物之出豈有其候耶先生之後興廢者數矣然皆徒祕其書相戎毋泄而不能有所表章故亦時有魚豕之憾公於是為一一考正而命剞劂以廣之不佞陽獲卒業焉其文簡質而旨奧衍其洞人之臟腑陰陽而為之劑往往於單辭片語輒能奇中然大要淵源於黃帝語非素問弗道也當勝國時方行陳師文裴宗元所定大觀二百九十七方相率為局方之學先生獨以
