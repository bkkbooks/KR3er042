body:
  text: 醫家源流帝王世紀云神農以赭鞭擊草木審其平毒旌其燥寒察其畏惡辨其臣使釐而正之一日之間遇七十餘毒極含氣也人病四百藥二百六十有五乃著本草而醫書之原啓矣黃帝深慮人生夭昏凶札上窮下際察五氣立五運洞性命紀陰陽亟咨於岐雷而內經作自內經而下藏於有司者一百七十九家二百九部一千二百五十九卷而後出雜著者不與焉夫內經謂為黃帝之書雖先秦之士依仿而托之其言質奧而義弘深實醫家之宗旨猶吾儒之六經乎秦越人八十一難經繼作蓋舉黃帝岐伯之要旨而推明之亞於內經者也漢張仲景本內經難經之旨著金匱玉函經及傷寒諸論其論六氣之所傷最為詳備晉王叔和纂岐伯華他等書為脈經敘陰陽內外辨三部九候條陳十二經洎三焦五臟六腑之病尤為精密二氏之書誠千古不刊之典也厥後巢元方著病源候論王砯撰天元玉策要皆有所祖述然元方言風寒二濕而不著濕熱之說砯推五運六氣之變而患在滯而不通此其失也至唐孫思邈出以絶人之識篤濟物之仁其列千金方翼所以發前言啓後學有功於醫道深矣當時王燾有外臺祕要所言方證符證灼炙甚詳然謂針能殺生人而不能起死人則一偏之論也及宋錢乙龐安常許叔微迭興龐則囿於準繩尺寸之中許則務在出奇而應變其術皆本於仲景惟錢深造仲景之閫奧建為五臟之方各隨所宜用謂肝有相火則有瀉而無補腎為真水則有補而無瀉可謂啓內經之祕惜其遺書散亡出於閻忠孝之所集者非乙之本真也若大觀間陳師文裴元宗輩所制二百九十七方則欲以一定之方而應無窮之病識者固知其昧於變通之道矣金氏之有中原也張潔古劉守真張子和李明之四人者作醫道於是乎中興潔古治疾一切不以方故其書不傳其學則明之深得之明之推內外二傷尤先於治脾土其為法專於補其所著脾胃論誠根本之言也子和以吐汗下三法風寒暑濕燥火六門為醫之關鍵其劑多峻厲其為法主於攻守真論風火之病以內經病機氣宜十九條著為原病式曲盡精微其治法則與子和相出入者也張氏一再傳其後無聞李氏弟子多在中州獨劉氏傳之荊山浮圖師師至江南傳之宋中人羅知悌而南方之醫皆宗之矣及元時之言醫者非劉氏之學弗道也劉李之法雖攻補不同若會而通之神而明之者丹溪人也研而精之化而裁之者丹溪書也上續天潢之正派下衍濟瀆之遠流者茲人也茲書也吾不知其盡也天啓歲重光作噩壯月天醫日宛涇謨觴山人吳愷茂仁甫述
